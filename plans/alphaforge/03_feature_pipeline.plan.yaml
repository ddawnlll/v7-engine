- id: WS-03-MOMENTUM
  title: 'Implement Momentum Group: ROC, RSI, MACD'
  objective: 'Implement Momentum Group: ROC, RSI, MACD'
  implementation:
    instructions:
    - '[must] [action] Implement compute_momentum_N(close: np.ndarray, n: int) -> np.ndarray: momentum[t] = close[t] - close[t-n].
      NaN for t < n. Implement compute_roc_N(close: np.ndarray, n: int) -> np.ndarray: roc[t] = (close[t] / close[t-n] - 1)
      * 100. NaN for t < n.

      '
    - '[must] [action] Implement compute_rsi(close: np.ndarray, window: int = 14) -> np.ndarray: Wilder''s RSI using smoothed
      average gains and losses. avg_gain[t] = (avg_gain[t-1] * (window-1) + gain[t]) / window. avg_loss similarly. rs = avg_gain
      / avg_loss. rsi = 100 - 100/(1+rs). NaN for t < window. RSI values bounded in [0, 100]. Edge case: when avg_loss ==
      0, RSI = 100.

      '
    - '[must] [action] Implement compute_macd(close: np.ndarray, fast: int = 12, slow: int = 26, signal: int = 9) -> dict:
      macd_line = EMA(close, fast) - EMA(close, slow), signal_line = EMA(macd_line, signal), histogram = macd_line - signal_line.
      Use exponential moving average: EMA[t] = close[t] * k + EMA[t-1] * (1-k) where k = 2/(period+1). NaN for t < slow.

      '
    - '[must] [action] Implement compute_momentum_group(close: np.ndarray, n: int, rsi_window: int, macd_fast: int, macd_slow:
      int, macd_signal: int) -> dict with keys: momentum_N, roc_N, rsi_N, macd, macd_signal, macd_histogram. All NaN at start
      for insufficient lookback. SWING defaults: n=10, rsi_window=14, macd_fast=12, macd_slow=26, macd_signal=9.

      '
    - '[must] [action] Causality: RSI at t uses only gain[t] and loss[t] derived from close[t]-close[t-1]. MACD at t uses
      EMA up to and including close[t]. No future bars accessed. The EMA smoothing is recursive and causal by construction.

      '
    - '[must] [action] MACD histogram sign convention: positive histogram = macd_line above signal_line (bullish momentum).
      Negative = bearish. Verify with known values from a reference dataset to ensure formula correctness.

      '
    - '[must] [action] Do NOT use pandas ewm(), pandas rolling(), or ta-lib. All EMA and rolling computations must use numpy
      only for reproducibility and zero external dependency footprint.

      '
