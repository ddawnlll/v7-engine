- id: WS-04-WRITER
  title: Implement DatasetWriter — deterministic Parquet/CSV serialization with SHA-256 checksum and roundtrip verification
  objective: Implement DatasetWriter — deterministic Parquet/CSV serialization with SHA-256 checksum and roundtrip verification
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/src/alphaforge/dataset/writer.py with DatasetWriter class satisfying contracts.py
      protocol.'
    - '[must] [action] Implement write(dataset: List[LabeledDataset], path: str) -> str. Serialize to path. Preferred: Parquet
      (pyarrow). Fallback: CSV. Deterministic rules: (a) rows sorted by (symbol, feature_timestamp); (b) columns in fixed
      order (row_id, symbol, feature_timestamp, label_timestamp, mode, feature columns sorted alphabetically, label columns
      sorted alphabetically, lineage columns); (c) Parquet: disable implementation-varying statistics; (d) CSV: consistent
      float formatting (''%.10g'').'
    - '[must] [action] SHA-256 checksum: compute over exact bytes written to disk using hashlib.sha256(). Return hex digest
      string.'
    - '[must] [action] Implement read(path: str) -> List[LabeledDataset]. Auto-detect format by extension (.parquet or .csv).
      Reconstruct LabeledDataset instances.'
    - '[must] [action] Implement verify_roundtrip(path: str, original_dataset: List[LabeledDataset]) -> bool. Read file, compare
      field-by-field with original. Return True if identical. On mismatch, provide diff summary (which rows differ, which
      fields).'
    - '[must] [action] Degrade gracefully if pyarrow unavailable: CSV fallback with logged warning ''Parquet not available;
      using CSV fallback. Install pyarrow for preferred format.'''
    - '[must] [action] Do NOT import xgboost, sklearn, or any model-training library.'
    allowedFiles:
    - alphaforge/src/alphaforge/dataset/__init__.py
    - alphaforge/src/alphaforge/dataset/contracts.py
    - alphaforge/src/alphaforge/dataset/writer.py
    forbiddenFiles:
    - alphaforge/src/alphaforge/dataset/assembler.py
    - alphaforge/src/alphaforge/dataset/lineage.py
    - alphaforge/tests/**
    - integration/tests/**
    dependencies:
    - WS-04-CONTRACT
