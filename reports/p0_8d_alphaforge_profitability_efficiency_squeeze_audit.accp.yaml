executive_summary:
  strongest_parts:
    - "Authority separation is LOCKED and unambiguous: AlphaForge discovers, V7 decides, Simulation measures truth (discovery_authority.md:57-71; decision_log DEC-AF-001/004/006; handoff_to_v7.md:86-98). No trade commands, no live orders, no cost bypass."
    - "Label truth is REAL: SimulationOutput (models.py + simulation_output.schema.json) carries realized_r_gross/net, fee_cost_r, slippage_cost_r, total_cost_r, path_metrics.mfe_r/mae_r, no_trade_quality (4-way), best_action, is_ambiguous, resolution_status. simulation_to_alphaforge.md mapping is accurate against the implementation."
    - "R-normalized cost functions are implemented and wired (costs.py:32-90; engine.py:40-46, realized_r_net = gross - total_cost_r). Cost-aware labels are not a plan, they run."
    - "NO_TRADE is a first-class comparator with saved_loss/missed_opportunity scores and mandatory rejection when NO_TRADE beats directional (label_contract.md:82-91; alpha_thesis_lifecycle.md:77-91)."
    - "12 explicit falsifiable rejection rules + alpha_thesis requires rejection_criteria (alpha_thesis_lifecycle.md:77-91; alpha_thesis.schema.json required rejection_criteria)."
    - "Fixtures are HONEST dummies: zero metrics, NO_TRADE dominates, verdict CONTINUE_RESEARCH/BASELINE_WEAK, REVIEW_REQUIRED — no fake profitability (scalp fixture:64-91; research_report fixture:34-41; handoff fixture:23,36)."
    - "lib primitives are causal (trailing windows only, no lookahead) — leakage risk is at the consumption layer, not in lib."
  weakest_parts:
    - "CRITICAL: AlphaForge->V7 handoff gate mapping uses wrong G0-G10 numbering vs V7 evaluation.md (G5=Cost Resilience vs V7 G3=COST_STRESS; G8=Calibration vs V7 G6; G9=No-Trade vs V7 G9=TINY_LIVE). Encoded into v7_handoff_package.schema.json and fixture."
    - "CRITICAL: AlphaForge primary timeframes (SCALP 1m/5m, AGGRESSIVE_SCALP 1m/3m/5m) contradict locked simulation profiles + V7 thesis (SCALP 1h, AGGRESSIVE_SCALP 15m). Features would be built for timeframes with no labels."
    - "Report schemas too loose: mode_research_report enforces 16 top-level sections but NONE of the cost_stress/no_trade/regime/metrics payload (empty objects pass). v7_handoff v7_gate_mapping allows empty {}."
    - "Zero contract enforcement by tests: no jsonschema.validate anywhere; 10 new AlphaForge schemas have no parity/fixture-conformance coverage; a bad fixture passes as long as it parses as JSON."
    - "SCALP and AGGRESSIVE_SCALP (the PRIMARY profitability modes) have NO simulation tests — only SWING is golden-tested. Cost/label behavior for the modes most likely to be killed by costs is unverified."
    - "AlphaForgeLabel schema is thinner than label_contract: no gross R, no cost components, no no_trade_quality field — yet label_contract and simulation_to_alphaforge.md claim them."
    - "validation_contract misaligned with V7 gates: 5/3 folds vs V7 6; HIGH_VOL_* regime taxonomy vs V7 TREND_UP/DOWN/RANGE/TRANSITION; qualitative symbol stability vs V7 40%/60%; fee+slippage stress vs V7 fee+slippage+spread+funding."
    - "No multiple-hypothesis-testing / data-snooping control (no Bonferroni/FDR/deflated Sharpe) in validation_contract or V7 training.md."
    - "No cross-sectional / survivorship / UTC-grid data layer; lib market_data is single-symbol. Blocks AS-001 (lead-lag) and AS-004 (relative strength)."
  highest_profit_opportunities:
    - "Align feature/label timeframes to simulation profiles so SCALP/AGGRESSIVE_SCALP research actually has labels — highest ROI precondition for any primary-mode edge test."
    - "Add cross-sectional dataset layer + universe membership (legacy xgb doc names 20 high-liquidity symbols) to unlock AS-001 BTC/ETH lead-lag and AS-004 relative-strength surfaces."
    - "Tighten report schemas to enforce cost_stress / no_trade / regime / OOS payload so an economically empty report cannot pass — directly prevents false-positive promotion."
    - "Add SCALP/AGGRESSIVE_SCALP simulation tests + spread stress to get the first real cost-adjusted edge signal for the primary modes."
    - "Add MHT/data-snooping correction to validation to kill the biggest false-positive source in a multi-thesis discovery system."
  biggest_false_positive_risks:
    - "Loose mode_research_report schema: a report with empty cost_stress/no_trade_comparison/regime_breakdown passes validation and could be mistaken for evidence."
    - "Wrong gate mapping: a handoff package mapping evidence to non-existent V7 gates (G5=Cost, G9=No-Trade) could be accepted by a naive V7 consumer that trusts the labels."
    - "Timeframe misalignment: 1m/5m features evaluated against 1h labels would produce spurious edge from timestamp misalignment/lookahead."
    - "No MHT correction: testing many theses/features inflates apparent edge; without FDR/deflated Sharpe the 'best' candidate is likely overfit."
    - "Survivorship bias: single-symbol BTCUSDT-only fixtures + no delisting/universe handling biases any future backtest upward."
    - "SCALP/AGGR_SCALP cost model untested: an untested cost model for the highest-frequency modes could hide the exact slippage effect that kills them."
  top_decision:
    - "Do NOT start P0.9A yet. Run P0.8E targeted docs/contract patch first: fix gate mapping, fix timeframe stacks, tighten report schemas, complete AlphaForgeLabel + simulation_to_alphaforge.json, align validation_contract to V7 gates, add MHT control. Then P0.9A scaffold + fixture validators will enforce the correct, profitable contracts."
mode_profitability_matrix:
  SCALP:
    priority: "PRIMARY"
    potential_edge_sources:
      - "Mean-reversion and micro-trends on 1h primary (per V7 thesis); cost-adjusted expectancy gate REQUIRED (G3 SCALP >= 0.10R)."
      - "Volatility compression then expansion (AS-002) on 1h/15m refinement."
      - "Volume anomaly / sudden participation (AS-003)."
    kill_risks:
      - "Slippage on entry/exit dominates edge on small R targets (thesis:119)."
      - "Stale signals decay fast; high trade frequency multiplies fee impact."
      - "AlphaForge currently targets 1m/5m — no 1m/5m simulation labels exist (SCALP profile is 1h)."
    missing_requirements:
      - "Timeframe alignment to simulation SCALP profile (1h primary, 15m refinement)."
      - "SCALP simulation tests (none exist)."
      - "Spread stress in cost_stress (V7 G3 requires it)."
      - "6-fold walk-forward + TREND regime taxonomy alignment with V7 G2/G4."
