# ── Symbol universe (60 Binance USDT perpetual pairs) ─────────────
# Target: 60 symbols per v7 architecture ("up to 60 symbols").
# Grouped in 3 tiers for progressive scaling:
#   T1-T2 (10): minimal smoke test
#   + T3  (20): AlphaForge MVP first training
#   + T4  (40): expanded empirical validation
#   + T5  (60): full v7 target universe
symbols:
  # Tier 1 — Majors (2)
  - BTCUSDT
  - ETHUSDT
  # Tier 2 — Large Caps (8)
  - BNBUSDT
  - SOLUSDT
  - XRPUSDT
