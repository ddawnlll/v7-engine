  - id: AC-07-GM-07
    description: GateMappingError inherits from Exception (or AlphaForgeError) and its message includes both the list of offending
      gate names and a reference to handoff_to_v7.md for canonical gate names.
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
