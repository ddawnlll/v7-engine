- id: WS-09-FINAL-REPORT
  title: Final ACCP Evidence Report — Aggregate All Validation Results
  objective: Final ACCP Evidence Report — Aggregate All Validation Results
  implementation:
    instructions:
    - '[must] [aggregate] Aggregate all evidence from the 4 preceding workspaces: test suite outputs (7 commands), forbidden-diff
      scan results, profit-claim scan results, and training-artifact scan results. All 11 command outputs must be included
      in the evidence ledger.

      '
    - '[must] [verdict] Compute the composite PASS/FAIL verdict. Composite PASS requires: (a) all 7 test suite commands exit
      0, (b) CMD-discover-git-status shows clean source tree, (c) CMD-scan-forbidden-diff produces CLEAN, (d) CMD-scan-profit-claims
      produces CLEAN, (e) CMD-scan-training produces CLEAN, (f) CMD-list-model-artifacts produces CLEAN, (g) all prior subplan
      ACCP reports have INCONCLUSIVE profitability verdicts. Any single violation is a composite FAIL.

      '
    - '[must] [integrity] Hash all evidence items. Compute planHash, acceptanceCriteriaHash, commandPolicyHash, allowedFilesHash,
      and forbiddenFilesHash. Include all hashes in the ACCP report. The report must be independently verifiable from its
      hash chain.

      '
    - '[must] [report] Emit the final ACCP report to reports/accp/alphaforge_final_validation.accp.yaml following ACCP-YAML
      v2.0.0 format with all required keys: result (PASS or FAIL), scope_confirmation, files_changed, decisions_locked, remaining_holds,
      safe_next_step, commands_run (all 11 command executions with exit codes), evidence (aggregated from all 4 prior workspaces).
      The overall result must be PASS or FAIL — never INCONCLUSIVE for the composite gate.

      '
    - '[must] [evidence] Include per-workspace verdicts: workspace ID, title, PASS/FAIL status, acceptance criteria count
      passed/failed, and failure details with specific file paths, line numbers, and patterns matched. All evidence must trace
      to deterministic command outputs.

      '
    - '[must] [guidance] If composite PASS, safe_next_step is: "Proceed to bundle promotion review. All validation gates satisfied.
      All scans clean. All tests green. No profitability claims. No training artifacts. Bundle ready for V7 Policy Critic
      integration review." If composite FAIL, safe_next_step is: "BLOCKED. Do not promote. Fix violations and re-run final
      validation. See remaining_holds for blocking issues."

      '
    - '[must] [verify] Verify the emitted ACCP report file exists, is valid YAML, and contains all required sections. Hash
      the final report file and include the hash in the evidence ledger for self-verification.

      '
    allowedFiles:
    - reports/accp/**
    - plans/alphaforge/09_final_validation.plan.yaml
    forbiddenFiles:
    - alphaforge/src/**
    - alphaforge/tests/**
    - lib/**
    - simulation/**
    - runtime/**
    - interface/**
    - integration/tests/**
    - contracts/**
    - data/**
    - datasets/**
    - models/**
    - artifacts/**
    - .github/**
    dependencies:
    - WS-09-FORBIDDEN-DIFF
    - WS-09-NO-PROFIT
    - WS-09-NO-TRAINING
  artifactPolicy:
    class: generated_report
    wiringRequired: false
    reachabilityRequired: false
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
