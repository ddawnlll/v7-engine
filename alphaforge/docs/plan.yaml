  - "Create fixture for deterministic label dataset."
  - "Validate output using existing AlphaForge validator."
  antiPatterns:
  - "Creating labels without SimulationOutput lineage."
  - "Treating AlphaForge as economic truth authority."
  - "Removing funding DEFERRED hold."
  expectedOutputs:
