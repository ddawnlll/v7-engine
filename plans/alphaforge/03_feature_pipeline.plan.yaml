- id: WS-03-RETURNS
  title: 'Implement Returns Group: log_return, volatility, zscore'
  objective: 'Implement Returns Group: log_return, volatility, zscore'
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/src/alphaforge/features/__init__.py. Export: FeatureMatrix, compute_features, FeatureGroup
      enum, FEATURE_GROUP_MAP, PIPELINE_VERSION. Follow the authority boundary docstring pattern from existing alphaforge
      __init__.py files (__version__, __authority__).

      '
    - '[must] [action] Create alphaforge/src/alphaforge/features/pipeline.py. Define the FeatureGroup enum with members: RETURNS,
      VOLATILITY, ATR, MOMENTUM, VOLUME, BREAKOUT, LEAD_LAG (marked as DEFERRED with docstring). Define FeatureMatrix dataclass
      with fields: features (dict[str, np.ndarray]), timestamps (np.ndarray), symbol (str), mode (str), feature_group_ids
      (list[str]), metadata (dict).

      '
    - '[must] [action] Implement compute_log_return_1(close: np.ndarray) -> np.ndarray: r[t] = ln(close[t] / close[t-1]) for
      t >= 1, NaN at t=0. Implement compute_log_return_N(close: np.ndarray, n: int) -> np.ndarray: r[t] = ln(close[t] / close[t-n])
      for t >= n, NaN for t < n.

      '
    - '[must] [action] Implement compute_return_volatility(returns: np.ndarray, window: int) -> np.ndarray: rolling standard
      deviation of log returns over `window` bars. Use np.lib.stride_tricks.sliding_window_view or manual rolling computation.
      NaN for t < window. Implement compute_return_zscore(returns: np.ndarray, window: int) -> np.ndarray: (r[t] - mean(r[t-window:t]))
      / std(r[t-window:t]).

      '
    - '[must] [action] Implement compute_returns_group(close: np.ndarray, n: int, window: int) -> dict[str, np.ndarray]. Returns
      dict with keys: log_return_1, log_return_N, return_volatility_N, return_zscore_N. All arrays must be same length as
      input. Missing values at start of series are NaN (not zero-filled). This is the missing_policy: NaN for insufficient
      history.

      '
    - '[must] [action] Causality enforcement: log_return_1 at index t uses close[t] and close[t-1]. log_return_N at index
      t uses close[t] and close[t-n]. No bar beyond index t is accessed. Verify with explicit index-bound assertions in code
      comments.

      '
    - '[must] [action] Do NOT import: binance, ccxt, requests, urllib (external), xgboost, pandas, scipy, ta-lib, or any ML
      library. Only allowed imports: numpy, dataclasses, typing, enum, logging. Do NOT call any network API. Do NOT read from
      data/ or datasets/.

