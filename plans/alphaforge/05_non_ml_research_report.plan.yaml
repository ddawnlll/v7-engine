- id: WS-05-NO-TRADE
  title: 'WS-05-NO-TRADE: Implement analyze_no_trade_quality()'
  objective: 'WS-05-NO-TRADE: Implement analyze_no_trade_quality()'
  implementation:
    instructions:
    - '[must] [action] Implement analyze_no_trade_quality(labels: list[dict], mode: str, threshold: float = 0.5) -> dict in
      research.py.'
    - '[must] [action] Enumerate the 4 NO_TRADE subcategories: (1) NO_EDGE — simulation found no directional edge above noise,
      (2) COST_DOMINATED — gross edge positive but net edge negative after costs, (3) AMBIGUOUS — label validity insufficient
      to assign direction, (4) EXCLUDED — data quality or scope filter excluded the bar. Each subcategory must carry name,
      count, and pct fields.'
    - '[must] [action] Return shape: {total_no_trade: int, no_trade_pct: float, subcategories: [{name: str, count: int, pct:
      float}] (exactly 4 entries), dominates_directional: bool, directional_pct: float, summary: str}.'
    - '[must] [action] Set dominates_directional = True when no_trade_pct > threshold AND no_trade_pct > max(long_pct, short_pct).
      Default threshold 0.5 (50%).'
    - '[must] [action] When label data lacks subcategory detail (scaffold fixture case), assign all NO_TRADE labels to NO_EDGE
      subcategory and document the limitation in the summary string.'
    - '[must] [action] Handle empty input gracefully — return zeros with total_no_trade=0, all four subcategories with count=0
      and pct=0.0, dominates_directional=False.'
    allowedFiles:
    - alphaforge/src/alphaforge/reports/research.py
    forbiddenFiles:
    - lib/**
    - simulation/**
    - runtime/**
    - interface/**
    - alphaforge/src/alphaforge/reports/builders.py
    dependencies:
    - WS-05-LABEL-DISTRIBUTION
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
