- id: WS-03-VOLUME-BREAKOUT
  title: Implement Volume Group and Breakout Group
  objective: Implement Volume Group and Breakout Group
  implementation:
    instructions:
    - '[must] [action] Implement Volume group functions. compute_volume_ratio(volume: np.ndarray, window: int) -> np.ndarray:
      volume_ratio[t] = volume[t] / mean(volume[t-window:t]). compute_volume_trend(volume: np.ndarray, window: int) -> np.ndarray:
      linear regression slope of volume[t-window:t] vs bar index -- positive slope = increasing volume trend. Implement compute_vwap_deviation(high,
      low, close, volume) -> np.ndarray: deviation from VWAP = (close - VWAP) / VWAP where VWAP = cumulative(typical_price
      * volume) / cumulative(volume). Implement compute_obv(close, volume) -> np.ndarray: OBV[t] = OBV[t-1] + volume[t] if
      close[t] > close[t-1], -volume[t] if close[t] < close[t-1], else 0.

      '
    - '[must] [action] Implement compute_volume_group(high, low, close, volume, window) -> dict with keys: volume_ratio_N,
      volume_trend_N, vwap_deviation, obv_N. All NaN at start for insufficient lookback. VWAP starts accumulating from bar
      0. OBV starts at 0 at bar 0.

      '
    - '[must] [action] Implement Breakout group functions. compute_bollinger_bands(close: np.ndarray, window: int = 20, num_std:
      float = 2.0) -> tuple: middle = SMA(close, window), upper = middle + num_std * std, lower = middle - num_std * std.
      compute_bb_position(close, upper, middle, lower) -> np.ndarray: (close - lower) / (upper - lower), clamped to [0, 1].
      compute_bb_width(upper, middle, lower) -> np.ndarray: (upper - lower) / middle.

      '
    - '[must] [action] Implement compute_highest(high: np.ndarray, window: int) -> np.ndarray: rolling maximum of high over
      `window` bars. compute_lowest(low: np.ndarray, window: int) -> np.ndarray: rolling minimum. Implement compute_range_breakout(close,
      high, low, window) -> np.ndarray: breakout signal = (close - lowest_N) / (highest_N - lowest_N) where highest_N and
      lowest_N are rolling over `window` bars. Values in [0, 1]; >0.7 suggests near resistance, <0.3 suggests near support.

      '
    - '[must] [action] Implement compute_breakout_group(high, low, close, window, bb_window, bb_num_std) -> dict with keys:
      bb_position, bb_width, highest_N, lowest_N, range_breakout_N. All NaN at start for insufficient lookback.

      '
    - '[must] [action] Causality verification: all rolling windows at t use bars [t-window+1 .. t]. Bollinger Bands at t use
      close[t-window+1 .. t]. range_breakout at t uses highest_N[t] and lowest_N[t] which are computed from bars up to t.
      No future bars in any computation.

      '
    - '[must] [action] Document that Lead-Lag features (tf_alignment, correlation_N, lead_lag_score) are NOT implemented in
      the volume/breakout group or anywhere else. The FeatureGroup.LEAD_LAG enum member exists for contract completeness but
      maps to a DEFERRED sentinel. No feature computation function exists for Lead-Lag.

      '
    - '[must] [action] Implement compute_features() -- the main pipeline entry point. It accepts ohlcv_data (dict with open,
      high, low, close, volume as np.ndarrays), mode (str), and timeframe_stack (dict). Returns FeatureMatrix. Internally
      calls each group''s compute function, validates array length consistency, applies missing_policy (NaN preservation),
      and assembles the FeatureMatrix.

      '
    allowedFiles:
