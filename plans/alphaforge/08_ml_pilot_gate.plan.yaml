- id: WS-08-VERDICT
  title: Implement GateVerdict and check_all_prerequisites()
  objective: Implement GateVerdict and check_all_prerequisites()
  implementation:
    instructions:
    - '[must] [action] Define GateVerdict enum with exactly three members: PASS (all 8 satisfied), HOLD (non-critical incomplete),
      FAIL (critical missing). Each member carries human-readable label and machine-readable code.

      '
    - '[must] [action] Implement check_all_prerequisites(registry: PrerequisiteRegistry) -> GateVerdict. Iterate all conditions.
      Any critical=False -> FAIL. Any non-critical=False -> HOLD. All True -> PASS. FAIL takes precedence over HOLD when both
      types fail.

      '
    - '[must] [action] Implement get_failed_prerequisites(registry) -> list[PrerequisiteResult]. For each False condition,
      capture prereq_id, description, passed=False, critical flag, missing_evidence (list[str]), release_condition (str).

      '
    - '[must] [action] Define PrerequisiteResult dataclass: prereq_id (str), description (str), passed (bool), critical (bool),
      missing_evidence (list[str]), release_condition (str).

      '
    - '[must] [action] Ensure determinism: same registry state always yields same verdict. No random, timestamp, or env-var
      logic in check_all_prerequisites().

      '
    - '[must] [action] Guard against bypass: function accepts only registry parameter. No override flags, skip lists, whitelist
      parameters, or env-var reads. Verdict must be computed, not read from config.

      '
    allowedFiles:
    - alphaforge/src/alphaforge/gates/**
    forbiddenFiles:
    - alphaforge/src/alphaforge/training/**
    - alphaforge/src/alphaforge/models/**
    - alphaforge/src/alphaforge/inference/**
    - lib/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    - data/**
    - datasets/**
    - models/**
    dependencies:
    - WS-08-PREREQUISITES
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-08-008
    description: 'GateVerdict enum defined with exactly three members: PASS, HOLD, FAIL, each with human-readable label and
      machine-readable code'
    level: required
