- id: WS-04-LINEAGE
  title: Implement lineage tracking — provenance refs on every row, checksum chain verification
  objective: Implement lineage tracking — provenance refs on every row, checksum chain verification
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/src/alphaforge/dataset/lineage.py with LineageTracker class.'
    - '[must] [action] Implement build_provenance(label_row, feature_spec, label_spec, manifest_id) -> LineageProvenance.
      Extract: source_manifest_id from manifest_id param, label_checksum from label_row (or compute SHA-256 over canonical
      JSON of label fields if not present), feature_spec_version from feature_spec[''feature_set_id''], feature_set_id, label_dataset_id,
      simulation_profile_id, assembled_at (ISO 8601 UTC now).'
    - '[must] [action] Integrate into DatasetAssembler.assemble(): after constructing each LabeledDataset row, call LineageTracker.build_provenance()
      and attach result to row.lineage.'
    - '[must] [action] label_checksum computation: if label_row carries pre-computed checksum use it; otherwise SHA-256 over
      canonical JSON of label fields (sorted keys, deterministic float formatting).'
    - '[must] [action] If any required lineage field cannot be populated (missing manifest_id, missing feature_set_id), raise
      LineageError with explicit field name — never use placeholder values.'
    - '[must] [action] LineageProvenance must be frozen (immutable after construction). Use frozen=True on dataclass.'
    - '[must] [action] Do NOT import xgboost, sklearn, or any model-training library.'
