              sources_in_tension:
              - '{{source_id_or_none}}'
              resolution: '{{how_conflict_was_handled}}'
              confidence: '{{high_medium_low}}'
          applicability_to_target_system:
            summary: '{{fill_applicability_analysis}}'
            items:
            - id: '{{applicability_id}}'
              external_finding: '{{finding}}'
              applicability: '{{direct_partial_weak_not_applicable}}'
              reason: '{{reason}}'
              implementation_risk: '{{low_medium_high}}'
              confidence: '{{high_medium_low}}'
        compiler_expectations:
          source_path: reports/accp/{{plan_id}}/source/{{report_id}}.accp.yaml
          compiled_json: reports/accp/{{plan_id}}/compiled/{{report_id}}.compiled.json
          ir_json: reports/accp/{{plan_id}}/ir/{{report_id}}.ir.json
          gate_verdict_json: reports/accp/{{plan_id}}/verdict/{{report_id}}.gate-verdict.json
          route_signal_json: reports/accp/{{plan_id}}/route/{{report_id}}.route-signal.json
  final_generation_checklist:
  - output_is_valid_yaml
  - no_markdown_headings
  - no_markdown_fences
  - all_required_fields_present
  - all_target_report_types_generated
  - all_report_ids_unique
  - all_validation_claims_have_command_evidence
  - all_mutation_reports_have_diff_integrity
  - all_mutation_reports_have_rollback_plan
  - critical_blockers_emit_or_recommend_hir
  - runtime_will_compile_yaml_before_use
  - all_research_reports_have_source_inventory
  - all_research_reports_have_cited_claims
  - all_source_backed_claims_have_source_refs
  - no_uncited_nontrivial_research_claims
  - no_profitability_claims_from_academic_or_backtest_only_sources
