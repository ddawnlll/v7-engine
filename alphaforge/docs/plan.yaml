  - "integration/tests/test_alphaforge_label_adapter.py"
  artifactPolicy:
  class: "library_code"
  wiringRequired: "consumer_or_export"
  reachabilityRequired: true
  executionRequired: true
  deterministicEvidenceRequired: true
  integrationContract:
  mode: "consumer_or_export"
  reason: "Label adapter is consumed by feature/report research pipeline."
  declaredUnits:
