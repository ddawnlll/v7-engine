tasks:
  - id: "fix-atr"
    title: "Fix close-close ATR to True Range ATR"
    objective: "Replace close-close difference with canonical True Range formula in ATR computation for triple-barrier labels"
    implementation:
      instructions:
        - "In walk_forward_runner.py line 386, replace np.diff(close) with vectorized True Range using high/low/close arrays"
        - "In train.py _generate_labels_numba loop (line 334), replace close[k]-close[k-1] with max(high-low, |high-prev_close|, |low-prev_close|)"
      allowedFiles:
        - "alphaforge/src/alphaforge/validation/walk_forward_runner.py"
        - "alphaforge/src/alphaforge/train.py"
    artifactPolicy:
      class: "library_code"
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: "ac-1"
        description: "walk_forward_runner.py ATR uses True Range not close-close diff"
        criteria:
          - "ATR computed as mean of max(high[t]-low[t], |high[t]-close[t-1]|, |low[t]-close[t-1]|)"
          - "high_arr and low_arr are used, not just close_arr"
      - id: "ac-2"
        description: "train.py _generate_labels_numba ATR uses True Range"
        criteria:
          - "Loop computes tr = max(high[k]-low[k], |high[k]-close[k-1]|, |low[k]-close[k-1]|)"
          - "atr_sum accumulates tr not close-close diff"
      - id: "ac-3"
        description: "Full test suite passes with fix"
        criteria:
          - "927+ tests pass, 0 failures"

