# =============================================================================
# COMMANDS
# =============================================================================

commands:
  allowed:
    - id: CMD-discover-git-status
      kind: discovery
      command: git status --porcelain
      evidenceRequired: true
      timeoutSeconds: 30
      networkAllowed: false
      shellAllowed: true

    - id: CMD-test-alphaforge
      kind: targeted_test
      command: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/ -q
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: CMD-test-integration-alphaforge
      kind: targeted_test
      command: PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_alphaforge_*.py -q
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: CMD-test-contract-registry-schema
      kind: targeted_test
      command: PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_contract_registry.py integration/tests/test_schema_parity.py -q
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: CMD-test-import-boundaries
      kind: targeted_test
      command: PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/test_import_boundary.py integration/tests/test_cross_domain_boundaries.py simulation/tests/test_import_boundary.py -q
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: CMD-test-simulation
      kind: targeted_test
      command: PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/ -q
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

    - id: CMD-final-validation
      kind: final_validation
      command: PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ alphaforge/tests/ -q --ignore=lib/tests/test_market_data_binance.py
      evidenceRequired: true
      timeoutSeconds: 300
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

  denied:
    - id: DCMD-no-curl
      command: curl
      reason: "No external network or market data during deterministic AlphaForge implementation."

    - id: DCMD-no-wget
      command: wget
      reason: "No external downloads."

    - id: DCMD-no-binance
      command: "exchange/live trading pattern"
      pattern: "binance|exchange|api_key|live_order|create_order|market_order"
      reason: "No exchange/live trading behavior allowed."

    - id: DCMD-no-xgboost-training
      command: "model training pattern"
      pattern: "xgboost|XGBClassifier|XGBRegressor|fit\\(|import xgboost"
      reason: "No model training in deterministic scaffold plan."

# =============================================================================
# EVIDENCE
# =============================================================================

evidence:
  ledgerRequired: true
  requiredEvidenceTypes:
    - diff
    - source
    - wiring
    - command
    - test_output
    - schema_validation
    - report
  hashWhenAvailable: true
  forbiddenEvidence:
    - phantom_evidence
    - invented_command_results
    - invented_hashes
    - profitability_claim_without_evidence

# =============================================================================
# GATES
# =============================================================================

gates:
  sequence:
    - SchemaGate
    - LockGate
    - EvidenceGate
    - WiringGate
    - ExecGate
    - FinalGate

  verdicts:
    - PASS
    - HOLD
    - FAIL

  reasonCodes:
    SchemaGate:
      - PLAN_SCHEMA_INVALID
      - UNKNOWN_TOP_LEVEL_KEY
      - TASK_SCHEMA_INVALID
    LockGate:
      - PLAN_NOT_LOCKED
      - ACCEPTANCE_CRITERIA_HASH_MISSING
      - COMMAND_POLICY_HASH_MISSING
    EvidenceGate:
      - REQUIRED_EVIDENCE_MISSING
      - COMMAND_OUTPUT_MISSING
      - PHANTOM_EVIDENCE_DETECTED
      - PROFITABILITY_CLAIM_WITHOUT_EVIDENCE
    WiringGate:
      - ORPHAN_MODULE
      - EXPORT_SURFACE_MISSING
      - USAGE_PROOF_MISSING
      - FORBIDDEN_IMPORT_BOUNDARY
    ExecGate:
      - TEST_COMMAND_FAILED
      - NO_TESTS_FOUND
      - FORBIDDEN_COMMAND_USED
      - NETWORK_USED_WHEN_FORBIDDEN
    FinalGate:
      - FINAL_VALIDATION_FAILED
      - REMAINING_REQUIRED_CRITERIA
      - REPORT_MISSING
      - HOLD_REQUIRES_REPAIR_PACKET

# =============================================================================
# REPAIR
# =============================================================================

repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3

# =============================================================================
# LOCKING
# =============================================================================

locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/alphaforge_master_execution_plan.lock.json
  hashes:
    planHash: "TO_BE_COMPUTED_AFTER_PLAN_LOCK"
    acceptanceCriteriaHash: "TO_BE_COMPUTED_AFTER_PLAN_LOCK"
    artifactPolicyHash: "TO_BE_COMPUTED_AFTER_PLAN_LOCK"
    integrationContractHash: "TO_BE_COMPUTED_AFTER_PLAN_LOCK"
    commandPolicyHash: "TO_BE_COMPUTED_AFTER_PLAN_LOCK"
    allowedFilesHash: "TO_BE_COMPUTED_AFTER_PLAN_LOCK"
    forbiddenFilesHash: "TO_BE_COMPUTED_AFTER_PLAN_LOCK"

# =============================================================================
# REPORTS
# =============================================================================

reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
  expectedReports:
    - id: ACCP-BASELINE-VERIFY
      taskId: TASK-00-BASELINE-VERIFY
      reportType: TVR
      description: "Baseline verification test results"
    - id: ACCP-DATA-MANIFEST
      taskId: TASK-01-DETERMINISTIC-DATA-MANIFEST
      reportType: IPR
      description: "Data manifest implementation report"
    - id: ACCP-LABEL-ADAPTER
      taskId: TASK-02-SIMULATION-DERIVED-LABEL-ADAPTER
      reportType: IPR
      description: "Label adapter implementation report"
    - id: ACCP-FEATURE-PIPELINE
      taskId: TASK-03-MINIMAL-DETERMINISTIC-FEATURE-PIPELINE
      reportType: IPR
      description: "Feature pipeline implementation report"
    - id: ACCP-DATASET-ASSEMBLER
      taskId: TASK-04-DATASET-ASSEMBLER-AND-WRITER
      reportType: IPR
      description: "Dataset assembler implementation report"
    - id: ACCP-RESEARCH-REPORT
      taskId: TASK-05-NON-ML-RESEARCH-REPORT-PATH
      reportType: IPR
      description: "Non-ML research report implementation report"
    - id: ACCP-WALK-FORWARD
      taskId: TASK-06-WALK-FORWARD-VALIDATION-SKELETON
      reportType: IPR
      description: "Walk-forward validation skeleton implementation report"
    - id: ACCP-HANDOFF-DRY-RUN
      taskId: TASK-07-V7-HANDOFF-DRY-RUN
      reportType: IPR
