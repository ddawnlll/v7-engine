planSpecVersion: "0.1.0"
kind: ImplementationPlan
profile: praxis-v0.1
metadata:
  planId: TR-08-FINAL-TRAINING-READINESS-AUDIT
  title: "Plan 08 — Final Training Readiness Audit"
  description: >
    Run final comprehensive validation. Compute updated readiness
    percentages. Enforce strict truth rules: skip != training-ready,
    scaffold != training-ready, WFV splitter != empirical WFV, V7
    docs != V7 implementation. Emit final ACCP report with explicit
    per-dimension ready-now booleans. No false claims.
  createdAt: "2026-06-25T00:00:00Z"
  humanId: TrainingReady
  status: draft
authority:
  executor: ClaudeCode
  completionAuthority: PraxisTruthKernel
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: imported_human
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false
workspace:
  root: .
  allowedFiles:
    - reports/accp/**
    - plans/training_ready/08_final_training_readiness_audit.plan.yaml
  forbiddenFiles:
    - lib/**
    - simulation/**
    - alphaforge/src/**
    - alphaforge/tests/**
    - v7/src/**
    - v7/tests/**
    - runtime/**
    - data/**
    - models/**
    - artifacts/**
execution:
  mode: single_session
  agent: claude-code
  autonomy: analysis_only
  canModifyCode: false
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 1
tasks:
  - id: WS-TR08-01
    title: Run Full Validation Suite
    objective: "Execute full non-Binance test suite. Run contract and boundary tests. Record exact counts."
    implementation:
      instructions:
        - "[must] Run CMD-full-tests — confirm exit 0 and 0 failures."
        - "[must] Run CMD-contract-tests — confirm exit 0."
        - "[must] Run CMD-boundary-tests — confirm exit 0."
        - "[must] Run CMD-forbidden-scan — confirm clean."
        - "[must] If any command fails, mark domain as FAIL."
      expectedOutputs: ["Test pass/fail/skip counts"]
    artifactPolicy:
      class: generated_report
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR08-01
        description: "Full non-Binance test suite passes (0 failures)"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-full-tests}
        requiredEvidence: [command, test_output]
      - id: AC-TR08-02
        description: "Contract registry and schema parity tests pass"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-contract-tests}
        requiredEvidence: [command, test_output]
      - id: AC-TR08-03
        description: "Import boundary tests pass across all domains"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-boundary-tests}
        requiredEvidence: [command, test_output]
  - id: WS-TR08-02
    title: Compute Updated Readiness Percentages
    objective: "Read all TR ACCP reports. Compute each readiness dimension honestly. Apply strict truth rules."
    implementation:
      instructions:
        - "[must] Read all TR-00 through TR-07 ACCP reports."
        - "[must] Compute each dimension. Use same weights as Reality Gap Audit."
        - "[must] STRICT TRUTH RULES (enforce all):"
        - "[must] RULE-1: scaffold pass != training-ready"
        - "[must] RULE-2: skipped XGBoost != training-ready (HOLD_NO_XGBOOST → training_ready=false)"
        - "[must] RULE-3: WFV fold splitter != empirical WFV (metrics still NOT_EVALUATED → wfv_ready=false)"
        - "[must] RULE-4: V7 docs != V7 implementation (no v7/src/ → v7_policy_ready=false)"
        - "[must] RULE-5: dry-run handoff != policy acceptance (no PolicyDecision execution → v7_ready=false)"
        - "[must] RULE-6: If no model artifact produced by real gated training, training_readiness_percent must not exceed 30."
        - "[must] RULE-7: If no empirical WFV metrics from trained model, overall_quant_pipeline_readiness must not claim training-ready."
        - "[must] Emit exact per-dimension boolean: training_ready_now, backfill_ready_now, real_data_ready_now, simulation_bridge_ready_now, empirical_wfv_ready_now, v7_policy_ready_now, ops_ready_now."
      expectedOutputs: ["Readiness percentages per dimension", "Per-dimension ready-now booleans"]
    artifactPolicy:
      class: generated_report
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR08-04
        description: "Scaffold completion percent computed (>= baseline 92)"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
      - id: AC-TR08-05
        description: "Backfill readiness percent computed (>= 70 if TR-01 PASS, else < 70)"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
      - id: AC-TR08-06
        description: "Training readiness: false if XGBoost skipped or no model artifact"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
      - id: AC-TR08-07
        description: "WFV readiness: false if metrics still NOT_EVALUATED"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
      - id: AC-TR08-08
        description: "V7 policy readiness: false if no v7/src/ implementation"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
  - id: WS-TR08-03
    title: Emit Final ACCP Report
    objective: "Generate reports/accp/training_ready_final_audit.accp.yaml with exact scorecard and per-dimension booleans."
    implementation:
      instructions:
        - "[must] Generate final ACCP report with full scorecard."
        - "[must] Include training_ready_now: boolean."
        - "[must] Include backfill_ready_now: boolean."
        - "[must] Include real_data_ready_now: boolean."
        - "[must] Include simulation_bridge_ready_now: boolean."
        - "[must] Include empirical_wfv_ready_now: boolean."
        - "[must] Include v7_policy_ready_now: boolean."
        - "[must] Include ops_ready_now: boolean."
        - "[must] Compare against baseline 24.5% from Reality Gap Audit."
        - "[must] No profitability claims. No live-readiness claims."
        - "[must] List all remaining holds."
      expectedOutputs: ["reports/accp/training_ready_final_audit.accp.yaml"]
    artifactPolicy:
      class: generated_report
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR08-09
        description: "Final ACCP report generated with full scorecard"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: file_exists, path: reports/accp/training_ready_final_audit.accp.yaml, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [source]}
        requiredEvidence: [source]
      - id: AC-TR08-10
        description: "Final report includes per-dimension ready-now booleans"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: file_contains, path: reports/accp/training_ready_final_audit.accp.yaml, patterns: ["training_ready_now", "backfill_ready_now", "real_data_ready_now", "simulation_bridge_ready_now", "empirical_wfv_ready_now", "v7_policy_ready_now", "ops_ready_now"], deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [source]}
        requiredEvidence: [source]
commands:
  exactAllowedCommands:
    - id: CMD-full-tests
      kind: final_validation
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ alphaforge/tests/ -q --ignore=lib/tests/test_market_data_binance.py"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 300
      noTestsFoundIsFailure: false
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-contract-tests
      kind: final_validation
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_contract_registry.py integration/tests/test_schema_parity.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-boundary-tests
      kind: final_validation
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/test_import_boundary.py integration/tests/test_cross_domain_boundaries.py simulation/tests/test_import_boundary.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-forbidden-scan
      kind: discovery
      command: "grep -RInE 'xgboost|XGBClassifier|XGBRegressor|\\.fit\\(|create_order|market_order|profitable.*PASS|live_ready' lib/ simulation/ alphaforge/src/ v7/src/ 2>/dev/null | grep -v 'EXPLICIT_GBM_BLOCK' | grep -v 'DCMD-no' | grep -v 'def test' | head -20 || echo 'FORBIDDEN_SCAN_CLEAN'"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 30
      noTestsFoundIsFailure: false
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: curl
      pattern: "^curl\\s"
      reason: "No network in final audit."
    - command: code modification
      pattern: "Edit|Write"
      reason: "Read-only audit — no code changes."
    - command: profitability
      pattern: "profitable|guaranteed|live_ready"
      reason: "No profitability or live-readiness claims."
evidence:
  ledgerRequired: true
  requiredEvidenceTypes: [command, test_output, source, report]
  hashWhenAvailable: true
gates:
  sequence: [SchemaGate, LockGate, EvidenceGate, WiringGate, ExecGate, FinalGate]
  verdicts: [PASS, HOLD, FAIL]
  reasonCodes:
    SchemaGate: [PLAN_SCHEMA_INVALID]
    LockGate: [PLAN_NOT_LOCKED]
    EvidenceGate: [REQUIRED_EVIDENCE_MISSING, REPORT_MISSING, SKIP_TREATED_AS_READY]
    WiringGate: [FORBIDDEN_IMPORT_BOUNDARY]
    ExecGate: [TEST_COMMAND_FAILED, NO_TESTS_FOUND]
    FinalGate: [FINAL_VALIDATION_FAILED, REMAINING_REQUIRED_CRITERIA, TRAINING_READY_FALSE]
repair:
  enabled: false
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 0
  reverifyCommand: "PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ alphaforge/tests/ -q --ignore=lib/tests/test_market_data_binance.py"
  repairPacketFormat: {json: true, markdown: true}
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/training_ready/08_final_training_readiness_audit.lock.json
  hashes: [planHash, acceptanceCriteriaHash, artifactPolicyHash, commandPolicyHash, allowedFilesHash, forbiddenFilesHash]
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
