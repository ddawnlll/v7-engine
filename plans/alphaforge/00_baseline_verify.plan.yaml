tasks:
- id: WS-00-VERIFY-BASELINE
  title: Verify P0.8E/P0.9A Baseline Cleanliness
  objective: 'Single verification workspace. Runs all 7 allowed commands sequentially, captures evidence, performs forbidden
    file and forbidden pattern scans, and emits a single ACCP-YAML report. No files are modified. If any command fails, the
    workspace halts and reports the failure.

    '
  implementation:
    instructions:
    - '[must] [schema_validation] PHASE 0 — SELF-VALIDATION. Before executing any command, validate this subplan file (plans/alphaforge/00_baseline_verify.plan.yaml)
      against template.yaml. Confirm all 15 required root keys are present, planSpecVersion is exactly "0.1.0", kind
      is "ImplementationPlan", and all nested required fields are satisfied. Record the validation outcome.

      '
    - '[must] [discovery] PHASE 1 — GIT CLEANLINESS. Run CMD-discover-git-status. Inspect the output. The only expected untracked
      paths are under plans/ and reports/. If any file under alphaforge/src/, alphaforge/tests/, lib/, simulation/, runtime/,
      interface/, data/, datasets/, models/, artifacts/, or .github/ appears as modified (M), deleted (D), or untracked (??),
      this is a HARD FAILURE. Record full git status output as evidence.

      '
    - '[must] [targeted_test] PHASE 2 — P0.8E INTEGRATION TESTS. Run CMD-test-integration-alphaforge. This executes all 7
      integration test files for AlphaForge: test_alphaforge_contract_loader.py, test_alphaforge_contract_semantics.py, test_alphaforge_fixture_validation.py,
      test_alphaforge_handoff_builder.py, test_alphaforge_report_builders.py, test_alphaforge_scaffold_imports.py, test_alphaforge_schema_strictness.py.
      All must pass. Capture stdout, stderr, and exit code. If any test fails, STOP — do not proceed.

      '
    - '[must] [targeted_test] PHASE 3 — CONTRACT REGISTRY AND SCHEMA PARITY. Run CMD-test-contract-registry-schema. This validates
      that contracts/registry.json is consistent, all registered contract files exist on disk, and all schema files parse
      as valid JSON Schema. All tests must pass.

      '
    - '[must] [targeted_test] PHASE 4 — IMPORT BOUNDARIES. Run CMD-test-import-boundaries. This validates that lib/ does not
      import from alphaforge/v7/simulation, that cross-domain imports respect the truth hierarchy (simulation > realized >
      contract > runtime > model), and that no circular imports exist. All tests must pass.

      '
    - '[must] [targeted_test] PHASE 5 — SIMULATION TESTS. Run CMD-test-simulation. This executes all simulation tests (costs,
      indicators, market data contracts, market data quality, time utilities). All tests must pass. Simulation owns economic
      truth — any failure here invalidates the entire baseline.

      '
    - '[should] [targeted_test] PHASE 6 — ALPHAFORGE UNIT TESTS (INFORMATIONAL). Run CMD-test-alphaforge. At P0.8E/P0.9A baseline,
      alphaforge/tests/ is expected to contain no test files. The command may report "no tests collected." This is EXPECTED
      and does not indicate a failure. Record the output as informational evidence. If tests ARE found, they must pass.

      '
    - '[must] [final_validation] PHASE 7 — FINAL COMPREHENSIVE VALIDATION. Run CMD-final-validation. This executes the full
      test suite (lib, integration, simulation, alphaforge) in a single pass, excluding only the Binance market data test
      which requires network. All collected tests must pass with exit code 0. This is the authoritative pass/fail signal for
      the baseline.

      '
    - '[must] [security_scan] PHASE 8 — FORBIDDEN PATTERN SCAN. After all test commands pass, perform a forbidden pattern
      scan across all source directories. Search for: (a) xgboost imports or usage, (b) XGBClassifier/XGBRegressor references,
      (c) fit() calls on ML models, (d) profitability claims or profit assertions, (e) live trading references, (f) exchange
      API key patterns. Use grep or similar read-only discovery. Any match is a HARD FAILURE. Record scan results as evidence.

      '
    - '[must] [security_scan] PHASE 9 — FORBIDDEN FILE SCAN. Confirm that no file in forbidden directories (alphaforge/src/,
      alphaforge/tests/, lib/, simulation/engine/, simulation/contracts/, runtime/, interface/, data/, datasets/, models/,
      artifacts/, .github/, contracts/fixtures/, contracts/schemas/, contracts/mappings/) was modified during this verification.
      Compare git status before and after. Any modification is a HARD FAILURE.

      '
    - '[must] [reporting] PHASE 10 — EVIDENCE ASSEMBLY AND ACCP REPORT. Collect all command outputs, exit codes, scan results,
      and validation outcomes. Assemble into a single ACCP-YAML v2.0.0 report at reports/accp/alphaforge_baseline_verify.accp.yaml.
      The report must include: result (PASS or FAIL), evidence items for each command (id, type, path, content_hash), forbidden
      pattern scan results, forbidden file scan results, git status snapshot, and a summary verdict. If any phase failed,
      result must be FAIL and the report must enumerate each failure with the relevant command output.

      '
    allowedFiles:
    - reports/accp/**
    - plans/alphaforge/**
    forbiddenFiles:
    - alphaforge/src/**
    - alphaforge/tests/**
    - lib/**
    - simulation/engine/**
