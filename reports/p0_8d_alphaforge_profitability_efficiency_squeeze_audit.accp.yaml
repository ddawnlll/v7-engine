    priority: "PRIMARY"
    potential_edge_sources:
      - "Micro-structure inefficiencies on 15m primary (per V7 thesis); strong signal required to overcome HIGH no-trade default."
      - "Breakout failure / liquidity trap (AS-010) — but requires order-book/spread data."
      - "Mean reversion after impulse / overextension (AS-005)."
    kill_risks:
      - "Cost/slippage can make mode net-negative even with good signals (thesis:120)."
      - "Order book required for Phase 3; no spread/depth data exists in lib."
      - "Latency: fast reversals may not be executable at reported prices."
      - "AlphaForge currently targets 1m/3m/5m — no such simulation labels exist (AGGRESSIVE_SCALP profile is 15m)."
    missing_requirements:
      - "Timeframe alignment to simulation AGGRESSIVE_SCALP profile (15m primary, 5m refinement)."
      - "Order-book / spread / depth data ingestion (BinanceClient exposes only klines + funding)."
      - "AGGRESSIVE_SCALP simulation tests (none exist)."
