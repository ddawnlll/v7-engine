- id: WS-02-SCHEMA-TESTS
  title: Schema Validation Tests — Output Compliance, Error Handling, and Cost-Aware Correctness
  objective: Schema Validation Tests — Output Compliance, Error Handling, and Cost-Aware Correctness
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/tests/test_label_adapter_schema.py. Write a test that validates adapt_simulation_output()
      output against alphaforge_label.schema.json using jsonschema.validate(). Use the simulation_output_minimal.json fixture
      as input. Assert all required fields are present, all enum values are valid, all number fields are numbers, all string
      fields are strings, and all boolean fields are booleans.

      '
    - '[must] [action] Write negative tests for invalid SimulationOutput inputs. Test missing required top-level fields (simulation_run_id,
      decision_timestamp, mode, long_outcome, short_outcome, no_trade_outcome, best_action). Assert the adapter raises a specific,
      descriptive error (ValueError or custom AlphaForgeError) rather than producing a malformed label. Test wrong mode values
      (not in SWING/SCALP/AGGRESSIVE_SCALP) and assert handling.

      '
    - '[must] [action] Write tests for missing optional fields in SimulationOutput. Fields like monte_carlo_run_id, second_best_action,
      invalidity_reason are optional and must not cause adapter failure. Similarly, optional fields within ActionOutcome and
      NoTradeOutcome must use None defaults. Assert adapter handles all optional-field-absent cases gracefully.

      '
    - '[must] [action] Write a cost-aware field correctness test. Using a SimulationOutput fixture with known cost values,
      verify that long_R_net = long_R_gross - total_cost_r_long (with tolerance for compounding precision), and similarly
      for short side. Verify that fee_cost_r_long + slippage_cost_r_long approximately equals total_cost_r_long (simulation
      may not guarantee exact additivity due to compounding, but deviation must be < 0.0001 R).

      '
    - '[must] [action] Write a cross-mode test: adapt a SWING fixture, a SCALP fixture, and an AGGRESSIVE_SCALP fixture. Verify
      output mode field matches input. Verify that different modes produce valid AlphaForgeLabel records. Verify that SCALP
      and AGGRESSIVE_SCALP labels carry the expected cost sensitivity characteristics.

      '
    - '[must] [action] Write a schema validation test for the minimal AlphaForgeLabel fixture (contracts/fixtures/alphaforge_label_minimal.json)
      to confirm the schema itself is valid and the adapter output matches the expected shape.

      '
    - '[must] [action] Run CMD-test-alphaforge, CMD-test-integration-alphaforge, CMD-test-contract-registry-schema, and CMD-test-import-boundaries.
      All must pass green. Confirm no forbidden imports were added.

      '
    allowedFiles:
    - alphaforge/tests/test_label_adapter_schema.py
    - alphaforge/src/alphaforge/labels/__init__.py
    - alphaforge/src/alphaforge/labels/adapter.py
    - contracts/schemas/alphaforge_label.schema.json
    - contracts/schemas/simulation_output.schema.json
    - contracts/fixtures/simulation_output_minimal.json
    - contracts/fixtures/alphaforge_label_minimal.json
    - contracts/registry.json
    forbiddenFiles:
    - alphaforge/src/alphaforge/data/**
    - alphaforge/src/alphaforge/contracts/**
    - alphaforge/src/alphaforge/handoff/**
    - alphaforge/src/alphaforge/modes/**
    - alphaforge/src/alphaforge/reports/**
    - data/**
    - datasets/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    dependencies:
    - WS-02-NO-TRADE-TESTS
  artifactPolicy:
    class: test_only
    wiringRequired: false
    reachabilityRequired: false
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-02-025
    description: Adapter output validates against alphaforge_label.schema.json — jsonschema.validate() passes with no validation
      errors for output from valid SimulationOutput fixture
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: schema_validation
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - source
      - schema_validation
      - test_output
    requiredEvidence:
    - source
    - schema_validation
    - test_output
  - id: AC-02-026
    description: Adapter raises descriptive error (ValueError or AlphaForgeError) when SimulationOutput is missing required
      field simulation_run_id — does not produce malformed label
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - source
      - test_output
    requiredEvidence:
    - source
    - test_output
  - id: AC-02-027
    description: Adapter raises descriptive error for invalid mode value (not in SWING/SCALP/AGGRESSIVE_SCALP)
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - source
