planSpecVersion: "0.1.0"
kind: ImplementationPlan
profile: praxis-v0.1
metadata:
  planId: TR-06-EMPIRICAL-WFV-METRICS
  title: "Plan 06 — Empirical WFV with Real Metrics"
  description: "Convert WFV from skeleton to empirical. Real metrics from trained models. No-trade baseline. Cost stress. MHT controls. Domain: alphaforge."
  createdAt: "2026-06-25T00:00:00Z"
  humanId: TrainingReady
  status: draft
authority:
  executor: ClaudeCode
  completionAuthority: PraxisTruthKernel
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: imported_human
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false
workspace:
  root: .
  allowedFiles:
    - alphaforge/src/alphaforge/validation/empirical_wfv.py
    - alphaforge/src/alphaforge/validation/cost_stress.py
    - alphaforge/src/alphaforge/validation/no_trade_baseline.py
    - alphaforge/src/alphaforge/validation/mht.py
    - alphaforge/tests/test_empirical_wfv.py
    - alphaforge/tests/test_cost_stress.py
    - alphaforge/tests/test_no_trade_baseline.py
    - alphaforge/tests/test_mht_controls.py
  forbiddenFiles:
    - simulation/engine/**
    - v7/src/**
    - runtime/**
execution:
  mode: single_session
  agent: claude-code
  autonomy: implementation_allowed
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 3
tasks:
  - id: WS-TR06-01
    title: Prerequisite Gate
    objective: "Verify TR-05 PASS. Must not run without trained artifacts."
    implementation:
      instructions:
        - "[must] Read TR-05 ACCP report. If FAIL/HOLD, STOP. HARD GATE."
    artifactPolicy:
      class: documentation
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: false
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR06-01
        description: "TR-05 passed before WFV executes"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: manual_review
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: [report]
        requiredEvidence: [report]
  - id: WS-TR06-02
    title: Empirical WFV Evaluator
    objective: "Run trained models through folds. Real oos_sharpe, win_rate, expectancy, drawdown."
    implementation:
      instructions:
        - "[must] Create alphaforge/src/alphaforge/validation/empirical_wfv.py."
        - "[must] Load model artifacts. Predict on each fold OOS. Compute real metrics."
        - "[must] If artifacts missing, fill NOT_EVALUATED — never invent."
      allowedFiles: [alphaforge/src/alphaforge/validation/empirical_wfv.py, alphaforge/tests/test_empirical_wfv.py]
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR06-02
        description: "Empirical WFV computes real metrics when artifacts present"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-empirical-wfv
        requiredEvidence: [command, test_output]
  - id: WS-TR06-03
    title: No-Trade Baseline + Cost Stress + MHT
    objective: "No-trade comparison, cost stress (1.5x/2x/3x), MHT correction."
    implementation:
      instructions:
        - "[must] Create no_trade_baseline.py, cost_stress.py, mht.py."
        - "[must] Active vs no-trade counterfactual comparison."
        - "[must] Cost stress: re-evaluate with scaled costs. Flag if edge lost."
        - "[must] MHT: Bonferroni/Holm, deflated Sharpe."
      allowedFiles:
        - alphaforge/src/alphaforge/validation/no_trade_baseline.py
        - alphaforge/src/alphaforge/validation/cost_stress.py
        - alphaforge/src/alphaforge/validation/mht.py
        - alphaforge/tests/test_no_trade_baseline.py
        - alphaforge/tests/test_cost_stress.py
        - alphaforge/tests/test_mht_controls.py
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR06-03
        description: "No-trade baseline comparison works"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-no-trade
        requiredEvidence: [command, test_output]
      - id: AC-TR06-04
        description: "Cost stress tests pass"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-cost-stress
        requiredEvidence: [command, test_output]
      - id: AC-TR06-05
        description: "MHT controls prevent false discovery"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-mht
        requiredEvidence: [command, test_output]
commands:
  exactAllowedCommands:
    - id: CMD-test-empirical-wfv
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_empirical_wfv.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 180
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-no-trade
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_no_trade_baseline.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-cost-stress
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_cost_stress.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-mht
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_mht_controls.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: curl
      pattern: "^curl\\s"
      reason: "No network."
    - command: profitability
      pattern: "profitable|edge confirmed|live_ready|guaranteed"
      reason: "No profitability claims."
evidence:
  ledgerRequired: true
  requiredEvidenceTypes: [diff, source, command, test_output, report]
  hashWhenAvailable: true
gates:
  sequence: [SchemaGate, LockGate, EvidenceGate, WiringGate, ExecGate, FinalGate]
  verdicts: [PASS, HOLD, FAIL]
  reasonCodes:
    SchemaGate: [PLAN_SCHEMA_INVALID]
    LockGate: [PLAN_NOT_LOCKED]
    EvidenceGate: [REQUIRED_EVIDENCE_MISSING, PREREQUISITE_FAILED]
    WiringGate: [ORPHAN_MODULE]
    ExecGate: [TEST_COMMAND_FAILED]
    FinalGate: [FINAL_VALIDATION_FAILED]
repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3
  reverifyCommand: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_empirical_wfv.py alphaforge/tests/test_cost_stress.py alphaforge/tests/test_no_trade_baseline.py alphaforge/tests/test_mht_controls.py -q"
  repairPacketFormat:
    json: true
    markdown: true
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/training_ready/06_empirical_wfv_metrics.lock.json
  hashes: [planHash, acceptanceCriteriaHash, artifactPolicyHash, commandPolicyHash, allowedFilesHash, forbiddenFilesHash]
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
