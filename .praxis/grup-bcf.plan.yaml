    - "simulation/**/*.py"
    - "runtime/**/*.py"
    - "scripts/*.py"
    - "lib/**/*.py"
    - "contracts/**/*.json"
    - "v7/**/*.py"
    - "docs/**/*.md"
    - "Dockerfile"
    - ".github/workflows/ci.yml"
  forbiddenFiles: []

execution:
