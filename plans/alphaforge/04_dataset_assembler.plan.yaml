    instructions:
    - '[must] [action] Create alphaforge/tests/conftest.py with shared fixtures: sample_feature_df (20 rows, 3 symbols, SWING
      mode), sample_label_df (20 rows with mixed label_validity: VALID, INVALID, AMBIGUOUS), sample_feature_spec dict, sample_label_spec
      dict.'
    - '[must] [action] Create alphaforge/tests/test_dataset_assembler.py. Positive: valid join produces correct row count.
      Negative: label_validity INVALID rows excluded. Negative: label_validity AMBIGUOUS rows excluded. Negative: feature_timestamp
      == label_timestamp triggers purge drop. Negative: feature_timestamp > label_timestamp triggers purge drop. Negative:
      mode mismatch raises ValueError. Negative: empty join (non-overlapping symbols) returns empty list + audit. Negative:
      empty join (non-overlapping timestamps) returns empty list + audit.'
    - '[must] [action] Negative join scenarios: (a) mismatched timestamp: feature T1, label T2, different symbols — zero joined;
      (b) missing symbol: feature has BTCUSDT, label has ETHUSDT — unmatched counts; (c) feature timestamp after label timestamp
      — purge violation; (d) all labels INVALID — zero joined rows with full audit trail.'
    - '[must] [action] Create alphaforge/tests/test_dataset_lineage.py. Test: every assembled row has non-None lineage. Test:
      lineage fields match input specs. Test: missing manifest_id raises LineageError. Test: missing feature_set_id raises
      LineageError. Test: LineageProvenance frozen (setting field raises error). Test: label_checksum computed when missing
      from label row.'
    - '[must] [action] Create alphaforge/tests/test_dataset_writer.py. Test: write produces file. Test: same dataset twice
      produces byte-identical files and identical checksums. Test: roundtrip (write->read->compare) returns True. Test: modified
      dataset roundtrip returns False with diff. Test: empty dataset roundtrip. Test: CSV fallback when Parquet unavailable
      (mock import). Test: column ordering deterministic. Test: float formatting deterministic.'
    - '[must] [action] Create integration/tests/test_alphaforge_dataset.py. Integration: full pipeline (fixtures -> assemble
      -> write -> read -> verify roundtrip). Test with 50 rows, 5 symbols.'
    - '[must] [action] Data leakage test: feature_timestamp and label_timestamp identical. Confirm assembler drops all rows
