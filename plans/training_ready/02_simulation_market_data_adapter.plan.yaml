planSpecVersion: "0.1.0"
kind: ImplementationPlan
profile: praxis-v0.1
metadata:
  planId: TR-02-SIMULATION-MARKET-DATA-ADAPTER
  title: "Plan 02 — Simulation Market Data Adapter"
  description: "Bridge normalized OHLCV to SimulationInput. Batch runner. Output persistence. Domain: simulation."
  createdAt: "2026-06-25T00:00:00Z"
  humanId: TrainingReady
  status: draft
authority:
  executor: ClaudeCode
  completionAuthority: PraxisTruthKernel
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: imported_human
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false
workspace:
  root: .
  allowedFiles:
    - simulation/adapters/market_data_adapter.py
    - simulation/engine/batch.py
    - simulation/engine/writer.py
    - simulation/tests/test_market_data_adapter.py
    - simulation/tests/test_batch_simulation.py
    - simulation/tests/test_simulation_writer.py
    - integration/tests/test_simulation_to_alphaforge_data_bridge.py
  forbiddenFiles:
    - lib/market_data/binance/**
    - alphaforge/src/alphaforge/training/**
    - v7/src/**
    - runtime/**
    - models/**
execution:
  mode: single_session
  agent: claude-code
  autonomy: implementation_allowed
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 3
tasks:
  - id: WS-TR02-01-ADAPTER
    title: OHLCV to SimulationInput Adapter
    objective: "Convert normalized KlineRecords into SimulationInput batches with ATR from prior bars and FuturePath from next N candles."
    implementation:
      instructions:
        - "[must] Create simulation/adapters/market_data_adapter.py with MarketDataAdapter class."
        - "[must] adapt_klines(records, profile, lookback, forward_bars) -> list[SimulationInput]."
        - "[must] Compute ATR from prior bars using lib.indicators.atr."
        - "[must] Construct FuturePath from next N bars after decision point."
        - "[must] Skip rows with insufficient lookback/forward bars."
        - "[must] Tests use fixture KlineRecords — no real data."
        - "[must] Deterministic: same input = same output."
      allowedFiles: [simulation/adapters/market_data_adapter.py, simulation/tests/test_market_data_adapter.py]
      expectedOutputs: [simulation/adapters/market_data_adapter.py]
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    integrationContract:
      mode: consumer_or_export
      reason: "Consumed by batch runner and pipeline CLI."
      exportSurfaces:
        - id: EXP-TR02
          path: simulation/adapters/market_data_adapter.py
          requiredExports: [MarketDataAdapter]
    acceptanceCriteria:
      - id: AC-TR02-01
        description: "MarketDataAdapter exists and is importable"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: file_exists
          path: simulation/adapters/market_data_adapter.py
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [source]
        requiredEvidence: [source]
      - id: AC-TR02-02
        description: "Adapter produces correct SimulationInput from fixture klines"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-adapter
        requiredEvidence: [command, test_output]
  - id: WS-TR02-02-BATCH
    title: Batch Simulation Runner
    objective: "Iterate over SimulationInput batches, call engine.simulate(), collect results."
    implementation:
      instructions:
        - "[must] Create simulation/engine/batch.py with BatchSimulator."
        - "[must] Accept list[SimulationInput], call simulate() for each."
        - "[must] Collect results as list[SimulationOutput]. Log errors without stopping."
        - "[must] Tests use fixture SimulationInput."
      allowedFiles: [simulation/engine/batch.py, simulation/tests/test_batch_simulation.py]
      expectedOutputs: [simulation/engine/batch.py]
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR02-03
        description: "BatchSimulator processes fixture inputs and returns correct count"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-batch
        requiredEvidence: [command, test_output]
  - id: WS-TR02-03-WRITER
    title: SimulationOutput Persistence
    objective: "Write SimulationOutput to Parquet with SHA-256 checksums and lineage."
    implementation:
      instructions:
        - "[must] Create simulation/engine/writer.py with SimulationWriter."
        - "[must] Write to data/processed/simulations/ with checksum sidecar."
        - "[must] Tests use temp dirs."
      allowedFiles: [simulation/engine/writer.py, simulation/tests/test_simulation_writer.py]
      expectedOutputs: [simulation/engine/writer.py]
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR02-04
        description: "SimulationWriter persists outputs with checksums"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: false
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-sim-writer
        requiredEvidence: [command, test_output]
  - id: WS-TR02-04-BRIDGE
    title: Integration Bridge Test
    objective: "E2E: fixture klines → adapter → simulate → LabelAdapter → valid labels."
    implementation:
      instructions:
        - "[must] Create integration/tests/test_simulation_to_alphaforge_data_bridge.py."
        - "[must] Verify full chain with fixture data. No real data, no network."
      allowedFiles: [integration/tests/test_simulation_to_alphaforge_data_bridge.py]
      expectedOutputs: [integration/tests/test_simulation_to_alphaforge_data_bridge.py]
    artifactPolicy:
      class: test_only
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    integrationContract:
      mode: required
      reason: "Integration test proving simulation→alphaforge bridge."
      integrationPoints:
        - id: IP-TR02
          path: integration/tests/test_simulation_to_alphaforge_data_bridge.py
    acceptanceCriteria:
      - id: AC-TR02-05
        description: "Bridge test: klines → simulate → label produces valid AlphaForgeLabel"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification:
          type: test_output
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: [command, test_output]
          commandRef: CMD-test-bridge
        requiredEvidence: [command, test_output]
commands:
  exactAllowedCommands:
    - id: CMD-test-adapter
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/test_market_data_adapter.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-batch
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/test_batch_simulation.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-sim-writer
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/test_simulation_writer.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-bridge
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_simulation_to_alphaforge_data_bridge.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-sim-all
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/ -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: curl
      pattern: "^curl\\s"
      reason: "No network. All tests use fixture data."
    - command: xgboost
      pattern: "xgboost|XGBClassifier|\\.fit\\("
      reason: "No model training in simulation plan."
    - command: cross-domain write
      pattern: "Write.*lib/market_data|Write.*alphaforge/src"
      reason: "Domain boundary — simulation owns only simulation/."
evidence:
  ledgerRequired: true
  requiredEvidenceTypes: [diff, source, wiring, command, test_output, report]
  hashWhenAvailable: true
gates:
  sequence: [SchemaGate, LockGate, EvidenceGate, WiringGate, ExecGate, FinalGate]
  verdicts: [PASS, HOLD, FAIL]
  reasonCodes:
    SchemaGate: [PLAN_SCHEMA_INVALID]
    LockGate: [PLAN_NOT_LOCKED]
    EvidenceGate: [REQUIRED_EVIDENCE_MISSING]
    WiringGate: [ORPHAN_MODULE, FORBIDDEN_IMPORT_BOUNDARY]
    ExecGate: [TEST_COMMAND_FAILED, NO_TESTS_FOUND]
    FinalGate: [FINAL_VALIDATION_FAILED]
repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3
  reverifyCommand: "PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/ integration/tests/test_simulation_to_alphaforge_data_bridge.py -q"
  repairPacketFormat:
    json: true
    markdown: true
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/training_ready/02_simulation_market_data_adapter.lock.json
  hashes: [planHash, acceptanceCriteriaHash, artifactPolicyHash, commandPolicyHash, allowedFilesHash, forbiddenFilesHash]
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
