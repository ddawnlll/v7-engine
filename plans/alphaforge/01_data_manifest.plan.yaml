- id: WS-01-TESTS
  title: Create and Run DataManifest Test Suite
  objective: Create and Run DataManifest Test Suite
  implementation:
    instructions:
    - '[must] [implementation] Create alphaforge/tests/test_data_manifest.py using pytest. Organize tests by category: (a)
      dataclass construction, (b) build_manifest with fixtures, (c) checksum stability, (d) validate_manifest positive cases,
      (e) validate_manifest negative cases, (f) import boundary tests, (g) integration tests with contract fixtures.

      '
    - '[must] [test] Test deterministic output: call build_manifest() twice with same fixture list, assert checksum, config_hash,
      and manifest_id are identical. Checksum drift is a hard failure — this is the most critical test.

      '
    - '[must] [test] Test fixture validation: call build_manifest() with canonical contracts/fixtures/simulation_output_minimal.json.
      Assert correct mode (SWING), symbol (BTCUSDT), and primary_interval (4h) extracted from fixture.

      '
    - '[must] [test] Test validate_manifest() negative cases: (a) empty manifest_id, (b) invalid mode "DAY_TRADE", (c) invalid
      primary_interval "5m", (d) empty symbol, (e) empty source_fixtures list, (f) invalid config_hash length, (g) missing
      created_at, (h) created_at not ISO 8601. Each must raise ManifestValidationError with field-identifying message.

      '
    - '[must] [test] Test validate_manifest() positive cases: (a) valid SWING manifest, (b) valid SCALP manifest with 1h interval,
      (c) valid AGGRESSIVE_SCALP manifest with 15m interval. All must return None (no error raised).

      '
    - '[must] [test] Test import boundary: programmatically verify alphaforge.data does not import from simulation, v7, runtime,
      or interface. Use sys.modules inspection or static import scan in a dedicated test function.

      '
    - '[must] [verification] Run CMD-test-alphaforge and confirm exit code 0 with all tests passing. Then run CMD-test-integration-alphaforge,
      CMD-test-contract-registry-schema, CMD-test-import-boundaries, and CMD-test-simulation. All must exit 0.

      '
    - '[must] [constraint] Do NOT use real market data. All test data from contracts/fixtures/ JSON files or inline Python
      dicts. Do NOT call any network API. Do NOT import binance, ccxt, or any exchange library. Do NOT use random seeds.

