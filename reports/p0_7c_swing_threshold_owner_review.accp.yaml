swing_thresholds_locked:
  status: "LOCKED_INITIAL_BASELINE"
  count: 10
  thresholds:
    - field: "minimum_oos_window"
      value: "12 months (6 folds × 2mo)"
      rationale: "12-month OOS coverage captures at least one full market cycle including regime transitions"
      recalibration_after_first_walk_forward: true
    - field: "minimum_trades_or_events"
      value: "≥ 200"
      rationale: "200 trades produces expectancy CI width of ~0.14R at typical SWING variance — sufficient to reject zero-expectancy null"
      recalibration_after_first_walk_forward: true
    - field: "minimum_expectancy_r"
      value: "≥ 0.15R"
      rationale: "Conservative net-expectancy floor after costs; below 0.15R edge-to-noise ratio is too low for reliable promotion"
      recalibration_after_first_walk_forward: true
    - field: "max_drawdown_limit"
      value: "≤ 25%"
      rationale: "25% drawdown allows for regime transitions while preventing catastrophic capital impairment"
      recalibration_after_first_walk_forward: true
    - field: "min_no_trade_quality"
      value: "CORRECT_NO_TRADE ≥ 60%; SAVED_LOSS ≥ 0.20R per event"
      rationale: "SWING has LOW no-trade tendency — high correctness threshold ensures NO_TRADE is deliberate, not lazy"
      recalibration_after_first_walk_forward: true
    - field: "calibration_requirement"
      value: "Reliability error within ±10% per bucket"
      rationale: "10% reliability error ensures probability/expected-R surfaces are trustworthy enough for policy dual-gate decisions"
      recalibration_after_first_walk_forward: true
    - field: "cost_stress_requirement"
      value: "Edge survives taker × 1.5 multiplier stress"
      rationale: "1.5× multiplier provides margin above taker baseline; conservative enough to catch hidden cost sensitivity"
      recalibration_after_first_walk_forward: true
    - field: "shadow_duration"
      value: "≥ 4 weeks"
      rationale: "4-week shadow captures ~20-30 SWING trades at typical 4h frequency — sufficient to detect material backtest-shadow divergence"
      recalibration_after_first_walk_forward: true
    - field: "paper_duration"
      value: "≥ 4 weeks"
      rationale: "Matches shadow duration; ensures paper outcomes are statistically comparable to shadow and backtest baselines"
      recalibration_after_first_walk_forward: true
    - field: "tiny_live_limit"
      value: "Max 0.5% account risk per trade; max 5% daily loss; max 10% cumulative"
      rationale: "Conservative progressive limits: per-trade risk survives 20 consecutive losses, daily cap prevents single-day spiral, cumulative cap limits total tiny-live exposure"
      recalibration_after_first_walk_forward: true

