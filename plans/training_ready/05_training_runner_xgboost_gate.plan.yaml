planSpecVersion: "0.1.0"
kind: ImplementationPlan
profile: praxis-v0.1
metadata:
  planId: TR-05-TRAINING-RUNNER-XGBOOST-GATE
  title: "Plan 05 — XGBoost Training Runner (Gated Controlled)"
  description: >
    CONTROLLED XGBoost training runner. GATED: must not execute until
    TR-01,02,03,04 all PASS. Distinguishes PASS_TRAINING_EXECUTED from
    PASS_RUNNER_IMPLEMENTED_BUT_TRAINING_GATED. XGBoost skip = HOLD
    (never full PASS). No profitability claims. Domain: alphaforge.
  createdAt: "2026-06-25T00:00:00Z"
  humanId: TrainingReady
  status: draft
authority:
  executor: ClaudeCode
  completionAuthority: PraxisTruthKernel
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: imported_human
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false
workspace:
  root: .
  allowedFiles:
    - alphaforge/src/alphaforge/training/__init__.py
    - alphaforge/src/alphaforge/training/dataset_loader.py
    - alphaforge/src/alphaforge/training/train_xgb.py
    - alphaforge/src/alphaforge/training/artifacts.py
    - alphaforge/src/alphaforge/training/calibration.py
    - alphaforge/src/alphaforge/training/metrics.py
    - alphaforge/tests/test_training_runner.py
    - alphaforge/tests/test_training_artifacts.py
    - data/models/**
  forbiddenFiles:
    - lib/market_data/binance/**
    - simulation/engine/**
    - v7/src/**
    - runtime/**
    - plans/**
execution:
  mode: single_session
  agent: claude-code
  autonomy: implementation_allowed
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 3
tasks:
  - id: WS-TR05-01
    title: Prerequisite Gate Check
    objective: "Verify TR-01 through TR-04 ACCP reports PASS before writing training code. HARD GATE — no bypass."
    implementation:
      instructions:
        - "[must] Read ACCP reports for TR-01..04. If any FAIL/HOLD, STOP with HOLD. HARD GATE."
        - "[must] If gated: emit HOLD with missing prerequisite IDs. Do NOT write training code."
      allowedFiles: [reports/accp/**]
    artifactPolicy:
      class: documentation
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: false
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR05-01
        description: "All prerequisite plans (TR-01..04) PASS before training begins"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
      - id: AC-TR05-02
        description: "If prerequisites gated, verdict is HOLD (not FAIL, not PASS)"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
  - id: WS-TR05-02
    title: Dataset Loader
    objective: "Load assembled LabeledDataset. Validate schema. Return X/y for XGBoost."
    implementation:
      instructions:
        - "[must] Create training/__init__.py, training/dataset_loader.py."
        - "[must] Load features/labels from assembled dataset. Validate schema."
        - "[must] Support train/val/oos split from WFV folds."
        - "[must] Tests with tiny fixture dataset."
      allowedFiles: [alphaforge/src/alphaforge/training/__init__.py, alphaforge/src/alphaforge/training/dataset_loader.py]
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR05-03
        description: "DatasetLoader loads and validates fixture dataset"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-loader}
        requiredEvidence: [command, test_output]
      - id: AC-TR05-04
        description: "DatasetLoader rejects malformed/missing-column datasets"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-loader}
        requiredEvidence: [command, test_output]
  - id: WS-TR05-03
    title: XGBoost Training Runner
    objective: "Implement train_xgb.py. XGBRegressor for R_net. Controlled: XGBoost import guarded by try/except ImportError with explicit verdict reporting."
    implementation:
      instructions:
        - "[must] Create training/train_xgb.py. XGBoost import guarded by try/except ImportError."
        - "[must] XGBRegressor for R_net prediction. Train on fold, eval on val."
        - "[must] Log RMSE, R², MAE. No profitability claims."
        - "[must] If XGBoost available: train on fixture, report PASS_TRAINING_EXECUTED."
        - "[must] If XGBoost NOT available: report PASS_RUNNER_IMPLEMENTED_BUT_TRAINING_GATED or HOLD_NO_XGBOOST."
        - "[must] training_ready remains false if XGBoost absent or training skipped."
        - "[must] Tests: train on fixture if XGBoost available; emit controlled HOLD if not."
      allowedFiles: [alphaforge/src/alphaforge/training/train_xgb.py]
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR05-05
        description: "train_xgb exists with import-guarded XGBoost"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: file_exists, path: alphaforge/src/alphaforge/training/train_xgb.py, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [source]}
        requiredEvidence: [source]
      - id: AC-TR05-06
        description: "Training imports produce controlled verdict: PASS_TRAINING_EXECUTED or HOLD_NO_XGBOOST"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: file_contains, path: alphaforge/src/alphaforge/training/train_xgb.py, patterns: ["PASS_TRAINING_EXECUTED", "HOLD_NO_XGBOOST", "PASS_RUNNER_IMPLEMENTED_BUT_TRAINING_GATED"], deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [source]}
        requiredEvidence: [source]
      - id: AC-TR05-07
        description: "Training tests produce controlled verdict (never false PASS from skip)"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-training}
        requiredEvidence: [command, test_output]
      - id: AC-TR05-08
        description: "Model artifact produced if and only if training executed"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-artifacts}
        requiredEvidence: [command, test_output]
  - id: WS-TR05-04
    title: Artifact Writer + Calibration + Metrics
    objective: "Save model artifacts, calibration curve, metrics. SHA-256 checksums."
    implementation:
      instructions:
        - "[must] Create training/artifacts.py — save model as .json/.pkl with checksum."
        - "[must] Create training/calibration.py — reliability diagram, Brier-like score."
        - "[must] Create training/metrics.py — RMSE, MAE, R², directional accuracy."
        - "[must] Tests use temp dirs. No profitability claims."
      allowedFiles:
        - alphaforge/src/alphaforge/training/artifacts.py
        - alphaforge/src/alphaforge/training/calibration.py
        - alphaforge/src/alphaforge/training/metrics.py
        - alphaforge/tests/test_training_artifacts.py
    artifactPolicy:
      class: library_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR05-09
        description: "Artifact writer saves model with SHA-256 checksum"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-artifacts}
        requiredEvidence: [command, test_output]
      - id: AC-TR05-10
        description: "Calibration module produces reliability diagram data"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-artifacts}
        requiredEvidence: [command, test_output]
commands:
  exactAllowedCommands:
    - id: CMD-test-loader
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_training_runner.py -q -k loader"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-training
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_training_runner.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 180
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-artifacts
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_training_artifacts.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: curl
      pattern: "^curl\\s"
      reason: "No network."
    - command: profitability
      pattern: "profitable|edge confirmed|live_ready|guaranteed"
      reason: "No profitability claims. Training produces models, not promises."
    - command: live trading
      pattern: "create_order|market_order|live_order"
      reason: "No live trading from training plan."
    - command: uncontrolled training
      pattern: "from xgboost import|import xgboost"
      reason: "XGBoost import must go through try/except ImportError gate in train_xgb.py only."
    - command: cross-domain write
      pattern: "Write.*simulation/|Write.*v7/"
      reason: "Domain boundary — alphaforge does not own simulation or V7."
evidence:
  ledgerRequired: true
  requiredEvidenceTypes: [diff, source, command, test_output, report]
  hashWhenAvailable: true
gates:
  sequence: [SchemaGate, LockGate, EvidenceGate, WiringGate, ExecGate, FinalGate]
  verdicts: [PASS, HOLD, FAIL]
  reasonCodes:
    SchemaGate: [PLAN_SCHEMA_INVALID]
    LockGate: [PLAN_NOT_LOCKED]
    EvidenceGate: [REQUIRED_EVIDENCE_MISSING, PREREQUISITE_FAILED, TRAINING_SKIPPED_NO_XGBOOST]
    WiringGate: [ORPHAN_MODULE, FORBIDDEN_IMPORT_BOUNDARY]
    ExecGate: [TEST_COMMAND_FAILED, TRAINING_NOT_EXECUTED]
    FinalGate: [FINAL_VALIDATION_FAILED, GATE_PREREQUISITE_BLOCKED, TRAINING_READY_FALSE]
repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3
  reverifyCommand: "PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_training_runner.py alphaforge/tests/test_training_artifacts.py -q"
  repairPacketFormat: {json: true, markdown: true}
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/training_ready/05_training_runner_xgboost_gate.lock.json
  hashes: [planHash, acceptanceCriteriaHash, artifactPolicyHash, commandPolicyHash, allowedFilesHash, forbiddenFilesHash]
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
