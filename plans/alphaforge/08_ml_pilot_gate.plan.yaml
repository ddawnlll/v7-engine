- id: WS-08-NO-XGBOOST
  title: Implement Hard No-XGBoost Import Guard
  objective: Implement Hard No-XGBoost Import Guard
  implementation:
    instructions:
    - '[must] [action] Implement module-level guard using importlib.util.find_spec to check xgboost availability at import
      time. If found, raise ImportError: "EXPLICIT_XGBOOST_BLOCK: ml_pilot is a pre-training gate and must not coexist with
      xgboost." Guard executes at top level, not inside a function — cannot be bypassed by call ordering.

      '
    - '[must] [action] Add check_no_xgboost_in_environment() -> bool as prerequisite #0 (checked first in PrerequisiteRegistry).
      Marked critical=True. When False, check_all_prerequisites() returns FAIL with reason EXPLICIT_XGBOOST_BLOCK.

      '
    - '[must] [action] ml_pilot.py source must not contain "xgboost" in any import statement. Guard uses importlib.util.find_spec
      only — never imports xgboost. Verify with CMD-no-xgboost-scan.

      '
    - '[must] [action] Document guard in module docstring: why xgboost blocked, expected error message, resolution (ensure
      xgboost not installed in gate-check environment).

      '
    allowedFiles:
    - alphaforge/src/alphaforge/gates/**
    forbiddenFiles:
    - alphaforge/src/alphaforge/training/**
    - alphaforge/src/alphaforge/models/**
    - alphaforge/src/alphaforge/inference/**
    - lib/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    - data/**
    - datasets/**
    - models/**
    dependencies:
    - WS-08-VERDICT
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-08-020
    description: Module-level guard raises ImportError with EXPLICIT_XGBOOST_BLOCK when xgboost is importable (detected via
      importlib.util.find_spec)
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - source
      - test_output
    requiredEvidence:
    - source
    - test_output
  - id: AC-08-021
    description: Guard executes at module import time (top-level), not inside a function; cannot be bypassed by calling order
