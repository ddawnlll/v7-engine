planSpecVersion: "0.1.0"
kind: "ImplementationPlan"
profile: "praxis-v0.1"

metadata:
planId: "AF-IMPLEMENTATION-MASTER-PLAN-V0_1"
title: "AlphaForge Implementation Master Plan — P0.9B to P1.0"
description: >
Contract-driven AlphaForge implementation plan after P0.9A scaffold.
This plan converts AlphaForge from schema-valid scaffold into a deterministic
research engine: local data/label/feature pipeline, simulation-derived labels,
primary mode golden tests, deterministic non-ML research reports, validation
pipeline, optional ML pilot, and V7 handoff readiness. SCALP is the first
vertical slice. AGGRESSIVE_SCALP follows after the SCALP path is stable.
SWING remains secondary baseline/control.
createdAt: "2026-06-20T00:00:00+03:00"
humanId: "Mehmet Sokak"
status: "draft"

authority:
executor: "ClaudeCode"
completionAuthority: "PraxisTruthKernel"
agentSelfReportIsClaimOnly: true
criteriaSourceRequired: "human"
reportsAreEvidenceOnly: true
pluginOwnsTruth: false

workspace:
root: "."
allowedFiles:
- "alphaforge/src/**"
- "alphaforge/tests/**"
- "integration/tests/test_alphaforge_*.py"
- "contracts/fixtures/alphaforge/**"
- "reports/alphaforge/**"
- "reports/p0_9b_*.accp.yaml"
- "reports/p0_9c_*.accp.yaml"
- "reports/p0_9d_*.accp.yaml"
- "reports/p1_0_*.accp.yaml"
- "plans/alphaforge_implementation_master_plan.yaml"
forbiddenFiles:
- "lib/**"
- "simulation/engine/**"
- "simulation/contracts/**"
- "v7/**"
- "runtime/**"
- "interface/**"
- "data/**"
- "datasets/**"
- "models/**"
- "artifacts/**"
- ".github/**"
- "contracts/schemas/**"
- "contracts/mappings/**"
- "alphaforge/docs/**"

execution:
mode: "single_session"
agent: "claude-code"
autonomy: "implementation_allowed"
canModifyCode: true
canModifyPlan: false
canModifyAcceptanceCriteria: false
maxRepairLoops: 4

tasks:

* id: "TASK-00-BASELINE-STATE"
  title: "Baseline State and Lock Confirmation"
  objective: >
  Confirm P0.8E and P0.9A are truly complete before new implementation starts.
  This prevents building the data/label/feature pipeline on stale contracts.
  implementation:
  instructions:
  - "Read P0.8E and P0.9A reports."
  - "Confirm AlphaForge scaffold imports."
  - "Confirm canonical mode profiles: SCALP 1h/4h/15m, AGGRESSIVE_SCALP 15m/1h/5m, SWING 4h/1d/1h."
  - "Confirm V7 canonical gates are used by handoff builder."
  - "Run existing P0.8E/P0.9A tests before modifying implementation."
  allowedFiles:
  - "reports/p0_9b_baseline_state.accp.yaml"
  forbiddenFiles:
  - "alphaforge/src/**"
  - "contracts/**"
  - "lib/**"
  - "simulation/**"
  - "v7/**"
  suggestedSteps:
  - "Run CMD-AF-PRECHECK."
  - "Run CMD-AF-P0_9A-TESTS."
  - "Write baseline state report only if all prechecks pass."
  antiPatterns:
  - "Starting implementation with dirty working tree."
  - "Assuming P0.9A passed without running tests."
  - "Changing contracts during baseline check."
  expectedOutputs:
  - "reports/p0_9b_baseline_state.accp.yaml"
  artifactPolicy:
  class: "generated_report"
  wiringRequired: false
  reachabilityRequired: false
  executionRequired: false
  deterministicEvidenceRequired: true
  acceptanceCriteria:

  * id: "AC-TASK00-PRECHECKS-PASS"
    description: "Existing P0.8E/P0.9A tests pass before P0.9B work starts."
    level: "required"
    humanApproved: true
    criteriaSource: "human"
    verification:
    type: "test_output"
    commandRef: "CMD-AF-PRECHECK"
    deterministic: true
    canSatisfyFinalGate: true
    advisoryOnly: false
    evidenceRefs:
    - "EV-CMD-AF-PRECHECK"
    requiredEvidence:

    * "test_output"
    * "command"

* id: "TASK-01-DATA-MANIFEST-FOUNDATION"
  title: "Deterministic Local Data Manifest Foundation"
  objective: >
  Create the minimal local data manifest layer required for AlphaForge research
  without downloading market data or calling external APIs.
  implementation:
  instructions:
  - "Implement read-only data manifest objects under AlphaForge source."
  - "Represent raw_market_data, normalized_market_data, feature_dataset, label_dataset, and research_run_manifest metadata."
  - "Support local JSON fixture manifests only."
  - "Require checksum, source, symbol, interval, start_ts, end_ts, timezone, quality_flags, and storage_uri fields."
  - "Do not implement Binance/API ingestion."
  - "Do not store large datasets."
  allowedFiles:
  - "alphaforge/src/alphaforge/data/**"
  - "alphaforge/tests/**"
  - "integration/tests/test_alphaforge_data_manifest.py"
  - "contracts/fixtures/alphaforge/data_manifest_minimal.json"
  - "reports/p0_9b_data_manifest.accp.yaml"
  forbiddenFiles:
  - "data/**"
  - "datasets/**"
  - "lib/**"
  - "simulation/**"
  - "v7/**"
  suggestedSteps:
  - "Create alphaforge.data.manifest module."
  - "Create immutable dataclasses or typed dict validators."
  - "Create a minimal fixture manifest."
  - "Add tests for load/validate/reject invalid manifest."
  antiPatterns:
  - "Downloading real candles."
  - "Hardcoding real exchange credentials."
  - "Using current live market data."
  - "Treating fixture data as real profitability evidence."
  expectedOutputs:
  - "alphaforge/src/alphaforge/data/manifest.py"
  - "integration/tests/test_alphaforge_data_manifest.py"
  - "contracts/fixtures/alphaforge/data_manifest_minimal.json"
  artifactPolicy:
  class: "library_code"
  wiringRequired: "consumer_or_export"
  reachabilityRequired: true
  executionRequired: true
  deterministicEvidenceRequired: true
  integrationContract:
  mode: "consumer_or_export"
  reason: "Data manifest module must be importable and usable by later label/feature pipeline modules."
  declaredUnits:
  - id: "AF-DATA-MANIFEST"
  path: "alphaforge/src/alphaforge/data/manifest.py"
  kind: "library_module"
  language: "python"
  expectedExports:
  - "DataManifest"
  - "DatasetRef"
  - "load_data_manifest"
  - "validate_data_manifest"
  exportSurfaces:
  - id: "AF-DATA-EXPORTS"
  path: "alphaforge/src/alphaforge/data/**init**.py"
  requiredExports:
  - "DataManifest"
  - "DatasetRef"
  - "load_data_manifest"
  usageProofs:
  - id: "AF-DATA-MANIFEST-USAGE"
  commandRef: "CMD-AF-DATA-TESTS"
  expectedOutputPatterns:
  - "passed"
  proves:
  - "Data manifest module is importable and test-used."
  acceptanceCriteria:

  * id: "AC-TASK01-MANIFEST-LOADS"
    description: "Minimal data manifest fixture loads and validates deterministically."
    level: "required"
    humanApproved: true
    criteriaSource: "human"
    verification:
