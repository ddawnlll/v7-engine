- id: WS-05-COST-MHT
  title: 'WS-05-COST-MHT: Implement Cost Impact Summary and MHT Hold Semantics'
  objective: 'WS-05-COST-MHT: Implement Cost Impact Summary and MHT Hold Semantics'
  implementation:
    instructions:
    - '[must] [action] Implement cost_impact_summary(labels: list[dict], mode: str) -> dict in research.py.'
    - '[must] [action] Extract gross_R values from label rows (field: gross_r or gross_r_multiple). Compute mean gross R.
      Extract net_R values (field: net_r or net_r_multiple). Compute mean net R. Cost drag = mean_gross_R - mean_net_R. cost_drag_pct
      = (cost_drag / abs(mean_gross_R)) * 100 if mean_gross_R != 0 else 0.0.'
    - '[must] [action] Return shape: {gross_r_mean: float, net_r_mean: float, cost_drag: float, cost_drag_pct: float, sample_count:
      int, has_sufficient_sample: bool, summary: str}. has_sufficient_sample is True when sample_count >= 100.'
    - '[must] [action] Handle empty input — return zeros with sample_count=0, has_sufficient_sample=False, summary=''No label
      data available for cost analysis.'''
    - '[must] [action] Implement mht_hold_summary(tested_hypothesis_count: int, correction_method: str = ''NONE_APPLIED'')
      -> dict in research.py.'
    - '[must] [action] When correction_method is NONE_APPLIED, return {correction_method: ''NONE_APPLIED'', corrected_significance:
      null, hold_active: true, hold_reason: str, requires_model_training: true, notes: str}. hold_reason must state that MHT
      correction requires model training which is not performed in this non-ML phase. notes must document what training artifacts
      would be needed to lift the hold.'
    - '[must] [action] Implement assemble_non_ml_research_context(labels: list[dict], mode: str) -> dict that aggregates label_distribution
      + no_trade_quality + cost_impact + mht_hold into a single context dict with keys label_distribution, no_trade_quality,
      cost_impact, mht_hold. This is the P0.9A extension point consumed by builders.py.'
    allowedFiles:
    - alphaforge/src/alphaforge/reports/research.py
    forbiddenFiles:
    - lib/**
    - simulation/**
    - runtime/**
    - interface/**
    - alphaforge/src/alphaforge/reports/builders.py
    dependencies:
    - WS-05-NO-TRADE
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-05-COST-01
    description: cost_impact_summary() returns dict with gross_r_mean, net_r_mean, cost_drag, cost_drag_pct, sample_count,
      has_sufficient_sample, summary
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
