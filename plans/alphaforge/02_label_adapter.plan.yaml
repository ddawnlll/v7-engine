- id: WS-02-MAPPING-DESIGN
  title: Design LabelAdapter Class — Field Mapping and NO_TRADE Quality Classification
  objective: Design LabelAdapter Class — Field Mapping and NO_TRADE Quality Classification
  implementation:
    instructions:
    - '[must] [action] Read alphaforge/docs/label_contract.md fully. Document every one of the 15 label fields that the adapter
      must map: long_R_net, short_R_net, long_mfe_R, short_mfe_R, long_mae_R, short_mae_R, saved_loss_score, missed_opportunity_score,
      no_trade_quality, best_action_label, label_validity, long_R_gross, short_R_gross, cost_impact_long, cost_impact_short.
      Cross-reference each against the simulation_to_alphaforge.json field mapping to confirm source paths and types.

      '
    - '[must] [action] Design the LabelAdapter class signature. It must expose two public methods: adapt_simulation_output(sim_output:
      dict) -> dict that produces an AlphaForgeLabel-compatible dict, and classify_no_trade_quality(no_trade_outcome: dict)
      -> str that returns one of CORRECT_NO_TRADE, SAVED_LOSS, MISSED_OPPORTUNITY, AMBIGUOUS_NO_TRADE. Document the input
      contract (SimulationOutput shape) and output contract (AlphaForgeLabel shape) with type annotations.

      '
    - '[must] [action] Design the NO_TRADE quality classifier logic. Define the decision rules: CORRECT_NO_TRADE when was_correct_skip
      is True and both saved_loss_score and missed_opportunity_score are low; SAVED_LOSS when saved_loss_score exceeds threshold;
      MISSED_OPPORTUNITY when missed_opportunity_score exceeds threshold; AMBIGUOUS_NO_TRADE when signals conflict or scores
      are within ambiguity margin. Specify the threshold values and the tie-breaking order.

      '
    - '[must] [action] Design cost-aware field population. Map long_R_gross and short_R_gross from realized_r_gross. Map fee_cost_r_long/short
      from fee_cost_r. Map slippage_cost_r_long/short from slippage_cost_r. Map total_cost_r_long/short from total_cost_r.
      Define the cost-consumed-edge detection: if realized_r_gross > 0 AND realized_r_net < 0, set a flag or record a warning.
      Document that funding_status is always DEFERRED.

      '
    - '[must] [action] Design label_validity filtering logic. Rows with resolution_status UNRESOLVED or INVALIDATED must be
      excluded (label_validity = "invalid"). Rows with is_ambiguous = true must be excluded unless the ambiguity is resolvable
      (label_validity = "ambiguous_excluded"). Rows with resolution_status COMPLETE and is_ambiguous = false produce label_validity
      = "valid". Document the validity enum values and their inclusion/exclusion rules for training.

      '
    - '[must] [action] Verify that the design does not require network access, exchange API keys, Binance imports, or real
      market data. Explicitly enumerate which Python stdlib modules the implementation will use (dataclasses, json, copy,
      typing, enum) and confirm no external pip dependencies beyond what alphaforge already declares.

      '
    - '[must] [action] Confirm domain boundary: alphaforge.labels must not import from simulation/, v7/, runtime/, or interface/.
      It may import from alphaforge.contracts.loader, alphaforge.paths, and alphaforge.errors. Document the allowed import
      surface.

      '
    allowedFiles:
