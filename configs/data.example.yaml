  - FTMUSDT
  - ENAUSDT
  - OMUSDT
  - TAOUSDT
  - KAITOUSDT
  # ── Tier 5 — Volume Rotation (20), perpetual 2021-2024 ───────────
  - GALAUSDT
  - SANDUSDT
  - MANAUSDT
  - AXSUSDT
  - GRTUSDT
  - LDOUSDT
