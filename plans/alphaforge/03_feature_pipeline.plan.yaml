- id: WS-03-SPEC-RECONCILIATION
  title: 'Design: Map Feature Contract 7 Groups to Implementation Plan'
  objective: 'Design: Map Feature Contract 7 Groups to Implementation Plan'
  implementation:
    instructions:
    - '[must] [action] Read alphaforge/docs/feature_contract.md fully. Document every feature in each of the 7 groups: Returns
      (log_return_1, log_return_N, return_volatility_N, return_zscore_N), Volatility (realized_volatility_N, high_low_range_N,
      garman_klass_vol_N, parkinson_vol_N), ATR (atr_N, atr_pct_N, atr_expansion_N), Momentum (momentum_N, roc_N, rsi_N, macd,
      macd_signal, macd_histogram), Volume (volume_ratio_N, volume_trend_N, vwap_deviation, obv_N), Breakout (bb_position,
      bb_width, highest_N, lowest_N, range_breakout_N), Lead-Lag (tf_alignment, correlation_N, lead_lag_score). For each feature,
      record: formula, lookback window, required input columns, output type, and any edge cases.

      '
    - '[must] [action] Mark Lead-Lag group as DEFERRED. Document the specific reason: cross-sectional data required (P0.9B
      dependency). Define re-enablement conditions: (a) cross- sectional data pipeline available, (b) correlation computation
      across symbols validated, (c) timeframe alignment logic tested with multi-timeframe fixtures. Do NOT create stub functions
      or placeholder implementations.

      '
    - '[must] [action] Define the causality contract for every feature. For each feature, specify the exact lookback window
      in terms of bar indices: feature at bar[t] uses bars [t-lookback+1 .. t] inclusive. Document which features use close-only,
      which use OHLC, and which use volume data. The causality contract is the foundation for leakage tests.

      '
    - '[must] [action] Cross-reference feature timeframes against simulation/docs/profiles.md locked mode profiles. Confirm
      that SWING mode (4h primary, 1d context, 1h refinement) is the implementation baseline. Document N values (lookback
      windows) for each feature in SWING mode. Note that SCALP and AGGRESSIVE_SCALP feature sets require empirical tuning
      and are HOLD.

      '
    - '[must] [action] Define the FeatureMatrix export surface: a dict or dataclass with keys for each feature group, containing
      numpy arrays of shape (n_bars, n_features_in_group). The matrix must include a timestamp index and symbol identifier.
      Define the missing_policy for each feature: forward-fill within group, NaN for insufficient lookback at start of series.

      '
    - '[must] [action] Design the pipeline API: compute_features(ohlcv_data: dict, mode: str, timeframe_stack: dict) -> FeatureMatrix.
      The function must: (a) validate input columns exist (open, high, low, close, volume), (b) compute each active group,
      (c) enforce causality at the pipeline level, (d) apply missing_policy, (e) return a structured FeatureMatrix. No side
      effects, no global state.

      '
    - '[must] [action] Enumerate all required Python modules: numpy (array operations), dataclasses (FeatureMatrix), typing
      (type hints), enum (feature groups). Confirm no external dependencies beyond numpy. Document that scipy, pandas, ta-lib,
      and other libraries are NOT required -- all computations use numpy only.

      '
    allowedFiles:
