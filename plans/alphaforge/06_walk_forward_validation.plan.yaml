      alphaforge/tests/test_walk_forward_validator.py, alphaforge/tests/conftest.py, integration/tests/test_alphaforge_validation.py,
      reports/accp/**).'
    - '[must] [action] Run forbidden file scan: confirm no changes to lib/, simulation/engine/, runtime/, interface/, data/,
      datasets/, models/, artifacts/, .github/.'
    - '[must] [action] Run no-xgboost scan: grep for ''xgboost'', ''XGBClassifier'', ''XGBRegressor'', ''sklearn'', ''tensorflow'',
      ''torch'', ''fit('' across all new/modified Python files. Confirm zero matches.'
    - '[must] [action] Run no-fake-metrics scan: grep for NOT_EVALUATED across all report assembly code. Confirm NOT_EVALUATED
      is consistently used — no 0.0, no 1.0, no synthetic values in metric fields.'
    - '[must] [action] Run no-shuffle scan: grep for ''shuffle'', ''random'', ''permutation'', ''seed'' in walk_forward.py.
      Confirm no randomization code exists.'
    - '[must] [action] Run no-profitability scan: grep for ''profitability'', ''profit'', ''edge confirmed'', ''alpha works''
      across all new/modified Python files. Confirm zero matches.'
    - '[must] [action] Run import boundary check: confirm alphaforge/src/alphaforge/validation/ does not import from v7/,
      simulation/engine/, runtime/, or interface/.'
    - '[must] [action] Run chronological ordering scan: verify that dataset processing in walk_forward.py sorts or validates
      chronological order — no random access that could reorder.'
    - '[must] [action] Write ACCP-YAML 2.0.0 report to reports/accp/walk_forward_validation.accp.yaml with keys: result, scope_confirmation,
      files_changed, decisions_locked, remaining_holds, safe_next_step, commands_run, evidence.'
    allowedFiles:
    - alphaforge/src/alphaforge/validation/**
    - alphaforge/tests/test_walk_forward_validator.py
    - alphaforge/tests/conftest.py
    - integration/tests/test_alphaforge_validation.py
    - reports/accp/**
    forbiddenFiles:
    - lib/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    - data/**
    - datasets/**
    - models/**
    - artifacts/**
    dependencies:
    - WS-06-NO-FAKE-TESTS
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-06-REPORT-01
    description: CMD-final-validation exits 0 with all tests passing
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - command
      - test_output
      commandRef: CMD-final-validation
    requiredEvidence:
    - command
    - test_output
  - id: AC-06-REPORT-02
    description: CMD-discover-git-status shows only allowed files modified
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: command_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - command
      - diff
      commandRef: CMD-discover-git-status
    requiredEvidence:
    - command
    - diff
  - id: AC-06-REPORT-03
    description: 'Forbidden file scan: zero modifications to lib/, simulation/engine/, runtime/, interface/, data/, datasets/,
      models/, artifacts/, .github/'
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: command_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - command
      - diff
      commandRef: CMD-discover-git-status
    requiredEvidence:
    - command
    - diff
  - id: AC-06-REPORT-04
    description: No xgboost, sklearn, tensorflow, torch, or fit() calls in any new or modified Python file
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_contains
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
