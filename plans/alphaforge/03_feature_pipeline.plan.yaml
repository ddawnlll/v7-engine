- id: WS-03-VOLATILITY-ATR
  title: Implement Volatility Group and ATR Group
  objective: Implement Volatility Group and ATR Group
  implementation:
    instructions:
    - '[must] [action] Implement Volatility group functions in pipeline.py. compute_realized_volatility (close: np.ndarray,
      window: int) -> np.ndarray: annualized realized volatility = std(log_returns[t-window:t]) * sqrt(periods_per_year).
      For SWING 4h bars, periods_per_year = 365 * 6 = 2190. NaN for t < window.

      '
    - '[must] [action] Implement compute_high_low_range(high: np.ndarray, low: np.ndarray, close: np.ndarray, window: int)
      -> np.ndarray: rolling mean of (high - low) / close over `window` bars. Implement compute_garman_klass_vol(open: np.ndarray,
      high: np.ndarray, low: np.ndarray, close: np.ndarray, window: int) -> np.ndarray: Garman-Klass estimator = sqrt(1/N
      * sum(0.5*ln(H/L)^2 - (2*ln(2)-1)*ln(C/O)^2)). Implement compute_parkinson_vol(high: np.ndarray, low: np.ndarray, window:
      int) -> np.ndarray: Parkinson estimator = sqrt(1/(4*N*ln(2)) * sum(ln(H/L)^2)).

      '
    - '[must] [action] Implement compute_volatility_group(open_arr, high, low, close, window) -> dict with keys: realized_volatility_N,
      high_low_range_N, garman_klass_vol_N, parkinson_vol_N. All NaN-filled at start for insufficient lookback.

      '
    - '[must] [action] Implement ATR group functions. compute_true_range(high, low, close) -> np.ndarray: TR[t] = max(high[t]-low[t],
      |high[t]-close[t-1]|, |low[t]-close[t-1]|). compute_atr(high, low, close, window) -> np.ndarray: Wilder''s smoothed
      ATR or simple rolling mean of TR over `window` bars. compute_atr_pct(atr, close) -> np.ndarray: ATR / close * 100. compute_atr_expansion(atr,
      window) -> np.ndarray: ATR / SMA(ATR, window).

      '
    - '[must] [action] Implement compute_atr_group(high, low, close, window) -> dict with keys: atr_N, atr_pct_N, atr_expansion_N.
      All NaN-filled at start for insufficient lookback. ATR window N defaults to 14 for SWING mode baseline.

      '
    - '[must] [action] Causality check: true_range at t uses high[t], low[t], close[t], close[t-1]. ATR at t uses TR[t-window+1
      .. t]. No future bars. Garman-Klass and Parkinson at t use only bars up to t. Document the window boundaries in code
      comments.

      '
    - '[must] [action] Ensure all volatility computations are deterministic -- no random sampling, no stochastic elements.
      Same OHLC input must produce identical output across calls. Test with fixed numpy seed verification (even though no
      RNG is used).

      '
    allowedFiles:
    - alphaforge/src/alphaforge/features/__init__.py
    - alphaforge/src/alphaforge/features/pipeline.py
    - alphaforge/src/alphaforge/__init__.py
    - alphaforge/src/alphaforge/errors.py
