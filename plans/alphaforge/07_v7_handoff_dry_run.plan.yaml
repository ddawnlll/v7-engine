  - id: AC-07-GM-04
    description: validate_gate_mapping() raises GateMappingError when a gate entry is missing 'evidence_ref' (e.g., only has
      'status') or missing 'status' (e.g., only has 'evidence_ref').
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
