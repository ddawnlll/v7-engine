- id: WS-09-NO-TRAINING
  title: Model Training Artifact Scan — Verify Zero Training Patterns
  objective: Model Training Artifact Scan — Verify Zero Training Patterns
  implementation:
    instructions:
    - '[must] [scan] Run CMD-scan-training to scan the full source tree for ML model training evidence. Target patterns: "xgboost",
      "XGBClassifier", "XGBRegressor", ".fit(", ".train(", "from xgboost", "import xgboost". Expected result: CLEAN:TRAINING_SCAN.

      '
    - '[must] [analysis] Review all matches (if any). Distinguish between: (a) actual XGBoost imports, model instantiation,
      or fit() calls indicating real training, (b) references to XGBoost in documentation, roadmaps, or anti-patterns stating
      "do not train", (c) .fit() calls on non-ML objects (e.g., curve fitting, data fitting utilities). Category (a) is a
      HARD FAIL. Categories (b) and (c) are acceptable with annotation.

      '
    - '[must] [scan] Run CMD-list-model-artifacts to enumerate files in models/ and artifacts/ directories. Expected: CLEAN:NO_MODEL_ARTIFACTS
      (no .pkl, .joblib, .xgb, .ubj, .bin, .h5, .pb, .pt, .onnx, or similar serialized model files). Any model artifact file
      is a HARD FAIL.

      '
    - '[must] [audit] Verify that no subplan (00-08) introduced model training code. Check alphaforge/src/ for any module
      that imports xgboost or sklearn.ensemble in a manner that could enable training. XGBoost references in the ML pilot
      gate subplan (08) are acceptable ONLY if they define the gate design without actually importing or invoking training.

      '
    - '[must] [audit] Verify that alphaforge/src/ contains no serialized model loading code targeting models/ or artifacts/.
      Model loading for evaluation violates the "no training" guard unless the model is a fixture-only stub.

      '
    - '[must] [evidence] Produce a structured audit result: either CLEAN (zero training artifacts) or FLAGGED (specific matches
      with classification). All matches must be annotated and adjudicated. Any true training artifact is a blocking violation.
      Include results in evidence ledger.

      '
    allowedFiles:
    - reports/accp/**
    - plans/alphaforge/09_final_validation.plan.yaml
