metadata:
  planId: ALPHAFORGE-06
  title: AlphaForge 06 — Walk-Forward Validation Skeleton Implementation
  description: 'Implement alphaforge/src/alphaforge/validation/walk_forward.py — the walk-forward validation skeleton. WalkForwardValidator
    class splits LabeledDataset into chronological folds per validation_contract.md. Produces ValidationReport structure with
    OOS summary, cost stress (fee multiplier, slippage, funding DEFERRED), regime breakdown (4 regimes), and symbol stability
    (40%/60% limits). NO model training inside folds — all metrics are NOT_EVALUATED placeholders. No fake data. No profitability
    claims. TDD with negative structural tests (chronological ordering, 6-fold enforcement, purge window correctness, no-shuffle
    enforcement).

    '
