decisions_locked:
  - id: "DEC-017"
    decision: >
      V7 profitability thesis is explicitly documented as a single cohesive synthesis.
      Canonical chain: AlphaForge discovers → Simulation measures → V7 accepts/rejects →
      Runtime operates → Interface observes.
    files:
      - "v7/docs/profitability_thesis.md"

  - id: "DEC-018"
    decision: >
      Alpha hypotheses (ALTCOIN_DELAY, VOLATILITY_COMPRESSION, FUNDING_DIVERGENCE) are
      mapped to compatible modes with explicit validation gates, rejection conditions,
      and required simulation outputs.
    files:
      - "v7/docs/v7_mode_centric_architecture.md"
      - "v7/docs/profitability_thesis.md"

  - id: "DEC-019"
    decision: >
      Promotion gate sequence is G0_DOC_READY → G1_RESEARCH_BACKTEST → G2_WALK_FORWARD_OOS
      → G3_COST_STRESS → G4_REGIME_BREAKDOWN → G5_SYMBOL_STABILITY → G6_CALIBRATION_RELIABILITY
      → G7_SHADOW → G8_PAPER → G9_TINY_LIVE → G10_LIVE. Each mode must pass all gates
      independently. No gate may be skipped.
    files:
      - "v7/docs/pipeline/evaluation.md"

  - id: "DEC-020"
    decision: >
      Funding cost model for perpetuals is DEFERRED for spot/non-perp first phase.
      LOCK_CANDIDATE formula defined. Perpetual swap trading blocked at G3 until
      funding model is LOCKED. Spot trading unaffected.
    files:
      - "simulation/docs/cost_model.md"

  - id: "DEC-021"
    decision: >
      Mode-specific risk parameters: SWING tolerates wider stops but requires strict
      drawdown/cluster controls. SCALP requires stricter stale-result and cost sensitivity.
      AGGRESSIVE_SCALP requires strictest stale-result, slippage, no-trade, cooldown,
      and kill-switch controls.
    files:
      - "v7/docs/pipeline/risk.md"

  - id: "DEC-022"
    decision: >
      Each mode has independent readiness state (DESIGN_LOCKED through LIVE_ELIGIBLE).
      Runtime routes only to mode artifacts whose readiness state allows the requested
      environment. Disabled modes return safe non-actionable result, not fallback to
      another mode. SWING can be promoted while other modes remain disabled or research-only.
    files:
      - "v7/docs/runtime/runtime_integration.md"

  - id: "DEC-023"
    decision: >
      Mandatory rejection rule: any alpha that cannot survive cost, slippage, funding
      (where applicable), no-trade comparison, regime breakdown, symbol stability,
      calibration quality, and walk-forward OOS validation must be rejected regardless
      of apparent model accuracy.
    files:
      - "v7/docs/profitability_thesis.md"
      - "v7/docs/pipeline/evaluation.md"

lock_candidates:
  - id: "LC-001"
    decision_area: "Mode-specific promotion thresholds (exact numeric values)"
    candidate_default: >
      SWING: min 200 trades, ≥ 0.15R expectancy, ≤ 25% max drawdown, 4wk shadow, 4wk paper,
      0.5% account risk per trade.
      SCALP: min 500 trades, ≥ 0.05R expectancy, ≤ 15% max drawdown, 3wk shadow, 4wk paper,
      0.25% account risk per trade.
      AGGRESSIVE_SCALP: min 300 trades, ≥ 0.03R expectancy, ≤ 10% max drawdown, 2wk shadow,
      3wk paper, 0.1% account risk per trade.
    reason_owner_review_required: >
      No existing documented numeric thresholds. Values are conservative educated defaults
      based on mode timeframe/horizon/cost-sensitivity differences. Must be reviewed against
      real backtest results before becoming operational gates.
    files:
      - "v7/docs/pipeline/evaluation.md"

  - id: "LC-002"
    decision_area: "Funding cost model LOCK_CANDIDATE formula"
    candidate_default: >
      funding_cost_r = sum(holding_overlap_rule × funding_rate × position_direction_sign ×
      position_size) / entry_risk_price. Funding interval: 8h. Conservative default: apply
      funding at each interval boundary regardless of position duration.
    reason_owner_review_required: >
      Formula is structurally sound but must be validated against exchange-specific funding
      mechanics (Binance vs Bybit vs OKX). Holding overlap pro-rata rule needs testing against
      real funding schedules. Rate source must be verified as available historically.
    files:
      - "simulation/docs/cost_model.md"

  - id: "LC-003"
    decision_area: "Mode-specific risk parameters (exact numeric values)"
    candidate_default: >
      SWING: 25% max mode exposure, 10% max symbol, 5% daily loss, 4-bar cooldown, 1-bar stale TTL.
      SCALP: 15% max mode exposure, 5% max symbol, 3% daily loss, 6-bar cooldown, 2-bar stale TTL.
      AGGRESSIVE_SCALP: 5% max mode exposure, 2% max symbol, 2% daily loss, 12-bar cooldown,
      4-bar stale TTL.
    reason_owner_review_required: >
      Conservative defaults aligned with mode risk profiles. Must be reviewed against account
      size, symbol universe, and operational constraints. Kill-switch sensitivity thresholds
      need calibration against actual backtest drawdown patterns.
    files:
      - "v7/docs/pipeline/risk.md"

  - id: "LC-004"
    decision_area: "Per-mode minimum training sample"
    candidate_default: >
      Minimum 200 labeled events per fold for SWING, 500 for SCALP, 300 for AGGRESSIVE_SCALP.
      Not yet patched into pipeline/dataset.md — marked for P0.6B or owner review.
    reason_owner_review_required: >
      Not patched in this batch. Sample size requirements depend on feature dimensionality
      and model complexity. XGBoost can work with smaller samples but reliability degrades.
      Owner should determine based on first backtest results.
    files:
      - "v7/docs/pipeline/dataset.md"

