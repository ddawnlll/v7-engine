- id: WS-06-PURGE-EMBARGO
  title: Implement purge window and embargo policy — mode-specific bar gaps between folds
  objective: Implement purge window and embargo policy — mode-specific bar gaps between folds
  implementation:
    instructions:
    - '[must] [action] Implement mode-specific purge window constants in contracts.py: SCALP = 100 bars, AGGRESSIVE_SCALP
      = 200 bars, SWING = 20 bars. Source: validation_contract.md purge windows table.'
    - '[must] [action] Implement purge_gap function: given two datetime boundaries (end_of_fold_N_train, start_of_fold_N_val),
      compute the gap in bars. Raise ValidationError if gap < required purge_bars for the mode.'
    - '[must] [action] Implement embargo enforcement: for each fold, after computing train/val/oos boundaries, verify that
      no training sample falls within embargo_bars of any test (val or oos) sample. Record embargo_applied in Fold.'
    - '[must] [action] Implement embargo_distance function: given two sets of indices (train_indices, test_indices), compute
      the minimum bar distance between any train sample and any test sample. If min distance < embargo_bars, raise ValidationError.'
    - '[must] [action] Purge and embargo must be computed in bar units (not time units). The bar count is the count of distinct
      timestamps between two points in the sorted dataset.'
    - '[must] [action] Define a PurgePolicy dataclass holding purge_bars, embargo_bars, and mode. Provide a validate_purge(fold,
      dataset) method that confirms purge gap is satisfied.'
    - '[must] [action] Do NOT implement model training. Do NOT import xgboost, sklearn, or any ML library.'
    allowedFiles:
    - alphaforge/src/alphaforge/validation/**
    forbiddenFiles:
    - alphaforge/tests/**
    - integration/tests/**
  artifactPolicy:
