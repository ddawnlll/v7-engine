- id: WS-03-LEAKAGE-TESTS
  title: Create Leakage Negative Tests and Deterministic Feature Matrix Tests
  objective: Create Leakage Negative Tests and Deterministic Feature Matrix Tests
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/tests/test_feature_pipeline.py with pytest. Organize tests by category: (a) unit
      tests per feature function, (b) group integration tests, (c) leakage negative tests, (d) determinism tests, (e) full
      pipeline tests, (f) import boundary tests. Use inline OHLCV fixture data (numpy arrays created in test functions) --
      no external data files needed.

      '
    - '[must] [action] CRITICAL -- Leakage negative test: create a test helper that attempts to compute features with a window
      that extends into the future. Create a validate_causality(feature_func, ohlcv_data) helper that verifies the function
      only accesses bars up to the current index. For each feature group, verify that passing data where close[t+1] is used
      in computation raises an error or produces a detectable anomaly. Test specifically: (a) future close in log_return,
      (b) future high/low in ATR, (c) future close in MACD EMA, (d) future close in BB computation, (e) future volume in volume_ratio.

      '
    - '[must] [action] Leakage test design: For each feature function f(arr), compute y1 = f(arr[0:N]). Then compute y2 =
      f(arr[0:N+1]) and verify y1[0:N] == y2[0:N] (no revision of past values when future data is added). This is the "no-revision"
      test. If adding bar N+1 changes feature values at bars 0..N-1, there is leakage.

      '
    - '[must] [action] Determinism test: call each feature group function 5 times with identical input. Assert np.array_equal()
      on all output arrays. Verify that compute_features() with same OHLCV data produces identical FeatureMatrix across 5
      calls. Confirm no random seed, timestamp, or process ID influence.

      '
    - '[must] [action] Feature matrix shape tests: for input of length N, verify each feature array has length N. Verify NaN
      count at start matches expected lookback for each feature. Verify total feature count: 4 (Returns) + 4 (Volatility)
      + 3 (ATR) + 6 (Momentum) + 4 (Volume) + 5 (Breakout) = 26 features minimum in full FeatureMatrix. Lead-Lag features
      must be ABSENT.

      '
    - '[must] [action] Lead-Lag DEFERRED test: verify that FeatureGroup.LEAD_LAG exists as an enum member, that FEATURE_GROUP_MAP
      does NOT include a compute function for LEAD_LAG, and that compute_features() does NOT produce any lead-lag feature
      columns. Importing LEAD_LAG should not trigger any computation or side effect.

      '
    - '[must] [action] Edge case tests: (a) input array of length 1 (all NaN output for lookback>1 features), (b) constant
      price (zero returns, RSI=50, zero volatility), (c) single spike then flat (MACD convergence to zero), (d) zero volume
      bars (volume_ratio division safety), (e) negative prices (should raise ValueError), (f) NaN in input OHLCV (should propagate
      with warning).

      '
    - '[must] [action] Import boundary test: programmatically verify that alphaforge.features does not import from simulation,
      v7, runtime, or interface. Scan the module''s __dict__ or use a static import check. Test must fail if any forbidden
      import is detected.

      '
    - '[must] [action] Run all tests: CMD-test-alphaforge must pass with exit 0. Then run CMD-test-integration-alphaforge,
      CMD-test-contract-registry-schema, CMD-test-import-boundaries, and CMD-test-simulation. All must exit 0. No existing
      tests may be broken by the new feature module.

      '
    allowedFiles:
    - alphaforge/tests/test_feature_pipeline.py
    - alphaforge/tests/__init__.py
    - alphaforge/tests/conftest.py
    - alphaforge/src/alphaforge/features/__init__.py
    - alphaforge/src/alphaforge/features/pipeline.py
