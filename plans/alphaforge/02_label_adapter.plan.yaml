metadata:
  planId: ALPHAFORGE-02-LABEL-ADAPTER
  title: AlphaForge P0.9B — Label Adapter (TASK-02 of Master Execution Plan)
  description: 'Implement `alphaforge/src/alphaforge/labels/adapter.py` — a deterministic adapter that transforms SimulationOutput
    fixture records into AlphaForgeLabel records per label_contract.md and simulation_to_alphaforge.md mapping.

    The LabelAdapter class performs field-level mapping of all 15 fields from long_R_net through cost_impact_short, classifies
    NO_TRADE quality into four categories (CORRECT_NO_TRADE, SAVED_LOSS, MISSED_OPPORTUNITY, AMBIGUOUS_NO_TRADE), filters
    rows by label_validity, and validates outputs against alphaforge_label.schema.json. All mapping is derived from the authoritative
    simulation_to_alphaforge.json field-level mapping. The adapter is fully deterministic — same SimulationOutput inputs always
    produce identical AlphaForgeLabel outputs.

    Cost-aware fields (gross R vs net R, fee_cost_r, slippage_cost_r, total_cost_r) are mapped explicitly. The cost-consumed-edge
    case (gross > 0 but net < 0) is flagged. Funding status is propagated as DEFERRED.

    This is a deterministic data transformation with no network calls, no exchange APIs, no model training, and no simulation
    semantics modification. SimulationOutput is consumed as-is; AlphaForge does not reimplement simulation logic.

    Predecessor: TASK-01-DATA-MANIFEST. Successor: TASK-03-FEATURE-PIPELINE.

    '
