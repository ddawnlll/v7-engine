    - "Complete simulation_to_alphaforge.json to match the .md mapping (currently a 12-field subset omitting all cost fields)."
    - "Reconcile timeframe stacks to ONE canonical anchor (profitability_thesis.md + profiles.md: SWING 4h, SCALP 1h, AGGRESSIVE_SCALP 15m) across data_contract.md, feature_contract.md, mode_centric_architecture.md, roadmap.md, and all 3 mode fixtures."
    - "Enforce leakage_policy in code (jsonschema.validate on FeatureSetSpec); add point-in-time verification flag per row."
    - "Add cross-sectional / survivorship / UTC-grid data layer + point-in-time universe membership (blocks AS-001/AS-004 otherwise)."
    - "Align validation_contract to V7 gates: 6 folds (not 5/3), TREND_UP/DOWN/RANGE/TRANSITION (not HIGH_VOL_*), quantitative 40%/60% symbol stability (not qualitative), fee+slippage+spread+funding cost stress (not fee+slippage only), SCALP >= 0.10R cost-adjusted expectancy reference."
    - "Add MHT / data-snooping control (FDR or deflated Sharpe) to validation_contract + validation_report schema."
    - "Add SCALP + AGGRESSIVE_SCALP simulation golden tests (only SWING is golden-tested today)."

confidence_and_threshold_tuning_assessment:
  status: hold
  required_path:
    - "Calibration as a walk-forward/validation problem: per-mode CalibrationCandidate with ECE/MCE/Brier, confidence bins, reliability curves, status CALIBRATED/UNCALIBRATED/UNRELIABLE (ECE<0.05 / >=0.05 / >0.10)."
    - "Threshold tuning tied to walk-forward recalibration (DEC-020: SWING LOCKED_INITIAL_BASELINE thresholds recalibrated after first walk-forward; SCALP/AGGR stay HOLD until empirical evidence)."
    - "V7 G6 calibration-reliability gate: reliability error per confidence bucket; predicted-vs-realized R bucket alignment; regression sign correctness."
    - "Conformal calibration retrofit (Policy Critic v2+) — but resolve time-series exchangeability violation first (Policy Critic HOLD #7)."
    - "Calibration drift monitoring (pipeline/monitoring.md)."
  warning: >
    Calibration DESIGN is solid but there is NO implementation, and the
    validation_contract misalignment means the calibration validation frame
    is not yet aligned to V7 gates. Confidence must NOT be accepted raw — the
    calibration path must be built and gated before any probability/expected-R
    surface feeds V7 policy dual-gates.

overfit_and_data_snooping_assessment:
  status: hold
  risks:
    - "No multiple-hypothesis-testing / data-snooping correction (no Bonferroni/FDR/deflated Sharpe) — the biggest false-positive source in a multi-thesis discovery system."
    - "Loose report schemas: mode_research_report / v7_handoff_package / validation_report allow empty cost_stress/no_trade_comparison/regime_breakdown/metrics objects to pass validation -> an economically empty report could be mistaken for evidence."
    - "Timeframe misalignment (1m/5m features vs 1h labels) would produce spurious edge from timestamp misalignment/lookahead."
    - "Survivorship bias: single-symbol BTCUSDT-only fixtures, no delisting/universe handling."
    - "SCALP/AGGRESSIVE_SCALP cost model untested — could hide the slippage effect that kills the primary modes."
    - "Feature leakage at consumption layer: lib primitives are causal, but cross-sectional normalization / target encoding rules are documented but unenforced in code."
  controls_required:
    - "Add MHT/data-snooping control (FDR or deflated Sharpe / deflated Sharpe haircut) to validation_contract + validation_report schema, applied across all tested theses/features."
    - "Tighten nested required in mode_research_report / v7_handoff_package / validation_report / alphaforge_research_report so empty-payload reports cannot pass."
    - "Add jsonschema.validate fixture-conformance tests for all 11 AlphaForge schemas + AlphaForgeLabel; add registry test asserting all 14 contracts by name."
    - "Reconcile timeframe stacks to one canonical anchor."
    - "Add point-in-time universe + survivorship/delisting handling."
    - "Add SCALP/AGGRESSIVE_SCALP simulation golden tests + spread stress."

v7_policy_gate_alignment:
  status: hold
  final_authority_preserved: true
  notes: >
    V7's OWN gate definition is canonical and internally consistent across
    evaluation.md:184-196, profitability_thesis.md:216, and
    runtime_integration.md:82-87 (G0=DOC_READY, G1=RESEARCH_BACKTEST,
    G2=WALK_FORWARD_OOS, G3=COST_STRESS, G4=REGIME_BREAKDOWN,
    G5=SYMBOL_STABILITY, G6=CALIBRATION_RELIABILITY, G7=SHADOW, G8=PAPER,
    G9=TINY_LIVE, G10=LIVE). V7 final authority is preserved. The HOLD is
    because the ALPHAFORGE side of the handoff is misaligned: the
    v7_handoff_package.schema.json v7_gate_mapping keys
    (G3_model_sanity/G5_cost_resilience/G8_calibration/G9_no_trade_baseline/
    G10_paper_shadow) and alphaforge_to_v7.md / handoff_to_v7.md / fixture
    encode the WRONG numbering (V7 G3=COST_STRESS not model_sanity; V7 G5=
    SYMBOL_STABILITY not cost_resilience; V7 G6=CALIBRATION_RELIABILITY not
    G8; V7 G9=TINY_LIVE not no_trade; No-Trade is a metric family, not a
    gate). A naive V7 consumer trusting the handoff labels would evaluate
    cost resilience against the wrong gate. (Workflow read:v7_policy_gate_
    alignment agent independently scored V7's own alignment 8.3 and confirmed
    the AlphaForge-side drift.) Additionally roadmap.md:145 has a V7-internal
    timeframe drift (SCALP 15m/1h/5m) vs canonical (SCALP 1h).

deep_learning_position:
  allow_now: false
  recommended_role: "V8 / challenger layer for embeddings, regime detection, anomaly detection, or calibration retrofit — NOT V7 core. First production model family stays GBDT/XGBoost (DEC-004) until baseline evidence exists."
  unlock_conditions:
    - "Baseline GBDT/XGBoost model family produces positive cost-adjusted OOS edge surviving V7 G0-G6 for at least one mode."
    - "Sufficient data volume and feature richness to justify deep model capacity (avoid overfitting a large model on label-sparse tabular data)."
    - "Owner review and a documented challenger-vs-baseline comparison showing deep learning materially beats GBDT on net-R (not accuracy)."
    - "Deep model outputs remain advisory scores; V7 FinalGate retains final authority."

rl_policy_critic_position:
  allow_now: false
  recommended_role: "Advisory offline-RL critic (Implicit Q-Learning + distributional Q-heads on XGBoost quantile regressors + conformal calibration). Sits between V7 hard gates and the final gate. Can DOWNGRADE but NEVER UPGRADE execution. Hard-gate failure always wins; critic ALLOW does not grant execution eligibility. Staged rollout v1 (rule-based shadow) -> v2 (supervised critic) -> v3 (offline RL, live veto SWING-only) -> v4 (constrained policy optimizer, SWING-only)."
  proposed_component_name: V7 Policy Critic
  authority_limits:
    - "Advisory only (is_advisory: true, non-negotiable); emits verdict ALLOW/DOWNWEIGHT_CONFIDENCE/VETO_TO_NO_TRADE/REQUIRE_REVIEW; V7 policy enacts the veto."
    - "Lowest authority in truth hierarchy (simulation > realized > contract > runtime > model > critic); can downgrade, never upgrade."
    - "Hard-gate failure -> NO_TRADE; critic NOT consulted."
    - "No new actions/modes (action space locked {LONG, SHORT, NO_TRADE}, DEC-002)."
    - "No silent suppression — every critic verdict visible in DecisionEvent.runtime_interpretation."
    - "Live veto in SWING only (LOCKED_INITIAL_BASELINE); SCALP/AGGRESSIVE_SCALP shadow-only (HOLD)."
    - "Spot-only-valid; perp blocked at G3 (funding DEFERRED)."
    - "Consumes existing AlphaForge evidence; never generates new alpha."
  unlock_conditions:
    - "Replay buffer built: (state, action, realized_r_net, mae_r, next_state) tuple emitter from simulation engine replay adapter."
    - "regret_r no longer hardcoded to 0.0 (engine.py:168)."
    - "Funding cost model implemented (critic perp scope unblocks)."
    - "Per-direction expected_R available (train on simulation per-direction realized R; V6 single expected_return as interim proxy)."
    - "Time-aware conformal variant chosen (time-series exchangeability violation resolved)."
    - "IQL/CQL disagreement bounded; OPE approx equal to realized; SWING net expectancy >= baseline (Deflated Sharpe); veto rate bounded away from 0 and 1; no OOD exceedance."
    - "v7/src greenfield wiring into runtime adapter (no V6 patch)."
    - "Owner review per stage gate; numeric thresholds (IQL expectile tau, conformal coverage) not locked without empirical evidence."

