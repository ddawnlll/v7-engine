  reason: >
    No requirements.txt, requirements-dev.txt, pyproject.toml, setup.cfg, or
    poetry.lock exists. Makefile install target installs `pytest requests mypy ruff`.
    mypy and ruff are only used for optional lint/typecheck targets, not for CI
    test/check commands. Minimal CI dependency set is `pytest` (test runner) and
    `requests` (needed by lib/tests/test_market_data_binance.py). pip upgraded first.

