      files_changed, acceptance_criteria_results (all 56 ACs with pass/fail status and evidence refs), leakage_test_results
      (all negative tests with explicit pass/fail), lead_lag_deferral_documented, decisions_locked, remaining_holds, safe_next_step,
      commands_run, evidence.

      '
    - '[must] [action] Verify all 56 acceptance criteria are satisfied and each has at least one evidence ref. Document any
      AC that cannot be satisfied with an explicit reason. Mark the report result as CONDITIONAL if any gate AC is incomplete,
      FAIL if any must-priority AC is failing.

      '
    - '[must] [action] Run deterministic feature matrix verification: call compute_features() with the canonical OHLCV fixture,
      compute a sha256 hash of the canonical JSON representation of the feature matrix, and store it in the ACCP report as
      the canonical feature hash. This hash becomes the reference for all future feature pipeline regression tests.

      '
    - '[must] [action] Scan all new and modified files for forbidden patterns: xgboost, binance, curl, wget, api_key, profitability,
      live.trading, lead_lag implementation, future-looking windows. Confirm zero matches. Document the scan results in the
      ACCP report.

      '
    - '[must] [action] Confirm the Lead-Lag deferral is properly documented: FeatureGroup.LEAD_LAG exists but no compute function
      is mapped, no lead-lag columns appear in FeatureMatrix, and the deferral reason (P0.9B cross-sectional data) is stated
      in pipeline.py docstrings and in the ACCP report.

      '
    - '[must] [action] Confirm the workspace is complete. The ACCP report is evidence only -- it does not authorize the next
      task. The master orchestrator (or human operator) gates the transition to TASK-04-DATASET-ASSEMBLER. The FeatureMatrix
      export surface is the integration contract consumed by the dataset assembler.

      '
    allowedFiles:
    - reports/accp/alphaforge_feature_pipeline.accp.yaml
    - reports/accp/alphaforge_feature_pipeline_tests.accp.yaml
    - alphaforge/tests/test_feature_pipeline.py
    - alphaforge/src/alphaforge/features/__init__.py
    - alphaforge/src/alphaforge/features/pipeline.py
    - plans/alphaforge/03_feature_pipeline.plan.yaml
    forbiddenFiles:
    - alphaforge/src/alphaforge/labels/**
    - alphaforge/src/alphaforge/data/**
    - alphaforge/src/alphaforge/dataset/**
    - alphaforge/src/alphaforge/validation/**
    - alphaforge/src/alphaforge/gates/**
    - alphaforge/src/alphaforge/handoff/**
    - alphaforge/src/alphaforge/reports/**
    - alphaforge/src/alphaforge/modes/**
    - alphaforge/src/alphaforge/contracts/**
    - data/**
    - datasets/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    - lib/**
    - models/**
    - artifacts/**
    - .github/**
    - v7/src/**
    dependencies:
    - WS-03-LEAKAGE-TESTS
  artifactPolicy:
    class: generated_report
    wiringRequired: false
    reachabilityRequired: false
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-03-049
    description: CMD-final-validation exits 0 with all tests passing across lib, integration, simulation, and alphaforge
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: command_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - command
      - test_output
      commandRef: CMD-final-validation
    requiredEvidence:
    - command
    - test_output
  - id: AC-03-050
    description: 'CMD-discover-git-status shows only allowed files modified: alphaforge/src/alphaforge/features/**, alphaforge/tests/test_feature_pipeline.py,
      reports/accp/**, plans/alphaforge/03_feature_pipeline.plan.yaml'
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: command_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - diff
      - command
      commandRef: CMD-discover-git-status
    requiredEvidence:
    - command
    - diff
  - id: AC-03-051
    description: ACCP report exists at reports/accp/alphaforge_feature_pipeline.accp.yaml with accp_version 2.0.0 and all
      56 acceptance criteria results
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_exists
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - report
    requiredEvidence:
    - report
  - id: AC-03-052
    description: Forbidden pattern scan across all new files returns zero matches for xgboost, binance, curl, wget, api_key,
      profitability, live.trading, lead_lag implementation
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: manual_review
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - source
      - command
    requiredEvidence:
    - source
    - command
  - id: AC-03-053
    description: Canonical feature hash stored in ACCP report -- compute_features() with standard OHLCV fixture produces a
      stable reference hash for regression testing
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - test_output
      - report
    requiredEvidence:
    - test_output
    - report
  - id: AC-03-054
    description: 'Lead-Lag deferral documented in ACCP report: deferral reason (P0.9B cross-sectional data), re-enablement
      conditions, no partial implementation'
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_exists
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - report
    requiredEvidence:
    - report
  - id: AC-03-055
    description: All 6 active feature groups produce correct output -- verified by at least 2 independent test methods per
      group (unit + integration)
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - test_output
      - command
      commandRef: CMD-final-validation
    requiredEvidence:
    - test_output
    - command
  - id: AC-03-056
    description: Plan status promoted to 'completed' -- all waves, all workspaces, all 56 acceptance criteria satisfied with
      evidence
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_exists
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - report
    requiredEvidence:
    - report
commands:
  exactAllowedCommands:
  - id: CMD-discover-git-status
    kind: discovery
    command: git status --porcelain
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 30
    noTestsFoundIsFailure: false
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-alphaforge
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/ -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 180
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-integration-alphaforge
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_alphaforge_*.py -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-contract-registry-schema
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_contract_registry.py integration/tests/test_schema_parity.py
      -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-import-boundaries
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/test_import_boundary.py integration/tests/test_cross_domain_boundaries.py
      simulation/tests/test_import_boundary.py -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-simulation
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/ -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-final-validation
    kind: final_validation
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ alphaforge/tests/
      -q --ignore=lib/tests/test_market_data_binance.py
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 300
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
  - id: DCMD-no-curl
    command: curl
    pattern: ^curl\s
    reason: No external network or market data during deterministic feature pipeline implementation.
  - id: DCMD-no-wget
    command: wget
    pattern: ^wget\s
    reason: No external downloads.
  - id: DCMD-no-binance
    command: exchange/live pattern
    pattern: binance|exchange|api_key|live_order|create_order|market_order
    reason: No exchange or live trading behavior allowed.
  - id: DCMD-no-xgboost-training
    command: xgboost model training
    pattern: xgboost|XGBClassifier|XGBRegressor|fit\(|import xgboost
    reason: No model training in deterministic feature pipeline scope.
evidence:
  ledgerRequired: true
  requiredEvidenceTypes:
  - diff
  - source
  - wiring
  - command
  - test_output
  - schema_validation
  - report
  hashWhenAvailable: true
gates:
  sequence:
  - SchemaGate
  - LockGate
  - EvidenceGate
  - WiringGate
  - ExecGate
  - FinalGate
  verdicts:
  - PASS
  - HOLD
  - FAIL
  reasonCodes:
    SchemaGate:
    - PLAN_SCHEMA_INVALID
    - UNKNOWN_TOP_LEVEL_KEY
    - TASK_SCHEMA_INVALID
    LockGate:
    - PLAN_NOT_LOCKED
    - ACCEPTANCE_CRITERIA_HASH_MISSING
    - COMMAND_POLICY_HASH_MISSING
    EvidenceGate:
    - REQUIRED_EVIDENCE_MISSING
    - COMMAND_OUTPUT_MISSING
    - PHANTOM_EVIDENCE_DETECTED
    - PROFITABILITY_CLAIM_WITHOUT_EVIDENCE
    WiringGate:
    - ORPHAN_MODULE
    - EXPORT_SURFACE_MISSING
    - USAGE_PROOF_MISSING
    - FORBIDDEN_IMPORT_BOUNDARY
    ExecGate:
    - TEST_COMMAND_FAILED
    - NO_TESTS_FOUND
    - FORBIDDEN_COMMAND_USED
    - NETWORK_USED_WHEN_FORBIDDEN
    FinalGate:
    - FINAL_VALIDATION_FAILED
    - REMAINING_REQUIRED_CRITERIA
    - REPORT_MISSING
    - HOLD_REQUIRES_REPAIR_PACKET
repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3
  reverifyCommand: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/ integration/tests/test_alphaforge_*.py
    -q
  repairPacketFormat:
    json: true
    markdown: true
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/alphaforge/alphaforge-03-feature-pipeline.lock.json
  hashes:
  - planHash
  - acceptanceCriteriaHash
  - artifactPolicyHash
  - integrationContractHash
  - commandPolicyHash
  - allowedFilesHash
  - forbiddenFilesHash
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
