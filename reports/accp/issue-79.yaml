scope_confirmation: |
  Issue #79: Alpha thesis validation protocol implementation.
  Implemented ThesisValidator in alphaforge/src/alphaforge/validation/thesis_validator.py
  and 43 tests in alphaforge/tests/test_thesis_validator.py.

  The validator evaluates alpha theses against six evidence categories:
  - Walk-forward validation (WFV) evidence
  - Cost stress analysis
  - Regime breakdown
  - NO_TRADE comparison
  - Symbol stability
  - Overfit risk assessment

  Verdicts: SUPPORTED (evidence confirms hypothesis), REFUTED (evidence contradicts),
  INCONCLUSIVE (insufficient evidence).

  Applies rejection rules from alpha_thesis_lifecycle.md including:
  - NO_TRADE beats directional
  - Non-positive OOS expectancy
  - Cost stress flips edge negative
  - Single-symbol overfitting
  - Rare-regime overfitting
  - Feature leakage (purge violation)
  - Excessive drawdown
  - Critical overfit risk

