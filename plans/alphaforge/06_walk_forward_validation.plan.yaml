- id: WS-06-FIXTURE-RULES
  title: Define mode-specific fold configurations — window sizes, anchored vs rolling
  objective: Define mode-specific fold configurations — window sizes, anchored vs rolling
  implementation:
    instructions:
    - '[must] [action] Define mode-specific fold configuration constants: SCALP train_window ~5000 bars / test_window ~1000
      bars, AGGRESSIVE_SCALP ~5000/1000, SWING ~2000/500. These are configurable defaults, not hard-coded into fold logic.'
    - '[must] [action] SCALP and AGGRESSIVE_SCALP must use ROLLING windows (train window slides forward by test_window + purge
      each fold). SWING may use ANCHORED (train expands forward) or ROLLING — configurable.'
    - '[must] [action] Implement a DEFAULT_FOLD_CONFIGS dict mapping Mode -> WalkForwardConfig with sensible defaults. The
      config can be overridden per instantiation.'
    - '[must] [action] Implement window sizing logic: given a sorted dataset of N rows and a WalkForwardConfig, compute how
      many folds can be constructed. If < min_folds (6), raise ValidationError with message: ''Dataset of {N} rows ({total_bars}
      bars) cannot satisfy {min_folds}-fold minimum for mode {mode}. Minimum bars needed: {required_bars}.'''
    - '[must] [action] For rolling windows: train window advances by (test_window + purge_bars) each fold. For anchored windows:
      train_start is fixed, train_end expands to include all previous folds'' train data.'
    - '[must] [action] Window sizes are expressed in bars (number of distinct timestamps), not calendar time. Convert bar
      counts to row counts based on dataset density in the compute_folds method.'
    - '[must] [action] Implement a ValidationError exception class in contracts.py with fields: message, mode, required_folds,
      available_bars, required_bars, suggestion (human-readable fix guidance).'
    - '[must] [action] Do NOT implement model training. Do NOT import xgboost, sklearn, or any ML library.'
    allowedFiles:
    - alphaforge/src/alphaforge/validation/**
    forbiddenFiles:
    - alphaforge/tests/**
    - integration/tests/**
