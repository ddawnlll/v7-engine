* id: "TASK-08-ML-PILOT-GATE-DESIGN"
  title: "ML Pilot Gate Design"
  objective: >
  Define the conditions under which actual ML training may start. This task
  is design/test-gate only unless explicitly unlocked by human owner.
  implementation:
  instructions:
  - "Write an ML pilot readiness report."
  - "Do not train any model."
  - "List required preconditions: real data pipeline, label quality, validation skeleton, primary golden tests, cost/no-trade checks."
  - "Define model artifact safety rules."
  - "Define when XGBoost/ML training becomes allowed."
  allowedFiles:
  - "reports/p0_9d_ml_pilot_gate_design.accp.yaml"
  - "alphaforge/src/alphaforge/ml/**"
  - "integration/tests/test_alphaforge_ml_gate.py"
  forbiddenFiles:
  - "models/**"
  - "artifacts/**"
  - "data/**"
  - "datasets/**"
  suggestedSteps:
  - "Create only gate definitions if code is needed."
  - "Add tests that training is blocked by default."
  antiPatterns:
  - "Training a model prematurely."
  - "Saving model binaries."
  expectedOutputs:
  - "reports/p0_9d_ml_pilot_gate_design.accp.yaml"
  artifactPolicy:
  class: "generated_report"
  wiringRequired: false
  reachabilityRequired: false
  executionRequired: false
  deterministicEvidenceRequired: true
  acceptanceCriteria:

  * id: "AC-TASK08-ML-NOT-STARTED"
    description: "ML training remains blocked until explicit human unlock after pipeline evidence."
    level: "required"
    humanApproved: true
    criteriaSource: "human"
    verification:
    type: "no_diff_contains"
    patterns:
    - "fit("
    - "XGB"
    - "xgboost"
    - "sklearn"
    - "joblib.dump"
    - "pickle.dump"
    deterministic: true
    canSatisfyFinalGate: true
    advisoryOnly: false
    evidenceRefs:
    - "EV-DIFF-NO-ML"
    requiredEvidence:

    * "diff"

