      to model_artifact_id, calibration_gate_alignment.calibration_candidate_id maps to calibration_candidate_id, oos_summary.{oos_expectancy_r,
      oos_sharpe, oos_win_rate, oos_trade_count, oos_positive_expectancy, fold_stability_score} map to G2_walk_forward_oos
      evidence_ref, symbol_stability.{max_single_symbol_concentration, max_cluster_concentration, symbols_tested} map to G5_symbol_stability
      evidence_ref, cost_stress.{combined_stress_edge_survives, cost_edge_destroyed, scalp_cost_adjusted_expectancy_r, funding_deferred_block}
      map to G3_cost_stress evidence_ref, regime_breakdown.{regimes, edge_only_in_rare_regime} map to G4_regime_breakdown
      evidence_ref, calibration_gate_alignment.{ece, mce, reliability_within_bounds, calibration_status} map to G6_calibration_reliability
      evidence_ref, overfit_risk_flags.overfit_risk_overall maps to rejection rule evaluation, multiple_hypothesis_control.{correction_method,
      data_snooping_risk_flag, pbo_or_backtest_overfit_risk} maps to rejection rule evaluation, verdict maps to recommended_status
