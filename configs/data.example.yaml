# =============================================================================
# V7 Engine — Data Configuration (example)
# =============================================================================
# Copy to configs/data.yaml and customise.
#
#   cp configs/data.example.yaml configs/data.yaml
# =============================================================================

# ── Symbol universe (60 Binance USDT perpetual pairs) ─────────────
# Target: 60 symbols per v7 architecture ("up to 60 symbols").
# Progressive scaling plan:
#   v0.1: fixture data only (done)
#   v0.2: T1-T3 (20) — first real-data pipeline validation
#   v0.3: T4 (40) — expanded empirical tuning
#   v0.4: T5 (60) — full v7 target universe
#
# Binance USDT-M perpetuals launched 2019-09 (BTC first).
# Start dates aim for ~5 years of data where available.
# Per-symbol overrides set for coins with less history.
symbols:
  # ── Tier 1 — Majors (2), perpetual since 2019-09 ─────────────────
  - BTCUSDT
  - ETHUSDT
  # ── Tier 2 — Large Caps (8), perpetual 2020-2021 ─────────────────
  - BNBUSDT
  - SOLUSDT
  - XRPUSDT
  - ADAUSDT
  - DOGEUSDT
  - AVAXUSDT
  - DOTUSDT
  - LINKUSDT
  # ── Tier 3 — Mid Caps (10), perpetual 2021-2022 ──────────────────
  - MATICUSDT
  - UNIUSDT
  - ATOMUSDT
  - LTCUSDT
  - APTUSDT
  - ARBUSDT
  - OPUSDT
  - INJUSDT
  - RNDRUSDT
  - FILUSDT
  # ── Tier 4 — Liquid Alts (20), perpetual 2022-2024 ───────────────
  - TIAUSDT
  - SEIUSDT
  - SUIUSDT
  - WIFUSDT
  - PEPEUSDT
  - BONKUSDT
  - FETUSDT
  - WLDUSDT
  - STRKUSDT
  - JUPUSDT
  - PYTHUSDT
  - JTOUSDT
  - RUNEUSDT
  - AAVEUSDT
