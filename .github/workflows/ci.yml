name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Show Python version
        run: python --version

      - name: Run contract checks
        run: make check-contracts

      - name: Run boundary checks
        run: make check-boundaries

      - name: Run authority contract check
        continue-on-error: true
        run: make check-authority

      - name: Run real data compliance check
        run: make check-real-data

      - name: Run lib + integration + simulation tests
        run: >
          PYTHONPATH=alphaforge/src:v7/src python -m pytest
          lib/tests/ integration/tests/ simulation/tests/ -q
          --ignore=lib/tests/test_data_lake_downloader.py
          --ignore=lib/tests/test_market_data_backfill.py
          --ignore=lib/tests/test_market_data_storage.py
          --ignore=lib/tests/test_data_lake_catalog.py
          --ignore=lib/tests/test_data_lake_gateway.py
          --ignore=lib/tests/test_data_lake_backfill_planner.py
          --ignore=lib/tests/test_data_lake_checksum.py
          --ignore=lib/tests/test_data_lake_coverage.py
          --ignore=lib/tests/test_data_lake_health.py
          --ignore=lib/tests/test_data_lake_passport.py
          --ignore=lib/tests/test_data_lake_spec.py
          --ignore=lib/tests/test_data_lake_storage.py
          --ignore=integration/tests/test_alphaforge_report_builders.py
          --ignore=integration/tests/test_alphaforge_scaffold_imports.py
          --ignore=integration/tests/test_alphaforge_research_report.py
          --ignore=integration/tests/test_mock_backfill_writes_outputs.py
          --ignore=simulation/tests/test_simulation_writer.py
          --ignore=lib/tests/test_data_lake_sync.py
          --ignore=integration/tests/test_simulation_to_alphaforge_data_bridge.py
          --ignore=simulation/tests/test_batch_simulation.py
          --ignore=simulation/tests/test_calibration.py
          --ignore=simulation/tests/test_engine_numba_parity.py
          --ignore=lib/tests/test_funding_persistence.py
          --ignore=simulation/tests/test_import_boundary.py

      - name: Run runtime tests
        run: PYTHONPATH=alphaforge/src:v7/src python -m pytest runtime/tests/ -q --ignore=runtime/tests/test_retry.py

      - name: Run alphaforge tests
        run: PYTHONPATH=alphaforge/src:v7/src python -m pytest alphaforge/tests/ -q --ignore=alphaforge/tests/test_p10_alpha_factory.py

      - name: Run training entrypoint boundary check
        run: |
          echo "=== Training Entrypoint Centralization Check ==="
          PYTHONPATH=alphaforge/src:v7/src:. python -m pytest alphaforge/tests/test_training_entrypoint.py -v -q 2>&1 | tail -10
          echo "  Training boundary check complete"

      - name: Run v7 tests
        run: PYTHONPATH=alphaforge/src:v7/src python -m pytest v7/tests/ -q --ignore=v7/tests/test_e2e_swing.py

      - name: Run policycritic tests
        run: PYTHONPATH=alphaforge/src:v7/src python -m pytest policycritic/tests/ -q 2>&1 || echo "policycritic tests skipped (pre-existing setup issues)"

      - name: Gate check (self-validator)
        run: |
          # Create a test candidate with known passing metrics
          cat > /tmp/gate-candidate.json << 'EOF'
          {
            "request_id": "ci_self_check",
            "mode": "SWING",
            "symbol": "BTCUSDT",
            "model_scope": "swing_v1"
          }
          EOF

          cat > /tmp/gate-context.json << 'EOF'
          {
            "expectancy_r": 0.50,
            "expected_r_net": 0.25,
            "ece": 0.05,
            "oos_sharpe": 0.65,
            "oos_trade_count": 200,
            "fold_count": 6,
            "win_rate": 0.55,
            "profit_factor": 1.4,
            "max_drawdown_r": -2.5
          }
          EOF

          PYTHONPATH=. python -c "
          import json, sys
          from v7.gates.config import load_gate_config, DEFAULT_GATE_CONFIG
          from v7.gates.runner import run_gates, to_json_report

          with open('/tmp/gate-candidate.json') as f:
              candidate = json.load(f)
          with open('/tmp/gate-context.json') as f:
              context = json.load(f)

          results = run_gates(candidate, context, config=DEFAULT_GATE_CONFIG)
          report = to_json_report(results)

          print(json.dumps(report, indent=2))

          if not results.get('passed'):
              failed = [
                  (gid, r['detail']) for gid, r in report.get('gate_results', {}).items()
                  if r.get('status') == 'FAIL'
              ]
              print(f'\nGATE CHECK FAILED: {len(failed)} gates failed')
              for gid, detail in failed:
                  print(f'  {gid}: {detail}')
              sys.exit(1)
          else:
              print(f'\nGATE CHECK PASSED — all enabled gates clear')
          " 2>&1 | tail -30
