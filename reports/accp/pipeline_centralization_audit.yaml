accp_version: "2.0.0"
source_format: "ACCP-YAML"
task_id: "pipeline_centralization_audit_v1"
date: "2026-07-12"

result: AUDIT_COMPLETE

scope_confirmation:
  - "Audit only — no source code changed. Requested: full inventory of why configs/training.yaml + configs/profiles/*.yaml are not wired to any live training code path, and why dataset/feature construction is duplicated across the alphaforge tree."
  - "Goal stated by owner: single centralized channel for the whole v7 pipeline; no ad-hoc scripts; autonomous agents (local Claude Code, 'mimo agent', future Hermes/DeepSeek remote agent) must also go through the same channel."

per_criterion:
  1_training_config_readers:
    status: CONFIRMED_ORPHANED
    detail: "grep across all .py files for 'training.yaml', 'training_authorized', 'wfv_authorized' returns zero non-self-referential matches. configs/training.yaml is read by nothing."
  2_mode_config_divergence:
    status: CONFIRMED
    detail: "Canonical (simulation/profile_registry/registry.py, live, called by simulation engine): SCALP stop=1.75/target=1.75/primary=1h. alphaforge/src/alphaforge/train.py MODE_CONFIG: stop=1.5/target=2.0. cli/real_training.py MODE_CONFIG: stop=1.5/target=2.0. Both training scripts hand-copy a value distinct from the live canonical registry instead of importing simulation.profile_registry.registry.get_profile('SCALP')."
  3_makefile_research_full_hollow:
    status: CONFIRMED — NEW FINDING
    detail: "make research / make full are documented as 'Config-driven build targets — read scope from configs/training.yaml' (Makefile:~260). They chain download -> simulate -> build-dataset -> train, all four routed through cli/v7_engine.py legacy CLI. cmd_simulate and cmd_build_dataset literally print 'Not yet implemented' and return 0. cmd_train is a gated no-op that prints a pointer to pipeline-v0.2 and returns 0 even with --force. The one Makefile target explicitly branded as the config-driven centralized entrypoint executes nothing and reports success (exit 0) while doing so."
  4_live_training_path:
    status: CONFIRMED
    detail: "alphaforge/src/alphaforge/train.py is the only path with real evidence behind it (alpha_truth_upgrade.yaml, Operation SCALP 0.05 / MORNING_REPORT.md, mimo-agent commit history 2026-07-07..07-10). It is invoked directly via `python -m alphaforge.train`, bypassing Makefile, cli/v7_engine.py, and configs/training.yaml entirely."
  5_dataset_feature_duplication:
    status: CONFIRMED — 5 independent implementations found (was 3 in prior audit)
    detail: |
      A. alphaforge/features/pipeline.py (compute_features/cached_compute_features, 67 features, 10 groups) — LIVE, imported by train.py.
      B. alphaforge/features/engine.py (compute_all_features) — used only by train_pipeline.py and its own test (test_feature_engine.py). Dead in production.
      C. alphaforge/mine/candidate_dataset.py (CandidateOutcomeBuilder._compute_pre_entry_features) — hand-rolled ~10-feature reimplementation (SMA50/ATR14/slope/momentum/volume-zscore), used only by alphaforge/mine/cli.py and its own tests. Isolated "mining" subsystem, not wired to train.py.
      D. alphaforge/datasets/candidate_outcomes.py (CandidateOutcomeDatasetBuilder v002, _compute_features) — near-identical copy of C's formulas. Used ONLY by its own test (test_p10_alpha_factory.py). 100% dead in production.
      E. scripts/run_mining.py::build_candidate_dataset — a fifth, independent "pure-numpy, no lib.indicators dependency" feature reimplementation (explicit in its own docstring).
  6_train_pipeline_root_script_dead:
    status: CONFIRMED — NEW FINDING
    detail: "train_pipeline.py (repo root) implements the full contract-specified orchestration (simulation -> labels -> features -> dataset -> model -> calibration -> evaluation) via alphaforge.dataset.builder, alphaforge.labels.builder, alphaforge.features.engine, alphaforge.model.trainer.ModelTrainer, alphaforge.calibration.engine.Calibrator. It is imported ONLY by alphaforge/tests/test_pipeline.py. No Makefile target, no CLI command, no agent prompt references it. It is the 'correct' architecture on paper and is entirely unused."
  7_gates_yaml_as_positive_counterexample:
    status: CONFIRMED
    detail: "configs/gates.yaml IS genuinely live: v7/gates/config.py (frozen GateConfig dataclass + DEFAULT_GATE_CONFIG + load_gate_config() YAML loader) is imported by v7/handoff.py and v7/promotion.py — real production modules, not just tests. This is a working reference pattern the training/dataset config system does not follow."
  8_agent_bypass_surface:
    status: CONFIRMED
    detail: "colab/colab_runner.py (untracked, 2026-07-10) shells out to `python -m alphaforge.train --synthetic` directly, bypassing Makefile/CLI/gates entirely. scripts/vast-hermes-bootstrap.sh (untracked, 2026-07-10) provisions an independent remote agent (Hermes / opencode-go / deepseek-v4-flash) with its own GitHub token and no reference to CLAUDE.md, .agent/ context layer, or configs/. .github/workflows/ci.yml has zero references to train/colab/vast — none of these paths are checked in CI."

files_changed: []

decisions_locked: []

remaining_holds:
  - issue: "Single training config loader not implemented"
    status: HOLD
    release: "Requires new lib-layer loader (e.g. lib/config/training_profile.py) that wraps simulation.profile_registry.registry.get_profile(mode) + configs/training.yaml scope fields into one frozen dataclass, consumed by exactly one training entrypoint."
  - issue: "Single training entrypoint not implemented"
    status: HOLD
    release: "cli/v7_engine.py legacy train/simulate/build-dataset/wfv commands must be wired to the same path as alphaforge/src/alphaforge/train.py (currently the only live path), or hard-fail instead of silently returning 0."
  - issue: "make research / make full are non-functional despite being documented as the config-driven entrypoint"
    status: HOLD
    release: "Requires the single entrypoint (above) to replace the simulate/build-dataset/train no-op chain."
  - issue: "5 duplicate feature/dataset implementations (B-E above) not consolidated onto alphaforge/features/pipeline.py + alphaforge/dataset/assembler.py"
    status: HOLD
    release: "Requires explicit deprecation/removal decision per module — owner review needed before deletion since some (mine/, run_mining.py) may still be intentionally used for ad-hoc mining outside the training loop."
  - issue: "No CI-level enforcement preventing new bypass scripts (colab/, vast-hermes, future agent-authored scripts)"
    status: HOLD
    release: "Requires an import-boundary-style static check (same pattern as lib/tests/test_import_boundary.py) added to CI that fails any file outside the blessed entrypoint module that imports xgboost / calls model .fit() / writes to data/models/."
  - issue: ".agent/ shared instruction layer incomplete (project_context.md referenced but missing; DECISIONS.md/FINDINGS_LEDGER.md live under docs/ not .agent/ as documented)"
    status: HOLD
    release: "A remote agent (Hermes/mimo) reading only .agent/ per the documented reading order will not discover the single-entrypoint rule once it exists, unless .agent/ is repaired to match its own documented structure."

evidence:
  config_orphan_grep: "grep -rn training_authorized|wfv_authorized --include=*.py . -> 0 matches outside configs/training.yaml itself"
  mode_config_divergence: "simulation/profile_registry/registry.py:159-162 (SCALP stop=1.75/target=1.75) vs alphaforge/src/alphaforge/train.py:~60 (1.5/2.0) vs cli/real_training.py:34-37 (1.5/2.0)"
  makefile_hollow_chain: "Makefile research/full targets -> cli/v7_engine.py cmd_simulate/cmd_build_dataset (print 'Not yet implemented', return 0), cmd_train (gated no-op, return 0 even with --force)"
  dead_scaffold: "grep -rln run_pipeline|train_pipeline --include=*.py . -> train_pipeline.run_pipeline only referenced by alphaforge/tests/test_pipeline.py"
  dead_dataset_v002: "grep -rn CandidateOutcomeDatasetBuilder --include=*.py . -> only alphaforge/tests/test_p10_alpha_factory.py"
  gates_live_counterexample: "grep -rln 'from v7.gates' --include=*.py . -> v7/handoff.py, v7/promotion.py (production), plus tests"
  ci_blind_spot: "grep -n 'train|colab|vast' .github/workflows/ci.yml -> 0 matches"
