  - id: AC-06-REPORT-09
    description: ACCP report written to reports/accp/walk_forward_validation.accp.yaml with all required keys present (result,
      scope_confirmation, files_changed, decisions_locked, remaining_holds, safe_next_step, commands_run, evidence)
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_exists
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
