      a FAILURE (noTestsFoundIsFailure: true). Zero failures, zero errors required.

      '
    - '[must] [test] Run CMD-test-integration-alphaforge to confirm all AlphaForge integration tests pass with exit code 0.
      Expected: fixture_validation, contract_semantics, scaffold_imports, contract_loader, report_builders, handoff_builder,
      schema_strictness from P0.8E and P0.9A/B. Zero failures, zero errors required.

      '
    - '[must] [test] Run CMD-test-contract-registry-schema to confirm contract registry integrity and schema parity across
      all domains. Expected: registry validation and all schema parity checks pass.

      '
    - '[must] [test] Run CMD-test-import-boundaries to confirm no cross-domain import violations. Expected: lib boundary,
      cross-domain boundary, and simulation boundary tests all pass. Pre-existing skips acceptable provided no failures or
      errors.

      '
    - '[must] [test] Run CMD-test-simulation to confirm simulation truth stable. Expected: all simulation MVP tests pass (cost
      model, exits, profiles). Zero failures, zero errors.

      '
    - '[must] [test] Run CMD-final-validation for comprehensive full-suite coverage. Expected: all lib + integration + simulation
