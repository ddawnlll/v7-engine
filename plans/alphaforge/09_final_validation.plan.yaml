commands:
  exactAllowedCommands:
  - id: CMD-discover-git-status
    kind: discovery
    command: git status --porcelain
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 30
    noTestsFoundIsFailure: false
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-alphaforge
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/ -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-integration-alphaforge
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_alphaforge_*.py -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-contract-registry-schema
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest integration/tests/test_contract_registry.py integration/tests/test_schema_parity.py
      -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-import-boundaries
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/test_import_boundary.py integration/tests/test_cross_domain_boundaries.py
      simulation/tests/test_import_boundary.py -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-test-simulation
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest simulation/tests/ -q
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-final-validation
    kind: final_validation
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ alphaforge/tests/
      -q --ignore=lib/tests/test_market_data_binance.py
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 300
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-scan-forbidden-diff
    kind: discovery
    command: 'bash -c ''changes=$( (git diff --name-only HEAD 2>/dev/null; git diff --cached --name-only 2>/dev/null) | sort
      -u); echo "$changes" | grep -E "^(lib/|simulation/engine/|runtime/|interface/|data/|datasets/|models/|artifacts/|\.github/)"
      || echo "CLEAN:FORBIDDEN_DIFF"''

      '
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 30
    noTestsFoundIsFailure: false
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-scan-profit-claims
    kind: discovery
    command: 'bash -c ''grep -rIn --include="*.py" --include="*.yaml" --include="*.yml" --include="*.md" --include="*.json"
      -E "(profitable|profit|expectancy\s*[>]|sharpe\s*[>]\s*1|win.rate|positive.edge)" alphaforge/ v7/ simulation/ runtime/
      lib/ integration/ contracts/ 2>/dev/null || echo "CLEAN:PROFIT_SCAN"''

      '
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 60
    noTestsFoundIsFailure: false
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-scan-training
    kind: discovery
    command: 'bash -c ''grep -rIn --include="*.py" --include="*.yaml" --include="*.yml" --include="*.md" -E "(xgboost|XGBClassifier|XGBRegressor|\.fit\(|\.train\(|from
      xgboost|import xgboost)" alphaforge/ v7/ simulation/ runtime/ lib/ integration/ contracts/ 2>/dev/null || echo "CLEAN:TRAINING_SCAN"''

      '
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 60
    noTestsFoundIsFailure: false
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-list-model-artifacts
    kind: discovery
    command: 'bash -c ''artifacts=$(find models/ artifacts/ -type f 2>/dev/null); if [ -z "$artifacts" ]; then echo "CLEAN:NO_MODEL_ARTIFACTS";
      else echo "$artifacts"; fi''

      '
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 30
    noTestsFoundIsFailure: false
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
  - id: DCMD-no-curl
    command: curl
    pattern: ^curl\s
    reason: No external network or market data during validation.
  - id: DCMD-no-wget
    command: wget
    pattern: ^wget\s
    reason: No external downloads.
  - id: DCMD-no-binance
    command: exchange/live pattern
    pattern: binance|exchange|api_key|live_order|create_order|market_order
    reason: No exchange or live trading behavior allowed.
  - id: DCMD-no-xgboost-training
    command: xgboost model training
    pattern: xgboost|XGBClassifier|XGBRegressor|fit\(|import xgboost
    reason: No model training in validation plan.
evidence:
  ledgerRequired: true
  requiredEvidenceTypes:
  - command
  - test_output
  - diff
  - source
  - report
  hashWhenAvailable: true
gates:
  sequence:
  - SchemaGate
  - LockGate
  - EvidenceGate
  - WiringGate
  - ExecGate
  - FinalGate
  verdicts:
  - PASS
  - HOLD
  - FAIL
  reasonCodes:
    SchemaGate:
    - PLAN_SCHEMA_INVALID
    - UNKNOWN_TOP_LEVEL_KEY
    - TASK_SCHEMA_INVALID
    LockGate:
    - PLAN_NOT_LOCKED
    - ACCEPTANCE_CRITERIA_HASH_MISSING
    - COMMAND_POLICY_HASH_MISSING
    EvidenceGate:
    - REQUIRED_EVIDENCE_MISSING
    - COMMAND_OUTPUT_MISSING
    - PHANTOM_EVIDENCE_DETECTED
    - PROFITABILITY_CLAIM_WITHOUT_EVIDENCE
    WiringGate:
    - ORPHAN_MODULE
    - EXPORT_SURFACE_MISSING
    - USAGE_PROOF_MISSING
    - FORBIDDEN_IMPORT_BOUNDARY
    ExecGate:
    - TEST_COMMAND_FAILED
    - NO_TESTS_FOUND
    - FORBIDDEN_COMMAND_USED
    - NETWORK_USED_WHEN_FORBIDDEN
    FinalGate:
    - FINAL_VALIDATION_FAILED
    - REMAINING_REQUIRED_CRITERIA
    - REPORT_MISSING
    - HOLD_REQUIRES_REPAIR_PACKET
repair:
  enabled: false
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 0
  reverifyCommand: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/ integration/tests/test_alphaforge_*.py
    -q
  repairPacketFormat:
    json: true
    markdown: true
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/alphaforge/alphaforge-09-final-validation.lock.json
  hashes:
  - planHash
  - acceptanceCriteriaHash
  - artifactPolicyHash
  - integrationContractHash
  - commandPolicyHash
  - allowedFilesHash
  - forbiddenFilesHash
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: false
