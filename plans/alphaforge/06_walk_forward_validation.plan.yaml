      - command
    requiredEvidence:
    - source
    - command
  - id: AC-06-REPORT-05
    description: All metric fields use NOT_EVALUATED sentinel — zero synthetic/fake numeric values in any metric field
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_contains
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - source
      - command
    requiredEvidence:
    - source
    - command
  - id: AC-06-REPORT-06
    description: No shuffle, random, permutation, or seed code in walk_forward.py
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_contains
      deterministic: true
