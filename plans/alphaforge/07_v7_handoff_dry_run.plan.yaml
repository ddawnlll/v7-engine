metadata:
  planId: ALPHAFORGE-07
  title: '07 — V7 Handoff Dry Run: Input Contract, Gate Mapping, Dry Run Builder, Promotion Guard, Schema Tests, ACCP Report'
  description: 'Implements alphaforge/src/alphaforge/handoff/dry_run.py — the AlphaForge V7 handoff dry run module that consumes
    ModeResearchReport and ValidationReport skeletons, assembles a V7HandoffPackage via the P0.9A handoff builder, applies
