    - '[must] [action] Test analyze_no_trade_quality with fixture where NO_TRADE dominates (60 NO_TRADE out of 100). Verify
      dominates_directional=True. Test with fixture where directional dominates (20 NO_TRADE out of 100). Verify dominates_directional=False.'
    - '[must] [action] Test cost_impact_summary with fixture labels carrying gross_r and net_r fields. Verify cost_drag =
      gross_r_mean - net_r_mean exactly. Test with gross_r_mean=0 (edge case) — verify cost_drag_pct=0.0 and no division-by-zero.'
    - '[must] [action] Test mht_hold_summary with default NONE_APPLIED — verify hold_active=True, requires_model_training=True,
      corrected_significance is None. Test that hold_reason string contains ''model training''.'
