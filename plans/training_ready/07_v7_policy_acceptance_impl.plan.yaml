planSpecVersion: "0.1.0"
kind: ImplementationPlan
profile: praxis-v0.1
metadata:
  planId: TR-07-V7-POLICY-ACCEPTANCE-IMPL
  title: "Plan 07 — V7 Policy Acceptance Implementation"
  description: >
    Implement V7 source code for policy acceptance. Canonical G0-G10 gate
    evaluator. AlphaForge handoff consumer. Promotion/rejection package
    validation. Threshold status with explicit HOLD behavior for
    SCALP/AGGRESSIVE_SCALP. No live promotion. Domain: v7.
  createdAt: "2026-06-25T00:00:00Z"
  humanId: TrainingReady
  status: draft
authority:
  executor: ClaudeCode
  completionAuthority: PraxisTruthKernel
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: imported_human
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false
workspace:
  root: .
  allowedFiles:
    - v7/src/v7/__init__.py
    - v7/src/v7/policy/__init__.py
    - v7/src/v7/policy/gates.py
    - v7/src/v7/policy/acceptance.py
    - v7/src/v7/policy/thresholds.py
    - v7/src/v7/policy/promotion.py
    - v7/tests/test_policy_gates.py
    - v7/tests/test_acceptance.py
    - v7/tests/test_promotion.py
    - integration/tests/test_v7_accepts_alphaforge_handoff.py
  forbiddenFiles:
    - lib/market_data/binance/**
    - simulation/engine/**
    - alphaforge/src/alphaforge/training/**
    - runtime/**
    - plans/**
execution:
  mode: single_session
  agent: claude-code
  autonomy: implementation_allowed
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 3
tasks:
  - id: WS-TR07-01
    title: Prerequisite Gate
    objective: "Verify TR-05 and TR-06 PASS. V7 evaluates evidence — needs evidence first."
    implementation:
      instructions:
        - "[must] Read TR-05 and TR-06 ACCP reports. Confirm PASS."
        - "[must] If either FAIL/HOLD, STOP with HOLD. V7 is gated."
    artifactPolicy:
      class: documentation
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: false
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR07-01
        description: "TR-05 and TR-06 passed before V7 implementation"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: manual_review, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [report]}
        requiredEvidence: [report]
  - id: WS-TR07-02
    title: Implement Canonical G0-G10 Gate Evaluator
    objective: "Create gates.py with exactly G0 DOC_READY through G10 LIVE canonical gates. Reject non-canonical gates."
    implementation:
      instructions:
        - "[must] Create v7/src/v7/__init__.py with version and authority marker."
        - "[must] Create v7/src/v7/policy/__init__.py."
        - "[must] Create v7/src/v7/policy/gates.py: canonical G0-G10 evaluator."
        - "[must] EXACT gate list: G0_DOC_READY, G1_RESEARCH_BACKTEST, G2_WALK_FORWARD_OOS, G3_COST_STRESS, G4_REGIME_BREAKDOWN, G5_SYMBOL_STABILITY, G6_CALIBRATION_RELIABILITY, G7_SHADOW, G8_PAPER, G9_TINY_LIVE, G10_LIVE."
        - "[must] Reject any old/wrong/non-canonical gate with explicit error."
        - "[must] Each gate defines required_evidence_fields and verdict function."
        - "[must] Tests in v7/tests/test_policy_gates.py verify canonical list and rejection."
      allowedFiles:
        - v7/src/v7/__init__.py
        - v7/src/v7/policy/__init__.py
        - v7/src/v7/policy/gates.py
    artifactPolicy:
      class: runtime_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    integrationContract:
      mode: consumer_or_export
      reason: "V7 consumes AlphaForge handoff. Consumed by runtime."
      exportSurfaces:
        - id: EXP-TR07-gates
          path: v7/src/v7/policy/gates.py
          requiredExports: [CANONICAL_GATES, evaluate_gate, GateVerdict]
    acceptanceCriteria:
      - id: AC-TR07-02
        description: "V7 policy modules exist and importable"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: file_exists, path: v7/src/v7/policy/gates.py, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [source]}
        requiredEvidence: [source]
      - id: AC-TR07-03
        description: "Exactly G0 DOC_READY through G10 LIVE gates defined — no extra, no missing"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: file_contains, path: v7/src/v7/policy/gates.py, patterns: ["G0_DOC_READY", "G1_RESEARCH_BACKTEST", "G2_WALK_FORWARD_OOS", "G3_COST_STRESS", "G4_REGIME_BREAKDOWN", "G5_SYMBOL_STABILITY", "G6_CALIBRATION_RELIABILITY", "G7_SHADOW", "G8_PAPER", "G9_TINY_LIVE", "G10_LIVE"], deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [source]}
        requiredEvidence: [source]
      - id: AC-TR07-04
        description: "Non-canonical gate IDs rejected with explicit error"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-gates}
        requiredEvidence: [command, test_output]
  - id: WS-TR07-03
    title: Implement Acceptance + Thresholds + Promotion
    objective: "acceptance.py reads handoff, evaluates thresholds. thresholds.py defines mode-specific thresholds. promotion.py produces PASS/HOLD/FAIL policy decisions."
    implementation:
      instructions:
        - "[must] Create v7/src/v7/policy/acceptance.py: reads AlphaForge handoff, evaluates against thresholds."
        - "[must] Create v7/src/v7/policy/thresholds.py: mode-specific threshold definitions."
        - "[must] Create v7/src/v7/policy/promotion.py: promotion decision engine."
        - "[must] SCALP and AGGRESSIVE_SCALP thresholds preserved as HOLD until empirical evidence."
        - "[must] SWING thresholds LOCKED_INITIAL_BASELINE."
        - "[must] No live promotion to G9_TINY_LIVE or G10_LIVE without all prior gates PASS."
        - "[must] PolicyDecision object with gate_name, verdict, reason_codes, evidence_refs."
        - "[must] Tests in v7/tests/test_acceptance.py with fixture handoff packages."
        - "[must] Tests in v7/tests/test_promotion.py verify HOLD/FAIL/PASS logic."
        - "[must] No profitability claims. No live trading."
      allowedFiles:
        - v7/src/v7/policy/acceptance.py
        - v7/src/v7/policy/thresholds.py
        - v7/src/v7/policy/promotion.py
    artifactPolicy:
      class: runtime_code
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    integrationContract:
      mode: consumer_or_export
      reason: "V7 consumes AlphaForge handoff. Consumed by runtime."
      exportSurfaces:
        - id: EXP-TR07-acceptance
          path: v7/src/v7/policy/acceptance.py
          requiredExports: [evaluate_handoff, PolicyDecision]
    acceptanceCriteria:
      - id: AC-TR07-05
        description: "Acceptance engine produces structured PolicyDecision with PASS/HOLD/FAIL and reason codes"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-acceptance}
        requiredEvidence: [command, test_output]
      - id: AC-TR07-06
        description: "SCALP and AGGRESSIVE_SCALP modes return HOLD without empirical WFV evidence"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-promotion}
        requiredEvidence: [command, test_output]
      - id: AC-TR07-07
        description: "SWING mode LOCKED_INITIAL_BASELINE thresholds applied correctly"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-acceptance}
        requiredEvidence: [command, test_output]
      - id: AC-TR07-08
        description: "G9_TINY_LIVE and G10_LIVE blocked without all prior gates PASS"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: false, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-promotion}
        requiredEvidence: [command, test_output]
  - id: WS-TR07-04
    title: Integration Test — V7 Accepts AlphaForge Handoff
    objective: "Integration test: AlphaForge handoff fixture → V7 acceptance → valid PolicyDecision with gate-level detail."
    implementation:
      instructions:
        - "[must] Create integration/tests/test_v7_accepts_alphaforge_handoff.py."
        - "[must] Load fixture handoff package. Run through full V7 acceptance pipeline."
        - "[must] Verify PolicyDecision has gate_name, verdict (PASS/HOLD/FAIL), reason_codes, evidence_refs."
        - "[must] Verify gate-level detail for each of G0-G10."
        - "[must] No live promotion in integration test."
        - "[must] No real data, no network."
      allowedFiles: [integration/tests/test_v7_accepts_alphaforge_handoff.py]
    artifactPolicy:
      class: test_only
      wiringRequired: true
      reachabilityRequired: true
      executionRequired: true
      deterministicEvidenceRequired: true
    acceptanceCriteria:
      - id: AC-TR07-09
        description: "Integration test: handoff → full V7 pipeline → valid PolicyDecision"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-integration}
        requiredEvidence: [command, test_output]
      - id: AC-TR07-10
        description: "Integration test verifies all G0-G10 gate results present"
        level: required
        humanApproved: true
        criteriaSource: imported_human
        verification: {type: test_output, deterministic: true, canSatisfyFinalGate: true, advisoryOnly: false, evidenceRefs: [command, test_output], commandRef: CMD-test-integration}
        requiredEvidence: [command, test_output]
commands:
  exactAllowedCommands:
    - id: CMD-test-gates
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:v7/src:. python3 -m pytest v7/tests/test_policy_gates.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-acceptance
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:v7/src:. python3 -m pytest v7/tests/test_acceptance.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-promotion
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:v7/src:. python3 -m pytest v7/tests/test_promotion.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
    - id: CMD-test-integration
      kind: targeted_test
      command: "PYTHONPATH=alphaforge/src:v7/src:. python3 -m pytest integration/tests/test_v7_accepts_alphaforge_handoff.py -q"
      cwd: .
      evidenceRequired: true
      timeoutSeconds: 120
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: curl
      pattern: "^curl\\s"
      reason: "No network."
    - command: profitability
      pattern: "profitable|edge confirmed|live_ready|guaranteed"
      reason: "V7 evaluates evidence, does not claim profitability."
    - command: live trading
      pattern: "create_order|market_order|live_order|execution"
      reason: "V7 does policy acceptance, not execution."
    - command: cross-domain write
      pattern: "Write.*alphaforge/|Write.*simulation/"
      reason: "Domain boundary — V7 consumes handoff, does not modify alphaforge or simulation."
evidence:
  ledgerRequired: true
  requiredEvidenceTypes: [diff, source, command, test_output, report]
  hashWhenAvailable: true
gates:
  sequence: [SchemaGate, LockGate, EvidenceGate, WiringGate, ExecGate, FinalGate]
  verdicts: [PASS, HOLD, FAIL]
  reasonCodes:
    SchemaGate: [PLAN_SCHEMA_INVALID]
    LockGate: [PLAN_NOT_LOCKED]
    EvidenceGate: [REQUIRED_EVIDENCE_MISSING, PREREQUISITE_FAILED]
    WiringGate: [ORPHAN_MODULE, FORBIDDEN_IMPORT_BOUNDARY]
    ExecGate: [TEST_COMMAND_FAILED]
    FinalGate: [FINAL_VALIDATION_FAILED, LIVE_PROMOTION_BLOCKED, SCALP_HOLD_UNTIL_EVIDENCE]
repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3
  reverifyCommand: "PYTHONPATH=alphaforge/src:v7/src:. python3 -m pytest v7/tests/ integration/tests/test_v7_accepts_alphaforge_handoff.py -q"
  repairPacketFormat: {json: true, markdown: true}
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/training_ready/07_v7_policy_acceptance_impl.lock.json
  hashes: [planHash, acceptanceCriteriaHash, artifactPolicyHash, commandPolicyHash, allowedFilesHash, forbiddenFilesHash]
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
