policy_authority:
  summary: >
    Policy is the explicit layer between model output and runtime execution. It combines
    calibrated action probabilities, expected R, adverse pressure, cost-adjusted expectancy,
    no-trade quality, and regime context into a single normalized decision. Policy is
    mode-specific: each mode has its own thresholds, regime modifiers, and timing extensions.
    Policy does NOT own execution eligibility — that belongs to runtime operational gates.

  policy_gates:
    - gate: "probability/confidence gate"
      applies_to:
        - "SWING"
        - "SCALP"
        - "AGGRESSIVE_SCALP"
    - gate: "no-trade comparison gate"
      applies_to:
        - "ALL_MODES"
    - gate: "decision margin gate"
      applies_to:
        - "ALL_MODES"
    - gate: "expected-R gate"
      applies_to:
        - "ALL_MODES"
    - gate: "cost-adjusted expectancy gate"
      applies_to:
        - "SCALP (REQUIRED)"
        - "SWING"
        - "AGGRESSIVE_SCALP"
    - gate: "adverse-pressure/drawdown gate"
      applies_to:
        - "ALL_MODES"
    - gate: "regime consistency gate"
      applies_to:
        - "ALL_MODES"
    - gate: "degradation/fallback gate"
      applies_to:
        - "ALL_MODES"
    - gate: "timing extension (advisory-first)"
      applies_to:
        - "ALL_MODES"

  evidence_refs:
    - "EVIDENCE-005"
    - "EVIDENCE-008"

