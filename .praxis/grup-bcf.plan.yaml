  agent: "claude-code"
  autonomy: "implementation_allowed"
  canModifyCode: true
  canModifyPlan: true
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 3

tasks:
  - id: "task-211"
    title: "Central simulation bridge (#211)"
    objective: "Create central_sim_bridge.py + scripts/factor_central_sim.py"
    artifactPolicy:
      class: "runtime_code"
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: false
      deterministicEvidenceRequired: true
      advisoryReviewAllowed: true
    acceptanceCriteria:
      - id: "AC-211-IMPORT"
        description: "central_sim_bridge.py imports without error"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "command_output"
          command: "python -c 'from alphaforge.simulation.central_sim_bridge import signal_event_to_sim_input, run_batch_simulation'"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["command"]
        requiredEvidence: ["command"]
      - id: "AC-211-CLI"
        description: "scripts/factor_central_sim.py CLI --help works"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "command_output"
          command: "python scripts/factor_central_sim.py --help"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs: ["command"]
        requiredEvidence: ["command"]

