validationEvidenceRules:
finalPromotionRequiresExactAllowedCommand: true
discoveryCommandsMayNotSatisfyFinalValidation: true
runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
hardDeniedCommands:
- id: "DCMD-NO-LIVE-API"
kind: "runtime_probe"
command: "any command calling Binance/live/external market APIs"
pattern: "binance|ccxt|requests.get|httpx|websocket|api_key|secret"
reason: "External market/API calls are forbidden in this plan."
- id: "DCMD-NO-MODEL-TRAINING"
kind: "runtime_probe"
command: "any command performing ML training"
pattern: "xgboost|XGB|sklearn|fit\(|joblib.dump|pickle.dump"
reason: "ML training is blocked until explicit ML pilot unlock."
- id: "DCMD-NO-WATCH"
kind: "targeted_test"
command: "pytest watch mode or long-running watcher"
pattern: "watch|--looponfail"
reason: "Validation must be deterministic and terminating."
- id: "DCMD-NO-NETWORK-INSTALL"
kind: "build"
command: "pip install or network dependency install"
pattern: "pip install|poetry add|uv add|npm install"
reason: "Dependency changes require separate approval."

evidence:
ledgerRequired: true
requiredEvidenceTypes:
- "diff"
- "source"
- "wiring"
- "command"
- "test_output"
- "schema_validation"
- "report"
hashWhenAvailable: true

gates:
sequence:
- "SchemaGate"
- "LockGate"
- "EvidenceGate"
- "WiringGate"
- "ExecGate"
- "FinalGate"
verdicts:
- "PASS"
- "HOLD"
- "FAIL"
reasonCodes:
SchemaGate:
- "PLAN_SCHEMA_VALID"
- "TASKS_HAVE_ACCEPTANCE_CRITERIA"
- "COMMAND_REFS_RESOLVE"
LockGate:
- "ALLOWED_FILES_RESPECTED"
- "FORBIDDEN_FILES_UNCHANGED"
- "PLAN_NOT_MODIFIED_BY_AGENT"
EvidenceGate:
- "EVIDENCE_LEDGER_PRESENT"
- "COMMAND_OUTPUT_ATTACHED"
- "DIFF_ATTACHED"
WiringGate:
- "NO_ORPHAN_RUNTIME_MODULES"
- "EXPORT_SURFACES_PRESENT"
- "RUNNER_DISCOVERY_PROVEN"
ExecGate:
- "EXACT_ALLOWED_COMMANDS_PASS"
- "NO_DENIED_COMMANDS_USED"
FinalGate:
- "ALL_REQUIRED_ACCEPTANCE_CRITERIA_PASS"
- "REPORTS_ARE_EVIDENCE_ONLY"
- "NO_FALSE_COMPLETION"

repair:
enabled: true
failedCriteriaOnly: true
mayModifyAcceptanceCriteria: false
mayModifyPlan: false
allowedFilesFromFailedTasksOnly: true
maxRepairLoops: 4
reverifyCommand: "PYTHONPATH=alphaforge/src:. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ alphaforge/tests/ -q --ignore=lib/tests/test_market_data_binance.py"
repairPacketFormat:
json: true
markdown: true

locking:
lockRequired: true
canonicalHashRequired: true
planLockFile: "plans/alphaforge_implementation_master_plan.lock.json"
hashes:
- "planHash"
- "acceptanceCriteriaHash"
- "artifactPolicyHash"
- "integrationContractHash"
- "commandPolicyHash"
- "allowedFilesHash"
- "forbiddenFilesHash"

reports:
protocol: "ACCP"
artifactDirectory: "reports/alphaforge"
reportsAreEvidenceOnly: true
reportsDoNotAuthorizeExecution: true
commandEvidenceRequired: true
repairPacketRequiredOnHoldOrFail: true
