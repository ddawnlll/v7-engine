- id: WS-01-IMPLEMENT
  title: Implement DataManifest Dataclass and Builder Functions
  objective: Implement DataManifest Dataclass and Builder Functions
  implementation:
    instructions:
    - '[must] [implementation] Create alphaforge/src/alphaforge/data/__init__.py. Export DataManifest, build_manifest, validate_manifest,
      ManifestValidationError, and MANIFEST_VERSION. Follow existing alphaforge __init__.py conventions (docstring with authority
      boundary, __version__, __authority__).

      '
    - '[must] [implementation] Create alphaforge/src/alphaforge/data/manifest.py. Implement: (a) DataManifest dataclass with
      frozen=True and all fields from design, (b) MANIFEST_VERSION = "1.0.0", (c) ManifestValidationError extending alphaforge.errors.AlphaForgeError,
      (d) build_manifest(fixture_paths: list[Path]) -> DataManifest reading simulation output fixtures and computing per-fixture
      checksums, (e) validate_manifest(manifest: DataManifest) -> None raising ManifestValidationError on invalid fields,
      (f) _compute_checksum(data: dict) -> str using hashlib.sha256 on canonical JSON, (g) _canonical_json(data: dict) ->
      bytes producing deterministic serialized form.

      '
    - '[must] [implementation] _canonical_json() must use: json.dumps(data, sort_keys=True, indent=2, ensure_ascii=False).encode(''utf-8'')
      with trailing newline. No random elements, no timestamps, no process IDs. This is the foundation of checksum stability.

      '
    - '[must] [implementation] build_manifest() must: (a) accept list of Path objects pointing to fixture JSON files, (b)
      load each fixture via json.load, (c) compute per-fixture sha256 checksum, (d) extract mode/symbol/interval from each
      fixture, (e) generate deterministic manifest_id as sha256 of concatenated fixture checksums truncated to 16 hex chars,
      (f) set created_at to a FIXED constant (NEVER datetime.now()), (g) set git_commit to "NOT_AVAILABLE" placeholder, (h)
      populate data_layer_refs with layer-to-fixture-path mappings, (i) compute config_hash as sha256 of canonical form of
      config-relevant fields.

      '
    - '[must] [implementation] validate_manifest() must check: (a) manifest_id non-empty string, (b) created_at valid ISO
      8601, (c) mode in (SCALP, AGGRESSIVE_SCALP, SWING), (d) primary_interval in (15m, 1h, 4h, 1d), (e) symbol non-empty
      string, (f) source_fixtures non-empty list, (g) each fixture ref has valid path+checksum, (h) config_hash is 64-char
      hex string, (i) all required metadata per data_contract.md present. Raise ManifestValidationError with field-specific
      message.

      '
    - '[must] [constraint] Do NOT import: binance, ccxt, requests, urllib (external), xgboost, numpy, pandas, or any ML library.
      Do NOT call any network API. Do NOT read from data/ or datasets/. All imports must be stdlib or from existing alphaforge
      modules only.

      '
    - '[must] [verification] Verify import works: python3 -c "from alphaforge.data import DataManifest, build_manifest, validate_manifest"
      must exit 0 without error.

      '
    allowedFiles:
    - alphaforge/src/alphaforge/data/__init__.py
    - alphaforge/src/alphaforge/data/manifest.py
    - alphaforge/src/alphaforge/__init__.py
    - alphaforge/src/alphaforge/errors.py
