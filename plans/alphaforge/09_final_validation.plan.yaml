- id: WS-09-FORBIDDEN-DIFF
  title: Forbidden File Modification Scan — Verify No Protected Path Changes
  objective: Forbidden File Modification Scan — Verify No Protected Path Changes
  implementation:
    instructions:
    - '[must] [scan] Run CMD-scan-forbidden-diff to detect any modifications (modified, added, deleted, renamed) to forbidden
      paths: lib/, simulation/engine/, runtime/, interface/, data/, datasets/, models/, artifacts/, .github/. The command
      scans both staged and unstaged changes against HEAD. Expected result: CLEAN:FORBIDDEN_DIFF.

      '
    - '[must] [discovery] Run CMD-discover-git-status as a secondary cross-reference check. Parse the porcelain output for
      any entry matching the forbidden path list. Expected: zero forbidden-path entries.

      '
    - '[must] [analysis] For each flagged path (if any), determine: (a) whether the modification is from a prior allowed AlphaForge
      subplan, (b) whether it has been explicitly authorized by the master plan, (c) whether it is a false positive (e.g.,
      generated ACCP artifact). Any true modification of a forbidden file that is NOT explicitly authorized is a HARD FAIL.

      '
    - '[must] [audit] Verify specifically that no file under lib/ was modified. lib/ is the shared primitives layer and must
      remain stable from the P0.9A baseline. Expected: zero lib/ matches.

      '
    - '[must] [audit] Verify specifically that simulation/engine/ was not modified. The simulation engine is the economic
      truth authority and must be unchanged during AlphaForge implementation phases.

      '
    - '[must] [audit] Verify that runtime/, interface/, and .github/ were not modified. These domains are outside AlphaForge
      implementation authority.

      '
    - '[must] [audit] Verify that data/, datasets/, models/, and artifacts/ directories contain no new files from this implementation
      phase. These directories must remain pristine.

      '
    - '[must] [evidence] Produce a structured audit result: either CLEAN (zero forbidden modifications detected) or VIOLATION
      (specific paths flagged with status and command source). Include the result in the evidence ledger for the final report.

      '
    allowedFiles:
    - reports/accp/**
    - plans/alphaforge/09_final_validation.plan.yaml
    forbiddenFiles:
    - alphaforge/src/**
    - alphaforge/tests/**
    - lib/**
    - simulation/**
