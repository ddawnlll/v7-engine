- id: WS-09-NO-PROFIT
  title: Profitability Claim Scan — Verify Zero Profit Claims in Source
  objective: Profitability Claim Scan — Verify Zero Profit Claims in Source
  implementation:
    instructions:
    - '[must] [scan] Run CMD-scan-profit-claims to scan the full source tree (alphaforge/, v7/, simulation/, runtime/, lib/,
      integration/, contracts/) for profitability-related language. Target patterns: "profitable", "profit", "expectancy >",
      "sharpe > 1", "win rate", "positive edge". Expected result: CLEAN:PROFIT_SCAN.

      '
    - '[must] [analysis] Review all matches (if any). Distinguish between: (a) real profitability claims asserting positive
      expectancy or sharpe > 1, (b) documentation referencing profitability thresholds as requirements or gates, (c) anti-pattern
      documentation stating "do not claim profitability". Category (a) is a HARD FAIL. Categories (b) and (c) are acceptable
      with annotation.

      '
    - '[must] [audit] Verify that all prior subplan ACCP reports (00 through 08) contain INCONCLUSIVE verdicts for profitability.
      No prior report may assert profitability, positive expectancy, sharpe > 1, or win rate as a concluded finding. Reports
      referencing profitability only in the context of "do not claim" or "blocked until evidence" are acceptable.

      '
    - '[must] [audit] Scan all reports/accp/*.accp.yaml files for profitability language. Explicitly check the result and
      conclusions fields. Any report with a profitability-affirming PASS in a profitability-adjacent context is a HARD FAIL.

      '
    - '[must] [audit] Scan alphaforge/src/ for profitability computation logic. Statistical metrics computed for label engineering
      are acceptable if explicitly scoped as research-only. Any code computing sharpe ratio, win rate, or PnL and presenting
      them as evidence of real profitability is a violation.

      '
    - '[must] [evidence] Produce a structured audit result: either CLEAN (zero profitability claims) or FLAGGED (specific
      matches with classification). All matches must be annotated and adjudicated. The default verdict for any ambiguous match
      is INCONCLUSIVE. Include the result in the evidence ledger.

      '
    allowedFiles:
    - reports/accp/**
    - plans/alphaforge/09_final_validation.plan.yaml
    forbiddenFiles:
    - alphaforge/src/**
    - alphaforge/tests/**
    - lib/**
    - simulation/**
