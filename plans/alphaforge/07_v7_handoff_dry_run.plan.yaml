- id: WS-07-NO-PROMOTION
  title: Implement Promotion Guard and 12 Handoff Rejection Rules
  objective: Implement Promotion Guard and 12 Handoff Rejection Rules
  implementation:
    instructions:
    - '[must] [action] Implement _guard_promotion_status(recommended_status: str) -> None. Raise PromotionGuardError if recommended_status
      is PROMOTION_CANDIDATE or SHADOW_READY. The error message must state: "Dry run cannot recommend {status}. Only REVIEW_REQUIRED
      is allowed from dry run. Real promotion evidence requires walk-forward validation, shadow trading, and live data." The
      guard must be a hard assertion, not a warning.

      '
    - '[must] [action] Call _guard_promotion_status() inside run_handoff_dry_run() BEFORE calling build_v7_handoff_package().
      Ensure the builder is never invoked with an invalid status.

      '
    - '[must] [action] Implement _evaluate_rejection_rules(mode_research_report: dict, validation_report: dict, is_dry_run:
      bool) -> RejectionRulesResult. RejectionRulesResult is a namedtuple/dataclass with fields: passed (list[str]), failed
      (list[str]), blocked (list[str]), is_rejected (bool). Evaluate all 12 handoff rejection rules from alphaforge/docs/handoff_to_v7.md.

      '
    - '[must] [action] Rule 1 (Missing evidence): Check that mode_research_report_id and validation_report_id are present
      and non-empty. If either is missing, add to failed list. Rule 2 (Incomplete gate mapping): Gate mapping validation is
      handled separately by validate_gate_mapping() — this rule checks that validate_gate_mapping was called and passed. If
      mapping is incomplete, add to failed list. Rule 3 (Lineage break): Check that mode_research_report.lineage or validation_report
      split_policy.chronological_split is present. If lineage_verified is False in the assembled package, and this is NOT
      a dry run, add to failed list. In dry run, flag as blocked with reason "Lineage verification deferred — dry run."

      '
    - '[must] [action] Rule 4 (Checksum mismatch): In dry run, always pass (no real model binary). Add to blocked list with
      reason "Checksum verification deferred — dry run, no real model binary." Rule 5 (Validation failure): Check validation_report.verdict.
      If verdict is FAIL_OVERFIT or FAIL_COST or FAIL_REGIME or FAIL_OOS or FAIL_MHT, add to failed list. If verdict is INCONCLUSIVE
      or PASS_WITH_LIMITATIONS, add to blocked list. If PASS, add to passed list. Rule 6 (Cost vulnerability): Check validation_report.cost_stress.cost_edge_destroyed.
      If True, add to failed. If combined_stress_edge_survives is False, add to failed. If scalp_cost_adjusted_expectancy_r
      < 0.10R for SCALP mode, add to failed.

      '
    - '[must] [action] Rule 7 (Overfit detected): Check validation_report.overfit_risk_flags. If overfit_risk_overall is CRITICAL,
      add to failed. If HIGH, add to blocked. If purge_violation_detected is True, add to failed. If train_oos_gap is HIGH,
      add to blocked. Rule 8 (Single-symbol overfitting): Check validation_report.symbol_stability. If max_single_symbol_concentration
      > 0.40, add to failed. If single_symbol_limitation is True, add to blocked. Rule 9 (Calibration unusable): Check validation_report.calibration_gate_alignment.
      If calibration_status is UNRELIABLE, add to failed. If UNCALIBRATED, add to blocked. Rule 10 (Funding unknown): Check
      validation_report.cost_stress.funding_deferred_block. If funding_deferred is True, add to blocked with reason from block_reason.

      '
    - '[must] [action] Rule 11 (Blocked scope violation): Check mode_research_report.blocked_scopes against the mode. If mode
      is SCALP but blocked_scopes references "SCALP blocked", add to failed. Generally, if any blocked scope contradicts the
      mode, add to failed. Rule 12 (Policy conflict): In dry run, always add to blocked list with reason "Policy conflict
      check deferred — dry run, no V7 policy loaded." After evaluating all 12 rules, populate rejection_rules_applied list
      on the output package with a summary string per rule.

      '
    - '[must] [action] Define PromotionGuardError as a new exception class. Must inherit from the project''s base error (Exception
      or AlphaForgeError). The message must reference handoff_to_v7.md and the V7 final authority principle ("AlphaForge RECOMMENDS.
      V7 DECIDES.").

      '
    allowedFiles:
    - alphaforge/src/alphaforge/handoff/**
    - alphaforge/src/alphaforge/constants.py
    - alphaforge/src/alphaforge/errors.py
    - alphaforge/docs/handoff_to_v7.md
    forbiddenFiles:
    - alphaforge/tests/**
    - integration/tests/**
    dependencies:
    - WS-07-DRY-RUN-BUILDER
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
