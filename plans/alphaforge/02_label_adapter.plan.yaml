- id: WS-02-REPORT
  title: ACCP Report and Final Validation — Evidence Collection and Gate Promotion
  objective: ACCP Report and Final Validation — Evidence Collection and Gate Promotion
  implementation:
    instructions:
    - '[must] [action] Run CMD-final-validation: the full validation suite covering lib/, integration/, simulation/, and alphaforge/
      tests. All tests must pass green with exit code 0. Capture the full test output as evidence.

      '
    - '[must] [action] Emit the ACCP implementation report to reports/accp/alphaforge_label_adapter.accp.yaml following the
      accp_version "2.0.0" and source_format "ACCP-YAML" convention. Required keys: result, scope_confirmation, files_changed,
      decisions_locked, remaining_holds, safe_next_step, commands_run, evidence. Document all 35+ acceptance criteria with
      pass/fail status and evidence references.

      '
    - '[must] [action] Verify all acceptance criteria are covered by at least one evidence type. AC-02-001 through AC-02-035
      must all have evidence. Mark any criterion that cannot be satisfied as a remaining hold with explicit release condition.

      '
    - '[must] [action] Confirm no forbidden files were modified. Run git status --porcelain and verify only allowed files
      appear in the diff. Document any unexpected changes as anomalies in the ACCP report.

      '
    - '[must] [action] Verify deterministic output stability once more: run the full adapter test suite twice and confirm
      identical results both times. Document the checksum of the test output in the ACCP report for auditability.

      '
    - '[should] [action] Update the AlphaForge roadmap (if applicable) to reflect completion of TASK-02-LABEL-ADAPTER. Document
      that the label adapter integration contract is now available for TASK-03-FEATURE-PIPELINE. Note any remaining holds
      (funding DEFERRED, cost model version pinning).

      '
    - '[must] [action] Run CMD-discover-git-status as final state confirmation. The git working tree must show only the expected
      new and modified files. No unapproved file changes are permitted.

      '
    allowedFiles:
    - reports/accp/alphaforge_label_adapter.accp.yaml
    - alphaforge/src/alphaforge/labels/__init__.py
    - alphaforge/src/alphaforge/labels/adapter.py
    - alphaforge/tests/test_label_adapter_no_trade.py
    - alphaforge/tests/test_label_adapter_schema.py
    - contracts/schemas/alphaforge_label.schema.json
    - contracts/schemas/simulation_output.schema.json
    - contracts/registry.json
    - plans/alphaforge/02_label_adapter.plan.yaml
    forbiddenFiles:
    - alphaforge/src/alphaforge/data/**
    - alphaforge/src/alphaforge/contracts/**
    - alphaforge/src/alphaforge/handoff/**
    - alphaforge/src/alphaforge/modes/**
    - alphaforge/src/alphaforge/reports/**
    - data/**
    - datasets/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    dependencies:
    - WS-02-SCHEMA-TESTS
  artifactPolicy:
    class: generated_report
    wiringRequired: false
    reachabilityRequired: false
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-02-032
    description: CMD-final-validation passes with exit code 0 — all lib, integration, simulation, and alphaforge tests green
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: command_output
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - command
      - test_output
      commandRef: CMD-final-validation
    requiredEvidence:
    - command
    - test_output
  - id: AC-02-033
    description: 'ACCP report emitted to reports/accp/alphaforge_label_adapter.accp.yaml with all required keys: result, scope_confirmation,
      files_changed, decisions_locked, remaining_holds, safe_next_step, commands_run, evidence'
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: file_exists
      deterministic: true
      canSatisfyFinalGate: true
      advisoryOnly: false
      evidenceRefs:
      - report
      - source
    requiredEvidence:
    - report
    - source
  - id: AC-02-034
    description: All 35 acceptance criteria (AC-02-001 through AC-02-035) have at least one evidence type assigned and pass/fail
      status documented
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
