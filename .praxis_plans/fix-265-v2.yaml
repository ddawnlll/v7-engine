planSpecVersion: "0.1.0"
kind: "ImplementationPlan"
profile: "praxis-v0.1"

metadata:
  planId: "FIX-265-ATR-TRUE-RANGE"
  title: "Fix #265: Triple-barrier ATR uses True Range"
  description: "Replace close-close difference with canonical True Range in ATR computation for triple-barrier label generation"
  createdAt: "2026-07-10T14:45:00Z"
  humanId: "hermes-agent"
  status: "passed"

authority:
  executor: "OtherAgent"
  completionAuthority: "PraxisTruthKernel"
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: "human"
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false

workspace:
  root: "."
  allowedFiles:
    - "alphaforge/src/alphaforge/validation/walk_forward_runner.py"
    - "alphaforge/src/alphaforge/train.py"
  forbiddenFiles: []

execution:
  mode: "single_session"
  agent: "claude-code"
  autonomy: "implementation_allowed"
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 0

tasks:
  - id: "task-fix-atr"
    title: "Fix ATR to use True Range"
    objective: "Replace close-close difference ATR with canonical True Range in triple-barrier label generation"

    implementation:
      instructions:
        - "walk_forward_runner.py: replace np.diff(close) with vectorized True Range using high/low/close arrays"
        - "train.py: replace close-close loop with tr = max(high-low, |high-prev_close|, |low-prev_close|)"
      allowedFiles:
        - "alphaforge/src/alphaforge/validation/walk_forward_runner.py"
        - "alphaforge/src/alphaforge/train.py"
      suggestedSteps: []
      antiPatterns: []
      dependencies: []
      expectedOutputs: []

    artifactPolicy:
      class: "library_code"
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
      advisoryReviewAllowed: false

    acceptanceCriteria:
      - id: "AC-WFV-TR"
        description: "walk_forward_runner.py ATR uses True Range not close-close diff"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "static_pattern"
          path: "alphaforge/src/alphaforge/validation/walk_forward_runner.py"
          patterns:
            - "np\\.maximum\\(\\n\\s*high_slice - low_slice,"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "source"
        requiredEvidence:
          - "source"

      - id: "AC-TRAIN-TR"
        description: "train.py _generate_labels_numba uses True Range"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "static_pattern"
          path: "alphaforge/src/alphaforge/train.py"
          patterns:
            - "tr = max\\(hl, hc, lc\\)"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "source"
        requiredEvidence:
          - "source"

      - id: "AC-TESTS"
        description: "Full test suite passes"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST"
          patterns:
            - "927 passed.*0 failed"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "test_output"
            - "command"
        requiredEvidence:
          - "test_output"

commands:
  exactAllowedCommands:
    - id: "CMD-TEST"
      kind: "final_validation"
      command: "cd /workspace/v7-engine && PYTHONPATH=. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ --ignore=lib/tests/test_data_lake_backfill_planner.py --ignore=lib/tests/test_data_lake_catalog.py --ignore=lib/tests/test_data_lake_checksum.py --ignore=lib/tests/test_data_lake_coverage.py --ignore=lib/tests/test_data_lake_downloader.py --ignore=lib/tests/test_data_lake_gateway.py --ignore=lib/tests/test_data_lake_health.py --ignore=lib/tests/test_data_lake_passport.py --ignore=lib/tests/test_data_lake_spec.py --ignore=lib/tests/test_data_lake_storage.py -q --tb=short"
      evidenceRequired: true
      timeoutSeconds: 300
      noTestsFoundIsFailure: true
      watchModeForbidden: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true

  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true

  hardDeniedCommands:
    - command: "rm -rf"
      reason: "Destructive operation."

evidence:
  ledgerRequired: true
  requiredEvidenceTypes:
    - "diff"
    - "source"
    - "test_output"
  hashWhenAvailable: false

gates:
  sequence:
    - "SchemaGate"
    - "LockGate"
    - "EvidenceGate"
    - "WiringGate"
    - "ExecGate"
    - "FinalGate"
  verdicts:
    - "PASS"
    - "HOLD"
    - "FAIL"
  reasonCodes:
    EvidenceGate:
      - "EVIDENCE_FILE_MISSING"
    WiringGate:
      - "WIRING_EXPORT_MISMATCH"
    ExecGate:
      - "TESTS_RAN_ZERO"
      - "TESTS_FAILURES"
    FinalGate:
      - "ALL_CRITERIA_MET"
      - "CRITERIA_PARTIAL"

repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 1
  reverifyCommand: "cd /workspace/v7-engine && PYTHONPATH=. python3 -m pytest lib/tests/ integration/tests/ simulation/tests/ --ignore=lib/tests/test_data_lake_*.py -q --tb=short"
  repairPacketFormat:
    json: true
    markdown: true

locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: ".praxis/planspec.lock"
  hashes:
    - "planHash"
    - "acceptanceCriteriaHash"
    - "artifactPolicyHash"
    - "commandPolicyHash"

reports:
  protocol: "ACCP"
  artifactDirectory: "reports/"
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: false
