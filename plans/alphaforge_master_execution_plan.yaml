        __init__.py and walk_forward.py. Implement chronological train/val/OOS
        split policy per validation_contract.md (no shuffling across time).
        Implement 6-fold minimum for all modes. Implement purge window logic
        per mode (SCALP 100 bars, AGGRESSIVE_SCALP 200 bars, SWING 20 bars).
        Implement per-fold metric computation structure. Implement OOS summary,
        cost stress structure, regime breakdown structure, and symbol stability
        structure. Since no model training exists yet, folds produce placeholder
        metrics. The skeleton validates that split logic, fold iteration, and
        report assembly are correct.
