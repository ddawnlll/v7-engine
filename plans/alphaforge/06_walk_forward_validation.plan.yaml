  title: Implement negative tests — chronological split, 6-fold enforcement, purge correctness, no-shuffle, no-fake-metrics
  objective: Implement negative tests — chronological split, 6-fold enforcement, purge correctness, no-shuffle, no-fake-metrics
  implementation:
    instructions:
    - '[must] [action] Update or create alphaforge/tests/conftest.py with validation fixtures: (a) chrono_dataset — 200-row
      LabeledDataset list sorted by feature_timestamp across 1200 bars, 3 symbols (BTCUSDT, ETHUSDT, SOLUSDT), SWING mode;
      (b) unsorted_dataset — same data but shuffled; (c) short_dataset — 30 rows, too few bars for 6 SWING folds; (d) leaky_dataset
      — feature_timestamp == label_timestamp for some rows.'
    - '[must] [action] Create alphaforge/tests/test_walk_forward_validator.py with chronological split tests. Test: test_split_returns_6_folds
      — verify split() on 200-row SWING dataset returns >= 6 folds.'
    - '[must] [action] Test: test_chronological_order_enforced — verify split() raises ValidationError on unsorted dataset.'
    - '[must] [action] Test: test_oos_after_train_val — for every fold, verify all OOS timestamps are strictly after all train
      and val timestamps.'
    - '[must] [action] Test: test_folds_are_chronological — fold 0 covers earliest data; fold N covers later data than fold
      N-1. No fold overlaps chronologically.'
    - '[must] [action] Test: test_6_fold_minimum_enforced — construct a short dataset that can only produce 4 folds. Verify
      ValidationError is raised.'
    - '[must] [action] Test: test_6_fold_minimum_satisfied — construct a dataset that produces exactly 6 folds. Verify no
      error.'
    - '[must] [action] Test: test_6_fold_minimum_applies_to_all_modes — verify SCALP, AGGRESSIVE_SCALP, and SWING all require
      >= 6 folds. Test each mode with a dataset that would only support 5 folds.'
    - '[must] [action] Test: test_purge_window_scalp — SCALP mode: verify purge gap between val end and oos start is >= 100
      bars.'
    - '[must] [action] Test: test_purge_window_aggressive_scalp — AGGRESSIVE_SCALP mode: verify purge gap >= 200 bars.'
    - '[must] [action] Test: test_purge_window_swing — SWING mode: verify purge gap >= 20 bars.'
    - '[must] [action] Test: test_embargo_enforcement — construct a dataset where train and test are too close (within embargo_bars).
      Verify ValidationError is raised.'
    - '[must] [action] Test: test_no_shuffle — construct a shuffled dataset, call split(), verify chronological ordering is
      enforced (not silently accepted).'
    - '[must] [action] Test: test_all_metrics_not_evaluated — call assemble_validation_report(), iterate every metric field
      in the report (OOS summary, cost stress, regime breakdown, symbol stability, MHT controls, per-fold metrics), verify
      every single metric field is NOT_EVALUATED.'
    - '[must] [action] Test: test_no_fake_sharpe — verify OOSSummary.sharpe is NOT_EVALUATED, not 0.0, not None, not a float.'
    - '[must] [action] Test: test_no_fake_win_rate — verify OOSSummary.win_rate is NOT_EVALUATED.'
    - '[must] [action] Test: test_sample_counts_populated — verify every FoldResult has train_count, val_count, oos_count
      as positive integers.'
    - '[must] [action] Test: test_verdict_is_inconclusive — assemble_validation_report() returns verdict INCONCLUSIVE.'
    - '[must] [action] Test: test_funding_deferred_block_present — verify cost_stress.funding_deferred_block is a non-empty
      string containing ''DEFERRED''.'
    - '[must] [action] Test: test_report_id_format — verify report_id matches regex VR-{mode}-\d{{4}}-\d{{2}}-\d{{2}}T.*-[a-f0-9]{{8}}.'
    - '[must] [action] Test: test_regime_names_are_v7_canonical — verify RegimeBreakdown keys are exactly TREND_UP, TREND_DOWN,
      RANGE, TRANSITION (not HIGH_VOL_UP, etc.).'
    - '[must] [action] Test: test_no_xgboost_import — grep walk_forward.py and contracts.py for ''xgboost'', ''sklearn'',
      ''tensorflow'', ''torch'', ''fit(''. Verify zero matches.'
    - '[must] [action] Create integration/tests/test_alphaforge_validation.py with end-to-end test: create fixture dataset
      -> WalkForwardValidator -> assemble_validation_report() -> verify structure. Confirm no exceptions, all metrics NOT_EVALUATED,
      6+ folds, chronological ordering.'
    - '[must] [action] Run CMD-test-validation. All tests must pass with exit code 0. No skipped tests.'
    - '[must] [action] Run CMD-discover-git-status. Confirm only allowed files modified.'
