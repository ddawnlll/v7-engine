name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install pytest requests

      - name: Show Python version
        run: python --version

      - name: Run contract checks
        run: make check-contracts

      - name: Run boundary checks
        run: make check-boundaries

      - name: Run lib + integration + simulation tests
        run: PYTHONPATH=. python -m pytest lib/tests/ integration/tests/ simulation/tests/ -q
