- id: WS-02-IMPLEMENT
  title: Implement LabelAdapter — adapt_simulation_output() and classify_no_trade_quality()
  objective: Implement LabelAdapter — adapt_simulation_output() and classify_no_trade_quality()
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/src/alphaforge/labels/__init__.py that exports LabelAdapter and the public functions
      adapt_simulation_output and classify_no_trade_quality. Follow the existing alphaforge __init__.py convention for exports.

      '
    - '[must] [action] Create alphaforge/src/alphaforge/labels/adapter.py with the LabelAdapter class. Implement adapt_simulation_output(sim_output:
      dict) -> dict that maps all 15 fields from SimulationOutput to AlphaForgeLabel format per simulation_to_alphaforge.json.
      Use explicit field access (no wildcard passthrough). Handle missing optional fields gracefully with None defaults. Populate
      all required fields: symbol, timestamp (from decision_timestamp), mode, simulation_family_version, label_interpretation_version,
      long_R_net, short_R_net, long_R_gross, short_R_gross, total_cost_r_long, total_cost_r_short, best_action_label, no_trade_quality,
      label_validity, resolution_status, simulation_profile_id.

      '
    - '[must] [action] Implement classify_no_trade_quality(no_trade_outcome: dict) -> str with the decision rules from the
      design phase. Use was_correct_skip, saved_loss_score, and missed_opportunity_score as primary signals. CORRECT_NO_TRADE:
      was_correct_skip is True AND both scores below threshold. SAVED_LOSS: saved_loss_score > missed_opportunity_score AND
      saved_loss_score >= threshold. MISSED_OPPORTUNITY: missed_opportunity_score > saved_loss_score AND missed_opportunity_score
      >= threshold. AMBIGUOUS_NO_TRADE: scores within ambiguity margin or signals conflict. The function must be deterministic
      — no randomness, no external state.

      '
    - '[must] [action] Implement cost-aware field population. Map long_R_gross from long_outcome.realized_r_gross, short_R_gross
      from short_outcome.realized_r_gross. Map fee_cost_r_long from long_outcome.fee_cost_r, fee_cost_r_short from short_outcome.fee_cost_r.
      Map slippage_cost_r_long from long_outcome.slippage_cost_r, slippage_cost_r_short from short_outcome.slippage_cost_r.
      Map total_cost_r_long from long_outcome.total_cost_r, total_cost_r_short from short_outcome.total_cost_r. Add cost_impact_long
      and cost_impact_short as total_cost_r aliases for downstream compatibility. Detect cost-consumed-edge: if long_R_gross
      > 0 and long_R_net < 0 (or short equivalent), record in a warnings list.

      '
    - '[must] [action] Implement label_validity filtering. Derive label_validity from resolution_status and is_ambiguous:
      COMPLETE + not ambiguous -> "valid"; COMPLETE + ambiguous -> "ambiguous_excluded"; UNRESOLVED -> "invalid"; INVALIDATED
      -> "invalid". The adapt_simulation_output function must still produce a label for invalid rows (so consumers can inspect),
      but label_validity must correctly flag them.

      '
    - '[must] [action] Ensure deterministic output. Do not use random, time, or any non-deterministic source. Do not generate
      timestamps — use decision_timestamp from input. Do not generate IDs — use simulation_run_id from input. All field values
      must be direct mappings or deterministic computations from input fields. Same SimulationOutput must produce bit-for-bit
      identical AlphaForgeLabel dict.

      '
    - '[must] [action] Set funding_status to "DEFERRED" on every output record. Propagate simulation_family_version from lineage.simulation_family_version.
      Propagate simulation_profile_id from lineage.simulation_profile_version. Set cost_model_version from lineage.cost_model_version
      if available. Set simulation_engine_version from lineage.simulation_family_version. Set label_interpretation_version
      to "1.0.0" (this adapter''s version).

      '
    allowedFiles:
    - alphaforge/src/alphaforge/labels/__init__.py
    - alphaforge/src/alphaforge/labels/adapter.py
    - contracts/schemas/alphaforge_label.schema.json
    - contracts/mappings/simulation_to_alphaforge.json
    - contracts/fixtures/simulation_output_minimal.json
    forbiddenFiles:
