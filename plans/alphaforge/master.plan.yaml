  - alphaforge/src/**
  - alphaforge/tests/**
  - artifacts/**
  - data/**
  - datasets/**
  - interface/**
  - lib/**
  - models/**
  - runtime/**
  - simulation/contracts/**
  - simulation/engine/**
execution:
  mode: single_session
  agent: claude-code
  autonomy: implementation_allowed
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 3
tasks:
- id: WS-MASTER-00-VERIFY
  title: Execute Baseline Verification Subplan
  objective: Execute Baseline Verification Subplan
  implementation:
    instructions:
    - '[must] [action] Load and validate subplan plans/alphaforge/00_baseline_verify.plan.yaml against template.yaml.'
    - '[must] [action] Execute all workspaces defined in the subplan in order.'
    - '[must] [action] Run CMD-discover-git-status and confirm clean working tree before proceeding.'
    - '[must] [action] Emit ACCP report reports/accp/alphaforge_baseline_verify.accp.yaml.'
    allowedFiles:
    - plans/alphaforge/00_baseline_verify.plan.yaml
    - reports/accp/**
    forbiddenFiles:
    - alphaforge/src/**
    - alphaforge/tests/**
  artifactPolicy:
    class: cli_command
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-MASTER-00-01
    description: Subplan 00_baseline_verify.plan.yaml validates against template.yaml
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: schema_validation
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - schema_validation
    requiredEvidence:
    - schema_validation
  - id: AC-MASTER-00-02
    description: CMD-test-alphaforge exits 0 with all tests passing
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - command
      - test_output
      commandRef: CMD-test-alphaforge
    requiredEvidence:
    - command
    - test_output
  - id: AC-MASTER-00-03
    description: CMD-test-integration-alphaforge exits 0
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - command
      - test_output
      commandRef: CMD-test-integration-alphaforge
    requiredEvidence:
    - command
    - test_output
  - id: AC-MASTER-00-04
    description: CMD-discover-git-status shows clean working tree
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: command_output
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - command
      commandRef: CMD-discover-git-status
    requiredEvidence:
    - command
  integrationContract:
    mode: consumer_or_export
    reason: 'Module must be importable and covered by deterministic tests. Task: WS-MASTER-00-VERIFY'
    usageProofs:
    - id: USE-WS-MASTER-00-VERIFY
      commandRef: CMD-test-alphaforge
      proves:
      - module importable
      - deterministic tests pass
    entrypoints:
    - id: ENTRY-WS-MASTER-00-VERIFY
      path: alphaforge/src/alphaforge/__init__.py
      kind: library_module
- id: WS-MASTER-01-IMPLEMENT
  title: Execute Implementation Subplans In Order
  objective: Execute Implementation Subplans In Order
  implementation:
    instructions:
    - '[must] [action] For each subplan 01 through 08, in order: (a) validate subplan against template.yaml, (b) execute all
      workspaces, (c) emit ACCP report, (d) run CMD-test-alphaforge, (e) confirm tests pass before next subplan.'
    - '[must] [action] If any subplan fails validation or tests, STOP. Do not proceed to next subplan. Emit repair packet.'
    - '[must] [action] No model training. No xgboost import. No fit() calls. Verify after each subplan.'
    - '[must] [action] No profitability claims. Verify report verdicts are INCONCLUSIVE or NOT_EVALUATED.'
    allowedFiles:
    - plans/alphaforge/01_data_manifest.plan.yaml
    - plans/alphaforge/02_label_adapter.plan.yaml
    - plans/alphaforge/03_feature_pipeline.plan.yaml
    - plans/alphaforge/04_dataset_assembler.plan.yaml
    - plans/alphaforge/05_non_ml_research_report.plan.yaml
    - plans/alphaforge/06_walk_forward_validation.plan.yaml
    - plans/alphaforge/07_v7_handoff_dry_run.plan.yaml
    - plans/alphaforge/08_ml_pilot_gate.plan.yaml
    - alphaforge/src/**
    - alphaforge/tests/**
    - integration/tests/test_alphaforge_*.py
    - contracts/fixtures/alphaforge/**
    - reports/accp/**
    forbiddenFiles:
    - lib/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    - data/**
    - datasets/**
    - models/**
    dependencies:
    - WS-MASTER-00-VERIFY
  artifactPolicy:
    class: cli_command
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-MASTER-01-01
    description: Subplan 01_data_manifest.plan.yaml validates and all workspaces pass
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: schema_validation
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - schema_validation
      - test_output
    requiredEvidence:
    - schema_validation
    - test_output
