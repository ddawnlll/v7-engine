  planId: ALPHAFORGE-01-DATA-MANIFEST
  title: AlphaForge P0.9B — Data Manifest (TASK-01 of Master Execution Plan)
  description: 'Implement the DataManifest dataclass and builder in alphaforge/src/alphaforge/data/. DataManifest is a deterministic,
    checksummed, fixture-based metadata record that describes which simulation output fixtures comprise an AlphaForge research
    run. It is the data-layer root object for reproducibility — every AlphaForge run must produce a DataManifest before any
    label, feature, or dataset work proceeds. Design is verified against data_contract.md Layers 1-2. All inputs are local
    JSON fixtures under contracts/fixtures/. No real market data, no network calls, no Binance API. Part of the master AlphaForge
    implementation pipeline. Predecessor: TASK-00-BASELINE-VERIFY. Successor: TASK-02-SIMULATION-DERIVED-LABEL-ADAPTER.

    '
