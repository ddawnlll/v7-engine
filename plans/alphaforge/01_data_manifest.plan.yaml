tasks:
- id: WS-01-DESIGN
  title: Design DataManifest Dataclass — Field Planning and Contract Verification
  objective: Design DataManifest Dataclass — Field Planning and Contract Verification
  implementation:
    instructions:
    - '[must] [analysis] Read alphaforge/docs/data_contract.md fully. Document every field in Layers 1-2 (raw market data,
      normalized market data) that the DataManifest must reference. Cross-reference against contracts/fixtures/simulation_output_minimal.json
      to confirm which fields are available from the fixture source.

      '
    - '[must] [design] Design the DataManifest dataclass signature. Fields must include at minimum: manifest_id (str), created_at
      (str ISO 8601), git_commit (str), source_fixtures (list of fixture references with path+checksum), mode (enum SCALP/AGGRESSIVE_SCALP/SWING),
      primary_interval (str), symbol (str), data_layer_refs (dict mapping layer names to fixture paths), config_hash (str),
      limitations (list[str]). All fields must have type annotations. The dataclass must be frozen=True.

      '
    - '[must] [design] Define the deterministic checksum approach: use hashlib.sha256 on a canonical JSON representation of
      manifest fields (sorted keys, no trailing whitespace, UTF-8 encoding, indent=2, trailing newline). The canonical form
      must be documented clearly so any re-implementation can reproduce the identical checksum.

      '
    - '[must] [review] Verify that the design does not require network access, exchange API keys, Binance imports, or real
      market data. Explicitly enumerate which Python stdlib modules the implementation will use (dataclasses, hashlib, json,
      pathlib, datetime, typing, enum) and confirm no external dependencies.

      '
    - '[must] [review] Verify the design against contracts/registry.json: confirm that SimulationOutput (v1.0.0) is the consumed
      contract and DataManifest is a new producer contract consumed by downstream label adapter (TASK-02). Document the integration
      contract surface.

      '
    - '[must] [review] Confirm domain boundary: alphaforge.data must not import from simulation/, v7/, runtime/, or interface/.
      It may import from alphaforge.contracts.loader and alphaforge.paths only.

      '
    - '[should] [design] Design the error handling model: ManifestValidationError extending alphaforge.errors. AlphaForgeError
      with specific field-level error messages. Document which validation rules apply to each field.

      '
    allowedFiles:
    - alphaforge/docs/data_contract.md
    - alphaforge/docs/ai_summary__v7_alphaforge_xgb.md
    - plans/alphaforge/01_data_manifest.plan.yaml
    - contracts/fixtures/simulation_output_minimal.json
    - contracts/registry.json
    forbiddenFiles:
