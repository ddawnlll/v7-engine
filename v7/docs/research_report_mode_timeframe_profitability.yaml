locked_decisions:
  - id: "DEC-001"
    decision: "Three trading modes: SWING (4h), SCALP (1h), AGGRESSIVE_SCALP (15m) — each with independent pipeline"
    rationale: "Same timestamp produces different label truths for different modes. Independent sim configs, labels, models, policy, regime."
    evidence_refs:
      - "EVIDENCE-002"
      - "EVIDENCE-004"

  - id: "DEC-002"
    decision: "LONG_NOW / SHORT_NOW / NO_TRADE as the only first-phase actions"
    rationale: "Do not expand first-phase action family. Timing fields are advisory-only, not primary learned targets."
    evidence_refs:
      - "EVIDENCE-006"
      - "EVIDENCE-008"

  - id: "DEC-003"
    decision: "NO_TRADE is first-class action with quality classification (CORRECT/SAVED_LOSS/MISSED_OPPORTUNITY/AMBIGUOUS)"
    rationale: "Correct skip is economically valuable. Must compete with directional actions in labels, evaluation, and policy."
    evidence_refs:
      - "EVIDENCE-003"
      - "EVIDENCE-016"

  - id: "DEC-004"
    decision: "XGBoost-first hybrid supervised model per mode (classification heads + regression heads)"
    rationale: "XGBoost for speed, portability, tabular strength, transparent iteration. Each mode trains independent artifact."
    evidence_refs:
      - "EVIDENCE-007"

  - id: "DEC-005"
    decision: "Features are shared across modes; labels are mode-specific"
    rationale: "Canonical state → features. Features identical for all modes. Labels mode-specific."
    evidence_refs:
      - "EVIDENCE-022"
      - "EVIDENCE-002"

  - id: "DEC-006"
    decision: "One simulation truth layer (mode-configured), owned by /simulation, hosted by V7 runtime"
    rationale: "Same simulation logic defines labels, replay, evaluation, paper/live outcome interpretation. Mode-specific profiles."
    evidence_refs:
      - "EVIDENCE-002"
      - "EVIDENCE-012"
      - "EVIDENCE-017"

  - id: "DEC-007"
    decision: "Rule-based regime detection (ADX + ATR percentile + EMA slope); ML-based deferred to Phase 3"
    rationale: "Interpretable, debuggable, stable first phase."
    evidence_refs:
      - "EVIDENCE-005"

  - id: "DEC-008"
    decision: "Regime is policy-layer, not simulation-layer (stop multiplier 99.0 is policy override)"
    rationale: "Simulation must expose raw comparative outcomes. Policy applies regime constraints. This is explicit architecture rule."
    evidence_refs:
      - "EVIDENCE-008"
      - "EVIDENCE-013"

  - id: "DEC-009"
    decision: "One cost model for all consumers (labels, evaluation, paper, live outcome normalization)"
    rationale: "Different cost models would make system economically untrustworthy."
    evidence_refs:
      - "EVIDENCE-014"

  - id: "DEC-010"
    decision: "Walk-forward evaluation: 6 folds, 12-month min train, 2-month validation, optional 1-month holdout tail"
    rationale: "Temporal correctness. No IID random split for primary evaluation."
    evidence_refs:
      - "EVIDENCE-023"
      - "EVIDENCE-009"

  - id: "DEC-011"
    decision: "Promotion requires OOS economic evidence: positive expectancy R, acceptable drawdown, no-trade quality, calibration quality, symbol/regime stability"
    rationale: "Architecture sophistication is never a promotion criterion by itself."
    evidence_refs:
      - "EVIDENCE-003"
      - "EVIDENCE-009"

  - id: "DEC-012"
    decision: "Runtime is not the model. Runtime owns orchestration/persistence/safety/execution eligibility. Model produces decision evidence."
    rationale: "Preserves runtime boundary. Model confidence cannot override operational safety."
    evidence_refs:
      - "EVIDENCE-002"
      - "EVIDENCE-018"

  - id: "DEC-013"
    decision: "Regime-aware policy modifiers: TREND_UP blocks SHORT, TREND_DOWN blocks LONG, RANGE raises thresholds, TRANSITION strongly prefers NO_TRADE"
    rationale: "Don't fight the trend. Default to NO_TRADE when regime is uncertain."
    evidence_refs:
      - "EVIDENCE-005"
      - "EVIDENCE-008"

  - id: "DEC-014"
    decision: "Correlation-aware portfolio: pre-computed groups (btc_cluster, eth_cluster, layer1, defi), 15% max cluster exposure"
    rationale: "Prevents effective overexposure from correlated positions."
    evidence_refs:
      - "EVIDENCE-011"

  - id: "DEC-015"
    decision: "Stop-before-target in same candle (conservative, versioned)"
    rationale: "Prevents over-optimistic backtest results. Versioned for potential future change."
    evidence_refs:
      - "EVIDENCE-015"

  - id: "DEC-016"
    decision: "SWING-first implementation order: build and deploy SWING first, then SCALP, then AGGRESSIVE_SCALP"
    rationale: "Building all 3 simultaneously multiplies risk, multiplies cost, does NOT multiply returns."
    evidence_refs:
      - "EVIDENCE-004"
      - "EVIDENCE-026"

