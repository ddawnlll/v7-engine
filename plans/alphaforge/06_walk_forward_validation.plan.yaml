- id: WS-06-SKELETON
  title: Implement WalkForwardValidator skeleton and ValidationReport assembly
  objective: Implement WalkForwardValidator skeleton and ValidationReport assembly
  implementation:
    instructions:
    - '[must] [action] Implement WalkForwardValidator class in walk_forward.py. Constructor takes WalkForwardConfig and a
      PurgePolicy.'
    - '[must] [action] Implement split(dataset: List[LabeledDataset]) -> List[Fold]. Dataset must be sorted by (feature_timestamp,
      symbol). Raise ValidationError if unsorted.'
    - '[must] [action] split() logic: verify chronological ordering of dataset. Partition into folds per config (train_ratio/val_ratio/oos_ratio).
      For each fold, extract datetime boundaries, compute purge gaps, verify embargo, construct Fold with indices.'
    - '[must] [action] Implement assemble_validation_report(dataset: List[LabeledDataset], config: WalkForwardConfig) -> ValidationReport.
      This is the main entry point: splits dataset, constructs folds, assembles the report skeleton.'
    - '[must] [action] assemble_validation_report() must produce a ValidationReport with: (a) config = the WalkForwardConfig
      used; (b) folds = List[FoldResult] with per-fold sample_counts (train/val/oos row counts) populated from actual data
      — ALL metrics NOT_EVALUATED; (c) oos_summary = OOSSummary instance with all fields NOT_EVALUATED; (d) cost_stress =
      CostStressResult with fee/slippage/spread fields NOT_EVALUATED and funding_deferred_block populated (text explaining
