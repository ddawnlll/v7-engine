tasks:
- id: WS-06-FOLD-PLAN
  title: Design WalkForwardValidator — split policy, chronological folds, 6-fold minimum
  objective: Design WalkForwardValidator — split policy, chronological folds, 6-fold minimum
  implementation:
    instructions:
    - '[must] [action] Read alphaforge/docs/validation_contract.md — absorb the full split policy (train 60% / val 20% / OOS
      20%), purge window table, embargo policy, and mode-specific fold configuration.'
    - '[must] [action] Read v7/docs/pipeline/evaluation.md G2: WALK_FORWARD_OOS — confirm the 6-fold canonical minimum and
      its V7 gate mapping.'
    - '[must] [action] Read contracts/schemas/alphaforge/validation_report.schema.json — extract all required fields for the
      ValidationReport structure.'
    - '[must] [action] Design the WalkForwardValidator split policy: input is datetime-sorted LabeledDataset list; output
      is List[Fold] where each Fold has train_indices, val_indices, oos_indices (integer positions into sorted dataset).'
    - '[must] [action] Design the Fold dataclass: fold_index (int), train_start/end (datetime), val_start/end (datetime),
      oos_start/end (datetime), purge_before_val (int bars), purge_before_oos (int bars), embargo_applied (bool).'
    - '[must] [action] Document the chronological invariant: dataset is sorted by (feature_timestamp, symbol). Folds progress
      forward in time. OOS of fold N is chronologically before train of fold N+1 (with purge gap).'
    - '[must] [action] Define the 6-fold minimum enforcement: if less than 6 folds can be constructed from available data,
      raise ValidationError with message stating the minimum, the available bar count, and the shortest mode that would fit.'
    - '[must] [action] Design WalkForwardConfig dataclass: mode (Mode enum), min_folds (int, default 6), train_ratio (float,
      default 0.6), val_ratio (float, default 0.2), oos_ratio (float, default 0.2), purge_bars (int, mode-dependent), embargo_bars
      (int, mode-dependent), window_type (ANCHORED or ROLLING).'
    - '[must] [action] Define the ValidationReport dataclass structure (contract placeholder): config, folds (List[FoldResult]),
      oos_summary (OOSSummary), cost_stress (CostStressResult), regime_breakdown (RegimeBreakdown), symbol_stability (SymbolStability),
      overfit_risk_flags (List[OverfitFlag]), mht_controls (MHTControls), verdict (ValidationVerdict enum), report_id (str),
      generated_at (str).'
    - '[must] [action] Define FoldResult dataclass: fold_index, train_metrics (NOT_EVALUATED), val_metrics (NOT_EVALUATED),
      oos_metrics (NOT_EVALUATED), regime_breakdown (NOT_EVALUATED), cost_stress (NOT_EVALUATED), sample_counts (train/val/oos
      row counts).'
    - '[must] [action] Design OOSSummary, CostStressResult, RegimeBreakdown, SymbolStability, MHTControls dataclasses — all
      with NOT_EVALUATED constants. Structure mirrors validation_contract.md requirements.'
    - '[must] [action] Verify that NO fake numeric values are defined — every metric field uses NOT_EVALUATED sentinel (a
      dedicated singleton or constant). No 0.0, no 1.0, no default.'
    - '[must] [action] Do NOT implement any code in walk_forward.py in this workspace. Only define contracts/dataclasses in
      contracts.py.'
    allowedFiles:
    - alphaforge/docs/validation_contract.md
    - alphaforge/docs/ai_summary.md
    - alphaforge/docs/ai_summary__v7_alphaforge_xgb.md
    - alphaforge/docs/data_contract.md
    - alphaforge/docs/label_contract.md
