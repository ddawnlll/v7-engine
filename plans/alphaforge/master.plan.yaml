- id: WS-MASTER-02-FINAL
  title: Execute Final Validation Subplan
  objective: Execute Final Validation Subplan
  implementation:
    instructions:
    - '[must] [action] Load and validate subplan plans/alphaforge/09_final_validation.plan.yaml against template.yaml.'
    - '[must] [action] Execute all workspaces defined in the subplan in order.'
    - '[must] [action] Run CMD-final-validation and confirm exit 0.'
    - '[must] [action] Run forbidden file scan — confirm no files in lib/, simulation/engine/, runtime/, interface/, data/,
      datasets/, models/, artifacts/, .github/ were modified.'
    - '[must] [action] Run no-profitability-claim scan across all new code.'
    - '[must] [action] Run no-training scan — confirm no xgboost import or fit() call.'
    - '[must] [action] Emit ACCP report reports/accp/alphaforge_final_validation.accp.yaml.'
    allowedFiles:
    - plans/alphaforge/09_final_validation.plan.yaml
    - reports/accp/**
    forbiddenFiles:
