    requiredEvidence:
    - source
    - test_output
  - id: AC-02-029
    description: 'Cost-aware fields are numerically correct: long_R_net = long_R_gross - total_cost_r_long within 0.0001 R
      tolerance for known-cost fixture'
    level: required
