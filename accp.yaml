accp_onefile_master:
  template_id: ACCP_V2_STRICT_YAML_ONEFILE_MASTER
  template_version: 2.0.1
  accp_version: 2.0.0
  source_format: ACCP-YAML
  status: draft
  generated_at: '2026-06-10T18:08:26.117427+00:00'
  canonical_file: accp_v2_0_package/onefile/accp_v2_0_strict_yaml_onefile_master.accp.yaml
  purpose:
    summary: Strict YAML-only master template for generating one or more ACCP v2.0 reports from all 26 report types.
    examples_remain_examples: true
    production_generation_uses_this_file: true
  authority_boundary:
    reports_are_evidence_only: true
    reports_do_not_authorize_execution: true
    route_signals_are_advisory: true
    compiled_json_is_runtime_input: true
    raw_yaml_is_not_runtime_authority: true
    rendered_markdown_is_human_preview_only: true
  research_source_policy:
    policy_id: DEC-ACCP-RESEARCH-001
    status: LOCKED_INITIAL
    title: Internet-backed source research required for ACCP research prompts
    internet_research_required_for_research_reports: true
    source_usage_required: true
    source_citations_required: true
    minimum_source_count_default: 8
    minimum_source_count_for_small_scope: 3
    retrieval_date_required: true
    source_inventory_required: true
    source_quality_matrix_required: true
    cited_claims_required: true
    applicability_analysis_required: true
    conflicting_evidence_required: true
    allowed_no_internet_exception:
      allowed: true
      required_reason: true
      must_mark_claims_as_unverified: true
      must_emit_missing_evidence_items: true
    preferred_source_types:
    - official_documentation
    - peer_reviewed_paper
    - arxiv_paper
    - conference_paper
    - official_github_repository
    - reputable_engineering_blog
    - benchmark_report
    - standards_documentation
    - vendor_documentation_with_technical_detail
    discouraged_source_types:
    - unsourced_blog_post
    - SEO_content
    - low_quality_medium_post
    - forum_claim_without_evidence
    - vendor_marketing_without_technical_detail
    - social_media_claim_without_primary_source
    required_source_categories_when_relevant:
    - primary_sources_for_core_algorithms
    - recent_sources_for_current_tooling
    - implementation_sources_for_library_behavior
    - risk_sources_for_known_failure_modes
    - finance_or_trading_specific_sources
    - official_api_or_package_docs_for_tool_claims
    citation_rules:
    - Every non-trivial technical claim must cite at least one source.
    - Every algorithm recommendation must cite primary or near-primary sources.
    - Every claim about current library capability, benchmark, pricing, model capability, API behavior, or tool behavior must cite a recent source.
    - If sources disagree, summarize the disagreement and explain which side is more applicable.
    - Do not cite sources that were not actually used.
    - Do not turn academic benchmark success into profitability claims.
    - Do not claim live trading readiness from offline or backtest-only evidence.
    freshness_rules:
    - For model/tool/API/library claims, prefer sources from the last 12 months.
    - For foundational algorithms, older primary papers are acceptable.
    - For trading/finance market-structure claims, prefer recent sources unless the concept is stable.
    - Always include retrieval_date in source_inventory.
    source_quality_schema:
      each_source_must_include:
      - id
      - title
      - author_or_organization
      - url_or_identifier
      - date_published_or_updated
      - retrieval_date
      - source_type
      - relevance_to_task
      - trust_rating
      - limitations
    anti_hallucination_rules:
    - If a source cannot be verified, mark the claim as unverified.
    - If a result does not directly transfer to the target system, explicitly state the transfer limitation.
    - If evidence is academic/backtest-only, do not translate it into production/live profitability.
    - If internet access is unavailable, emit a missing_evidence section and do not claim source-backed confidence.
    applies_to_report_families:
    - feature
    - core
    - coordination
    - writing
    applies_strictly_to_report_types:
    - RIR
    - PIR
    - FER
    - FDR
    - WQR
    - DCR
    applies_conditionally_to_report_types:
    - RCA
    - RAR
    - PRR
    - ECR
    - WDR
    - WER
    does_not_apply_by_default_to:
    - IPR
    - FPR
    - FIR
    - TVR
    - FVR
    - EXR
    - MER
    exception: Implementation and validation reports do not require internet research unless they make claims about external APIs, libraries, package versions, model capabilities, current pricing, current benchmarks, or external documentation.
  generator_input_schema:
    target_report_types:
    - '{{one_or_more_of_26_report_types}}'
    requested_output_mode: '{{single_report_multi_report_chain_selector_only}}'
    plan_id: '{{plan_id}}'
    workspace_id: '{{workspace_id_or_none}}'
    task_summary: '{{task_summary}}'
    repo_context:
      repo_root: '{{repo_root_or_unknown}}'
      git_commit: '{{git_commit_or_unknown}}'
      git_branch: '{{git_branch_or_unknown}}'
      dirty_state: '{{clean_dirty_unknown}}'
    evidence_context:
      inspected_files:
      - '{{path_or_none}}'
      changed_files:
      - '{{path_or_none}}'
      commands_run:
      - command: '{{command_or_none}}'
        cwd: '{{cwd_or_unknown}}'
        exit_code: '{{integer_or_unknown}}'
        output_excerpt: '{{excerpt_or_unknown}}'
      prior_reports:
      - '{{report_ref_or_none}}'
      artifacts:
      - '{{path_or_none}}'
  output_modes:
    single_report:
      description: Generate exactly one ACCP report source YAML.
      target_report_types_count: 1
    multi_report_chain:
      description: Generate multiple independent ACCP report source YAML documents in one chain.
      target_report_types_count: '>=2'
      chain_templates:
        bugfix_full_chain:
        - BSR
        - BRR
        - RCA
        - FPR
        - FVR
        - PRR
        implementation_minimum_chain:
        - IPR
        - TVR
        - PRR
        feature_design_chain:
        - FER
        - FDR
        - FCR
        feature_implementation_chain:
        - FIR
        - FGR
        - PRR
        blocker_chain:
        - HIR
        - DCR
        evidence_bridge_chain:
        - ECR
        - TVR
        - PRR
        execution_trace_chain:
        - EXR
        - MER
        - IPR
        - TVR
        - PRR
    selector_only:
      description: Select report type(s), do not generate final reports.
      selector_output_schema:
        selected_report_types:
        - '{{REPORT_TYPE}}'
        rejected_report_types:
        - report_type: '{{REPORT_TYPE}}'
          reason: '{{reason}}'
        confidence: '{{high_medium_low}}'
        next_step: '{{generate_selected_report_ask_for_context_handoff}}'
  strict_generation_rules:
    forbid_markdown_fences: true
    forbid_markdown_headings: true
    forbid_prose_before_or_after_yaml: true
    forbid_phantom_evidence: true
    forbid_invented_command_results: true
    forbid_invented_hashes: true
    require_unknown_or_not_applicable_instead_of_blank: true
    require_command_evidence_for_validation_claims: true
    require_diff_integrity_for_mutation: true
    require_rollback_plan_for_mutation: true
    require_hir_for_critical_blockers: true
    require_web_research_for_research_reports: true
    require_source_inventory_for_research_reports: true
    require_cited_claims_for_research_reports: true
    require_source_quality_for_research_reports: true
    require_applicability_analysis_for_external_research: true
    forbid_uncited_nontrivial_research_claims: true
    forbid_profitability_claims_from_academic_or_backtest_only_sources: true
    require_unverified_label_when_internet_unavailable: true
