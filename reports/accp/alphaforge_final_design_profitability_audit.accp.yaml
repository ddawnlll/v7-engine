scorecard:
  overall_alphaForge_design_score:
    score: 7.2
    rationale: >
      The hardest parts are genuinely right: authority separation is LOCKED and
      unambiguous (AlphaForge discovers / V7 decides / Simulation measures),
      NO_TRADE is a first-class 4-way comparator with mandatory rejection,
      labels derive from SimulationOutput economic truth (not feature
      heuristics), R-normalized costs are IMPLEMENTED and wired (not planned),
      12 falsifiable rejection rules, XGBoost-first locked, and the advisory
      Policy Critic is correctly scoped (can-downgrade-never-upgrade). This is
      the opposite of an overfit academic toy. BUT two CRITICAL contract
      contradictions flagged by P0.8D as P0.8E blockers are STILL UNFIXED at
      HEAD (gate-mapping drift; multi-source timeframe drift), the
      AlphaForgeLabel schema does not encode the gross/cost/no_trade_quality
      fields its own contract promises, MHT/data-snooping control is absent,
      validation is misaligned to V7 gates (5/3 folds vs 6, HIGH_VOL_* vs
      TREND_*, qualitative symbol stability vs 40%/60%, fee+slippage vs
      +spread+funding), zero jsonschema.validate enforcement exists, zero
      implementation, zero empirical evidence, and the task's claimed
      P0.8E=PASS / P0.9A=PASS / 39-tests is contradicted by the repo. Per
      verdict rules, a present CRITICAL blocker (timeframe contradiction vs
      locked profiles) forces TARGETED_PATCH_REQUIRED regardless of underlying
      design quality. Score 7.2 = promising, needs targeted patch before
      execution; NOT a redesign (no authority violation).
  economic_profitability_potential_score:
    score: 6.5
    rationale: >
      The economic FRAME is excellent and adversarial to fake alpha: net-R
      optimization (not raw directional accuracy), cost-honest labels, NO_TRADE
      as the null hypothesis, per-mode cost-stress gates (SCALP >= 0.10R),
      regime/symbol stability gates, walk-forward OOS, and 8 mandatory
      rejection rules. This maximizes the probability that any surviving edge
      is real. BUT potential != evidence: zero empirical evidence exists, the
      PRIMARY modes (SCALP/AGGRESSIVE_SCALP) have NO simulation tests (only
      SWING golden-tested), the cost model for the highest-frequency
      (most cost-fragile) modes is unverified, the highest-edge-density
      surfaces (AS-001 lead-lag, AS-004 relative strength) are blocked by a
      missing cross-sectional data layer, AGGRESSIVE_SCALP liquidity surfaces
      are blocked by missing order-book/spread data, and funding is DEFERRED.
      Money-making potential is UNKNOWN (no evidence) but the design quality
      that would enable it is strong.
  architecture_cleanliness_score:
    score: 7.5
    rationale: >
      Domain boundaries are clean and LOCKED (lib/simulation/alphaforge/v7/
      runtime/interface/contracts), truth hierarchy explicit
      (simulation > realized > contract > runtime > model), ai_summary pattern
      enforced, contract registry + compatibility.json present. Blemishes:
      two legacy oversized combined docs (ai_summary__v7_alphaforge_xgb.md
      625KB, phase_plans_combined.md 578KB) sit in alphaforge/docs/ with stale
      src/v7/alpha paths and risk agent confusion (phase_plan claims 13 docs
      but 15 exist); Makefile test-all omits simulation/tests/ (drift vs CI and
      CLAUDE.md); and the timeframe stack is defined 4 different ways across
      profitability_thesis / mode_centric_architecture / roadmap /
      data_contract (architecture-consistency blemish). Core architecture is
      sound; the blemishes are navigability/consistency drift, not structural.
  v7_authority_alignment_score:
    score: 8.5
    rationale: >
      Authority separation is LOCKED, explicit, and redundantly enforced across
      discovery_authority.md, handoff_to_v7.md, alphaforge_to_v7.md, and
      decision_log.md. AlphaForge does NOT issue trade decisions
      (discovery_authority.md:11,61-63), does NOT execute live orders, does NOT
      set risk limits, does NOT bypass cost models; V7 retains final authority
      and can reject any handoff; the handoff is a submission not a conclusion;
      model confidence does NOT override risk gates (discovery_authority.md:154);
      AlphaForge has NO direct runtime/interface integration. The only blemish
      is the gate-mapping drift — a CONTRACT/handoff-LABEL bug (AlphaForge
      labels evidence with wrong V7 gate names), NOT an authority violation:
      AlphaForge still does not decide, V7 still decides. It dents the handoff
      contract's integrity but not the authority principle.
  simulation_truth_alignment_score:
    score: 8.0
    rationale: >
      Simulation truth is the strongest part of the system and is IMPLEMENTED,
      not planned: SimulationOutput/ActionOutcome/NoTradeOutcome/PathMetrics
      carry realized_r_gross/net, fee_cost_r, slippage_cost_r, total_cost_r,
      path_metrics.mfe_r/mae_r, 4-way no_trade_quality, best_action,
      action_gap_r, regret_r, is_ambiguous, resolution_status (models.py +
      simulation_output.schema.json); realized_r_net = gross - total_cost_r is
      wired (engine.py); R-normalized cost functions implemented (costs.py);
      NO_TRADE is a real 4-way comparator; funding is properly DEFERRED.
      Blemishes: only SWING is golden-tested (SCALP/AGGRESSIVE_SCALP profiles
      never instantiated in tests), same_candle_ambiguity is computed in
      exits.py but NOT propagated to ActionOutcome, the NO_TRADE AMBIGUOUS
      branch diverges from no_trade_quality.md spec, and regret_r is
      hardcoded to 0.0 (policy_critic/ai_summary.md:84). These are
      patchable simulation-side gaps, not truth-layer flaws.
  label_design_score:
    score: 6.5
    rationale: >
      Label DESIGN intent is strong: labels explicitly derive from
      SimulationOutput economic truth (label_contract.md:9-11), NO_TRADE is a
      first-class mandatory 4-way comparator (label_contract.md:82-91),
      cost-aware gross-vs-net comparison with automatic gross>0/net<0
      rejection (label_contract.md:52-61,104-109), FeatureSetSpec enforces a
      required leakage_policy with purge/embargo/point-in-time subfields. BUT
      the machine-checkable schema FAILS to encode the design:
      alphaforge_label.schema.json drops long_R_gross/short_R_gross, ALL
      R-normalized cost components (fee_cost_r/slippage_cost_r/total_cost_r),
      and no_trade_quality that label_contract.md and
      simulation_to_alphaforge.md promise; simulation_to_alphaforge.json is a
      12-field subset omitting every cost field; label_dataset_spec is too
      loose (empty objects pass); and the timeframe contradiction means labels
      would be generated for horizons the simulation layer does not produce.
      Design promising, encoding broken — needs targeted patch. (Workflow
      read:label_design agent independently scored this 6.2.)
  feature_governance_score:
    score: 6.5
    rationale: >
      FeatureSetSpec leakage_policy is required with concrete subfields
      (purge_window_bars, embargo_policy, point_in_time_verification);
      feature_contract.md documents forbidden future-looking features and
      cross-sectional normalization / target-encoding rules; lib primitives
      are causal (trailing windows only, no lookahead). BUT leakage rules are
      NOT enforced in code (no jsonschema.validate); the 1m/5m (AlphaForge)
      vs 1h (simulation) timeframe mismatch is itself a feature-vs-label
      leakage/misalignment risk; many feature groups named in feature_contract
      are absent from lib (MACD, Bollinger, volume_ratio, OBV, VWAP, ADX,
      cross_sectional_rank, relative_strength, compression_score,
      impulse_score, reversal_pressure); and no cross-sectional / survivorship
      / UTC-grid data layer exists (blocks the highest-edge surfaces).
  model_strategy_score:
    score: 8.0
    rationale: >
      Model strategy is correct and well-reasoned: V7 DEC-004 locks
      XGBoost-first (profitability_thesis.md:250) — the right choice for
      feature-rich, label-sparse, tabular market-state scoring; hybrid
      classification + regression enables dual gates (action probability AND
      expected-R); calibration is treated as a walk-forward/validation problem
      (CalibrationCandidate with ECE/MCE/Brier/reliability/sharpness, status
      CALIBRATED/UNCALIBRATED/UNRELIABLE); deep learning is correctly deferred
      to a challenger/V8 layer; the Policy Critic is correctly scoped as
      advisory offline-RL (IQL + distributional Q-heads on XGBoost quantile
      regressors + conformal, can-downgrade-never-upgrade, staged rollout
      gated on Deflated Sharpe/PBO). Blemish: model_artifact_contract.md:142
      defers model family selection ("determined during implementation"),
      a minor drift from the DEC-004 XGBoost-first lock. No empirical evidence
      yet, which is expected at design stage.
  confidence_calibration_readiness_score:
    score: 6.5
    rationale: >
      Calibration DESIGN is solid: CalibrationCandidate contract specifies
      ECE<0.05 CALIBRATED / ECE>=0.05 UNCALIBRATED / ECE>0.10 UNRELIABLE,
      confidence bins with per-bin deviation, reliability curves; V7 G6 is a
      calibration-reliability gate; recalibration is tied to first walk-forward
      (DEC-020). BUT there is no calibration implementation, no walk-forward
      calibration run, no conformal calibration in AlphaForge (conformal
      appears only in the future Policy Critic doc), threshold tuning is not
      yet wired to walk-forward recalibration in code, and the
      validation_contract misalignment (5/3 folds, HIGH_VOL_* regime,
      qualitative symbol stability) means the calibration validation frame is
      not yet aligned to V7 gates. Design-ready, implementation-absent.
  overfit_resistance_score:
    score: 6.0
    rationale: >
      12 falsifiable rejection rules (alpha_thesis_lifecycle.md:77-91), 6
      overfit risk flags documented (train/OOS gap, fold instability,
      feature/sample ratio, top feature dominance, calibration degradation,
      purge violation), NO_TRADE comparator, cost stress, and walk-forward are
      all required. BUT the biggest false-positive source in a multi-thesis
      discovery system is ABSENT: no multiple-hypothesis-testing / data-snooping
      control (no Bonferroni/FDR/deflated Sharpe) anywhere in AlphaForge
      validation_contract or validation_report schema; walk-forward folds are
      5/5/3 vs V7's required 6; regime taxonomy is HIGH_VOL_* vs V7's
      TREND_UP/DOWN/RANGE/TRANSITION; symbol stability is qualitative vs V7's
      40%/60%; cost stress is fee+slippage vs V7's +spread+funding. A
      candidate passing AlphaForge's current validation could fail V7 G2/G3/
      G4/G5. Not ready without repair.
  implementation_readiness_score:
    score: 4.0
    rationale: >
      The task's current_known_status claims P0.8E=PASS and P0.9A=PASS
      (contract loader, validator, registry helper, frozen mode profiles,
      report builders, V7 handoff builder, report writer, 39 tests). ALL of
      this is ABSENT at HEAD (fad5ccf): alphaforge/src contains only .gitkeep
      (zero Python under alphaforge/), zero alphaforge test files (18 test
      files repo-wide, none for alphaforge), no P0.8E or P0.9A commit in git
      log, no P0.8E/P0.9A report in reports/, working tree clean of relevant
      changes. phase_plan.md:15, ai_summary.md:128, and roadmap.md:89 all mark
      P0.9A as PENDING/Next/"Ready for". Zero jsonschema.validate anywhere —
      all 10 schemas are unenforced paper contracts. Both CRITICAL
      contradictions are still open. This is a false completion claim, not a
      partial delivery. (Workflow read:implementation_readiness agent
      independently scored this 4.0.)
  master_plan_readiness_score:
    score: 6.5
    rationale: >
      Master plan DIRECTION is correct: deterministic-fixture-first (local
      data manifest, simulation-derived label adapter, deterministic feature
      pipeline, non-ML research report path, walk-forward skeleton, V7 handoff
      dry run, ML pilot gate) BEFORE any real model training / real market
      data; no forbidden-authority (lib/simulation/v7/runtime/interface source)
      modification before AlphaForge contracts stabilize; XGBoost-first
      respected in P5; calibration walk-forward in P6; V7 final authority
      preserved in P7. BUT the plan is STALE: phase_plan.md:67 lists P0.9A
      prerequisites as only "P0.8B + P0.8C PASS" and does NOT include the P0.8E
      targeted patch that P0.8D (verdict READY_FOR_P0_9A_AFTER_TARGETED_PATCH)
      required before P0.9A. So executing the plan as-written would start P0.9A
      on top of unfixed CRITICALs, baking the wrong contracts into scaffold
      validators. The plan must be updated to gate P0.9A on a completed P0.8E.

profitability_assessment:
  expected_value:
    qualitative_rating: moderate
    rationale: >
      The design maximizes the probability that any edge which survives the
      pipeline is REAL rather than overfit: cost-honest net-R labels, NO_TRADE
      as the null hypothesis, per-mode cost-stress gates, regime/symbol
      stability, walk-forward OOS, and 8 mandatory rejection rules. This is a
      genuinely adversarial-to-fake-alpha research frame, not an academic toy.
      However expected value is only "moderate" (not strong) because the
      highest-edge-density surfaces (cross-sectional lead-lag AS-001, relative
      strength AS-004) are blocked by a missing cross-sectional data layer,
      AGGRESSIVE_SCALP liquidity surfaces are blocked by missing order-book
      data, the primary modes are untested in simulation, and there is zero
      empirical evidence to date. The frame is right; the data/coverage to
      exploit it is incomplete.
  money_making_potential:
    rating: unknown
    caveat: "No profitability is guaranteed; this is a design/readiness assessment, not live trading evidence."
    rationale: >
      Money-making potential is UNKNOWN because no model has been trained, no
      walk-forward has been run, no OOS edge has been measured, and the primary
      modes have no simulation tests. The design quality that would ENABLE
      profitability is strong, but design quality is not profitability
      evidence. Backtest pass is explicitly not live promotion evidence
      (CLAUDE.md; validation_contract.md:208).
  main_profitability_drivers:
    - "Cost-aware net-R labels + NO_TRADE first-class comparator (implemented in simulation) — the core edge-preservation mechanism that kills cost-fragile candidates early."
    - "Mode-specific timeframes capturing different market structures (SWING trend / SCALP mean-reversion / AGGR_SCALP micro-structure) — once aligned to one canonical stack."
    - "Hybrid classification + regression dual gates (action probability AND expected-R) with calibrated surfaces."
    - "Per-mode independent promotion (G0-G10) — each mode earns its own live eligibility; no cross-mode contamination."
    - "Cross-sectional relative-strength + lead-lag surfaces (AS-001/AS-004) — highest expected edge density, once the cross-sectional data layer exists."
    - "Cost-aware NO_TRADE edge (AS-008) — uses existing cost-honest labels, lowest complexity, highest false-positive-killing value."
  main_profitability_risks:
    - "Cost/slippage can make SCALP and AGGRESSIVE_SCALP net-negative even with good signals (thesis:119-120) — and these primary modes are untested in simulation."
    - "Missing cross-sectional data layer blocks the highest-edge-density surfaces (AS-001, AS-004)."
    - "Missing order-book/spread/depth data blocks AGGRESSIVE_SCALP liquidity surfaces (AS-010) and real cost_proxy features."
    - "Funding DEFERRED blocks perpetual/live scope and the FUNDING_DIVERGENCE alpha (AS-006)."
    - "No MHT/data-snooping control — testing many theses/features inflates apparent edge; the 'best' candidate is likely overfit without FDR/deflated Sharpe."
    - "Survivorship bias — single-symbol BTCUSDT-only fixtures, no point-in-time universe/delisting handling."
    - "Latency feasibility for AGGRESSIVE_SCALP is unmeasurable without order-book/tape data."
  what_must_be_true_for_profitability:
    - "At least one mode must show positive cost-adjusted OOS expectancy surviving V7 G3 cost stress (SCALP >= 0.10R) across 6 walk-forward folds."
    - "Edge must survive NO_TRADE comparison after costs (NO_TRADE must not beat directional)."
    - "Edge must be stable across symbols (no symbol > 40%, no cluster > 60%) and regimes (TREND_UP/DOWN/RANGE/TRANSITION)."
    - "Calibration must be trustworthy enough for policy dual-gates (reliability error within bounds)."
    - "MHT/data-snooping correction must be applied so the surviving candidate is not a multiple-comparison artifact."
    - "Edge must survive shadow (G7) and paper (G8) consistency vs backtest before any tiny-live (G9)."
    - "Funding cost model must be implemented before any perpetual/live promotion."

architecture_assessment:
  strengths:
    - "Domain boundaries LOCKED and clean: lib (primitives) / simulation (truth) / alphaforge (discovery) / v7 (policy) / runtime (lifecycle) / interface (observer) / contracts (schemas)."
    - "Truth hierarchy explicit and enforced: simulation > realized > contract > runtime > model."
    - "ai_summary pattern: every subsystem has a canonical dense-synthesis entry point (CLAUDE.md enforces read-first)."
    - "Contract registry (registry.json) + compatibility.json provide a canonical cross-domain contract list."
    - "Additive-only AlphaForge: no source changes to lib/simulation/v7/runtime/interface required by the plan; AlphaForge is greenfield."
    - "V7 Policy Critic correctly scoped as advisory offline-RL with explicit domain-boundary compliance table (policy_critic/ai_summary.md:67-80)."
  weaknesses:
    - "Two legacy oversized combined docs (625KB + 578KB) in alphaforge/docs/ with stale src/v7/alpha paths risk agent confusion; phase_plan claims 13 docs but 15 exist."
    - "Timeframe stack defined 4 different ways (thesis 1h/15m/4h; mode_centric 30m-1h/15m/4h; roadmap 15m-1h-5m / 1m-or-3m; AlphaForge data_contract 1m-5m / 1m-3m-5m / 1h-4h) — must be reconciled to one canonical anchor."
    - "Makefile test-all omits simulation/tests/ (drift vs CI ci.yml and CLAUDE.md)."
    - "No contract enforcement layer: zero jsonschema.validate anywhere; 10 AlphaForge schemas are unenforced paper contracts."
  authority_separation_status: pass
  comments: >
    Authority separation is the system's strongest attribute — LOCKED,
    explicit, and redundantly enforced. No place was found where AlphaForge
    owns the final trade decision, issues orders, bypasses V7, or lets model
    confidence override risk gates. The gate-mapping drift is a
    contract/handoff-label bug, NOT an authority violation.

model_strategy_assessment:
  recommended_v7_core_model_family: "GBDT / XGBoost (DEC-004 locked) — correct for feature-rich, label-sparse, tabular market-state scoring; also used by the Policy Critic as per-action gradient-boosted quantile regressor."
  regression_classifier_position: "Combine: hybrid classification (LONG/SHORT/NO_TRADE action probability) + regression (expected_R_long_net, expected_R_short_net) enables V7 dual gates (probability gate AND expected-R gate). Model expected_R_LONG_net, expected_R_SHORT_net, bad_trade_probability, NO_TRADE margin, and calibrated confidence SEPARATELY (the design intends this; bad_trade_probability / model_disagreement / recent_prediction_error do not exist yet — Policy Critic HOLDs #5)."
  deep_learning_position: "Defer to V8 / challenger layer for embeddings, regime detection, anomaly detection, or calibration. Do NOT become V7 core before baseline GBDT evidence exists (locked principle)."
  rl_position: "RL / Policy Critic remains a future ADVISORY layer (can-downgrade-never-upgrade), never the final authority. The V7 Policy Critic design (IQL + distributional Q-heads + conformal, staged v1-v4 rollout gated on Deflated Sharpe/PBO) is correct and well-reasoned; live veto in SWING only (LOCKED_INITIAL_BASELINE), SCALP/AGGRESSIVE_SCALP shadow-only (HOLD)."
  rationale: >
    GBDT/XGBoost is the correct first production model family for this problem
    shape and is locked by DEC-004. Hybrid regression+classification is the
    right architecture for dual policy gates. Deep learning and RL are
    correctly positioned as future/challenger/advisory, not core/authority.
    The Policy Critic doc is unusually disciplined: lowest authority in the
    truth hierarchy, hard-gate failure always wins, NO_TRADE first-class in
    the reward, 10 honest open HOLDs, empirical release gates per stage.

