- id: WS-08-TESTS
  title: Create Comprehensive ML Pilot Gate Tests
  objective: Create Comprehensive ML Pilot Gate Tests
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/tests/test_ml_pilot_gate.py. Test PASS verdict: mock all 9 conditions (8 prereqs
      + no-xgboost) to return True. Verify GateVerdict.PASS and get_failed_prerequisites() empty.

      '
    - '[must] [action] Test HOLD verdict: mock non-critical prerequisites (label adapter, feature pipeline) to return False,
      critical prerequisites pass. Verify GateVerdict.HOLD and get_failed_prerequisites() has correct entries with prereq_id,
      description, missing_evidence.

      '
    - '[must] [action] Test FAIL verdict: mock critical prerequisite (data manifest) to return False. Verify GateVerdict.FAIL
      even if others pass. Test FAIL takes precedence over HOLD when both types fail simultaneously.

      '
    - '[must] [action] Test blocking report for HOLD: verify overall_status correct, failed_prerequisites non-empty, each
      entry has release_condition, required_subplan_ref, required_accp_report. Actions ordered by priority. Test FAIL report:
      summary has "CRITICAL PREREQUISITE MISSING", first action is subplan 01 re-execution. Test PASS report: overall_status
      "READY", empty failed_prerequisites.

      '
    - '[must] [action] Test no-xgboost guard: mock importlib.util.find_spec to return non-None. Verify importing ml_pilot
      raises ImportError with "EXPLICIT_XGBOOST_BLOCK". Verify check_no_xgboost_in_environment() returns False, triggering
      FAIL verdict.

      '
    - '[must] [action] Test non-bypassability and determinism: verify check_all_prerequisites() accepts only registry parameter
      (no override/skip/whitelist/env-var). Create two identical registries, call twice, verify same verdict. Repeat for PASS,
      HOLD, and FAIL scenarios.

      '
    - '[must] [action] Test all 9 individual prerequisite check functions with mock filesystem checks. For each: True path
      (all conditions met) and False path (specific condition missing). Document which evidence each check requires.

      '
    - '[must] [action] Create integration/tests/test_alphaforge_ml_pilot.py: verify ml_pilot module importable (no xgboost),
      PrerequisiteRegistry has all 9 entries, each condition function callable, BlockingReport JSON round-trips correctly
      via to_dict()/to_json().

      '
    - '[must] [action] Run CMD-test-alphaforge, CMD-test-integration-alphaforge, CMD-no-xgboost-scan. All must exit 0. All
      tests pass with no failures, no errors, no skipped.

      '
    allowedFiles:
    - alphaforge/tests/**
    - integration/tests/test_alphaforge_*.py
    - alphaforge/src/alphaforge/gates/**
    forbiddenFiles:
    - alphaforge/src/alphaforge/training/**
    - alphaforge/src/alphaforge/models/**
    - alphaforge/src/alphaforge/inference/**
    - lib/**
    - simulation/engine/**
    - runtime/**
    - interface/**
    - data/**
    - datasets/**
    - models/**
    dependencies:
    - WS-08-PREREQUISITES
    - WS-08-VERDICT
    - WS-08-BLOCKING-REPORT
    - WS-08-NO-XGBOOST
