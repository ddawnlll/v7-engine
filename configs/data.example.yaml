# =============================================================================
# V7 Engine — Data Configuration (example)
# =============================================================================
# Copy to configs/data.yaml and customise.
#
#   cp configs/data.example.yaml configs/data.yaml
# =============================================================================

# ── Default symbols (20 high-liquidity Binance USDT pairs) ───────
symbols:
  # Layer 1 — Majors (BTC + ETH)
  - BTCUSDT
  - ETHUSDT
  # Layer 2 — Large Caps
  - BNBUSDT
  - SOLUSDT
  - XRPUSDT
  - ADAUSDT
  - DOGEUSDT
  - AVAXUSDT
  - DOTUSDT
  - LINKUSDT
  # Layer 3 — Mid Caps
  - MATICUSDT
  - UNIUSDT
  - ATOMUSDT
  - LTCUSDT
  - APTUSDT
  - ARBUSDT
  - OPUSDT
  - NEARUSDT
  - INJUSDT
  - RNDRUSDT

# ── Timeframe intervals (all mode intervals) ──────────────────────
intervals:
  - 5m
  - 15m
  - 1h
  - 4h
  - 1d

# ── Lookback configuration ────────────────────────────────────────
lookback:
  # Number of bars to fetch per interval
  bars: 1000
  # Fallback start date if bars-based range cannot be determined
  start: "2024-01-01"

# ── Data storage ──────────────────────────────────────────────────
storage:
  # Root directory for raw market data
  root: "./data/market"
  # Format: parquet | csv
  format: parquet
