- id: WS-07-GATE-MAPPING
  title: Implement validate_gate_mapping() — Canonical Gate Name Validation
  objective: Implement validate_gate_mapping() — Canonical Gate Name Validation
  implementation:
    instructions:
    - '[must] [action] Implement validate_gate_mapping(gate_mapping: dict) -> bool. The function must verify that exactly
      11 keys exist in gate_mapping: G0_doc_ready, G1_research_backtest, G2_walk_forward_oos, G3_cost_stress, G4_regime_breakdown,
      G5_symbol_stability, G6_calibration_reliability, G7_shadow, G8_paper, G9_tiny_live, G10_live. These gate IDs must match
      CANONICAL_V7_GATES from constants.py exactly.

      '
    - '[must] [action] If any canonical gate is missing, raise GateMappingError(message=f"Missing canonical V7 gate: {missing_gate}").
      The error must list ALL missing gates if multiple are absent.

      '
    - '[must] [action] If extra/unknown gate keys are present (e.g., old AlphaForge-invented names like G0_data_quality, G1_feature_validity,
      etc.), raise GateMappingError(message=f"Unknown gate(s) in mapping: {unknown_gates}. Use canonical V7 gate IDs from
      handoff_to_v7.md."). The error must list ALL unknown gate names found.

      '
    - '[must] [action] Each gate entry must be a dict with exactly keys ''evidence_ref'' (str) and ''status'' (str enum: PASS,
      PENDING, NOT_EVALUATED). Raise GateMappingError for any gate entry missing required keys or with invalid status values.

      '
    - '[must] [action] Reference CANONICAL_V7_GATES from alphaforge.constants — do NOT hardcode gate name strings inline.
      The canonical list is the single source of truth.

      '
    - '[must] [action] Define GateMappingError as a new exception class in alphaforge/errors.py (or in handoff module if errors
      module not accessible). Must inherit from AlphaForgeError or base Exception with an appropriate message.

      '
    allowedFiles:
    - alphaforge/src/alphaforge/handoff/**
    - alphaforge/src/alphaforge/constants.py
    - alphaforge/docs/handoff_to_v7.md
    - contracts/schemas/alphaforge/v7_handoff_package.schema.json
    forbiddenFiles:
    - alphaforge/tests/**
    - integration/tests/**
    dependencies:
    - WS-07-INPUT-CONTRACT
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-07-GM-01
    description: 'validate_gate_mapping() returns True when input has exactly 11 keys matching CANONICAL_V7_GATES: G0_doc_ready,
      G1_research_backtest, G2_walk_forward_oos, G3_cost_stress, G4_regime_breakdown, G5_symbol_stability, G6_calibration_reliability,
      G7_shadow, G8_paper, G9_tiny_live, G10_live — each with evidence_ref (str) and status (PASS|PENDING|NOT_EVALUATED).'
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - test_output
    requiredEvidence:
    - test_output
  - id: AC-07-GM-02
    description: validate_gate_mapping() raises GateMappingError listing all missing gates when G4_regime_breakdown and G7_shadow
      are absent from mapping.
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: test_output
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - test_output
    requiredEvidence:
    - test_output
  - id: AC-07-GM-03
    description: validate_gate_mapping() raises GateMappingError listing all unknown gate names when old AlphaForge-invented
      gates (G0_data_quality, G1_feature_validity, G2_label_validity, G3_model_sanity, G4_oos_performance, G5_cost_resilience,
      G6_regime_robustness, G7_stability, G8_calibration, G9_no_trade_baseline, G10_paper_shadow) are present.
