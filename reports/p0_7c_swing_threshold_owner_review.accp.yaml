    SWING, V7'nin birincil implementasyon hedefidir. En geniş zaman dilimi (4h),
    en düşük no-trade tendency, ve en köklü edge thesis'e sahiptir. SWING
    threshold'larının owner-reviewed baseline olarak locklanması, first
    implementation'ın başlaması için yeterli kesinliği sağlar.
  conservative_baseline_not_permanent_truth: >
    Bu değerler empirical truth değil, conservative implementation baseline'dır.
    İlk SWING walk-forward sonrası tüm threshold'lar recalibration'a tabidir.
  no_scalp_aggressive_lock_without_data: >
    SCALP ve AGGRESSIVE_SCALP için empirik veri olmadan threshold locklamak
    fake precision üretir. Bu mode'lar research edilebilir ancak promotion
    threshold logic'i implemente edilemez.
  funding_deferred_hold_preserved: >
    Funding cost DEFERRED olduğu sürece perpetual swap live promotion blocked'dır.
    Bu hold spot-only SWING implementation'ını engellemez.

