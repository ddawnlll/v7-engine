  objective: >
  Implement a deterministic adapter that converts existing simulation truth
  payloads or fixtures into AlphaForge label dataset records without modifying
  simulation engine code.
  implementation:
  instructions:
  - "Consume simulation-like fixture payloads or existing SimulationOutput-shaped records."
  - "Produce AlphaForge label records with long/short/no_trade references, gross/net R, cost fields, exit reason, funding_status, and no_trade_quality."
  - "Funding must remain DEFERRED unless explicitly supplied by future simulation support."
  - "Reject labels without simulation lineage."
  - "Do not modify simulation contracts or engine."
