planSpecVersion: 0.1.0
kind: ImplementationPlan
profile: praxis-v0.1
metadata:
  planId: ALPHAFORGE-MASTER
  title: AlphaForge P0.9B/P0.9C/P1.0 — Master Orchestration Plan
  description: 'Master orchestrator for the AlphaForge deterministic implementation pipeline. This plan does NOT contain implementation
    instructions for individual modules. It gates and sequences 10 subplans (00-baseline through 09-final). Execution of subplans
    is ordered, gated, and evidence-backed. No model training, no live trading, no profitability claims. All work is fixture-only
    and deterministic.

    '
  createdAt: '2026-06-23T00:00:00Z'
  humanId: AlphaForge
  status: completed
  completedAt: '2026-06-25T00:00:00Z'
  completionEvidence:
    totalTestsPassed: 818
    totalTestsFailed: 0
    totalTestsSkipped: 1
    subplansCompleted: 10
    subplansTotal: 10
    finalVerdict: COMPOSITE_PASS
    accpReport: reports/accp/alphaforge_final_validation.accp.yaml
authority:
  executor: ClaudeCode
  completionAuthority: PraxisTruthKernel
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: imported_human
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false
workspace:
  root: .
  allowedFiles:
  - alphaforge/src/**
  - alphaforge/tests/**
  - contracts/fixtures/alphaforge/**
  - integration/tests/test_alphaforge_*.py
  - plans/alphaforge/00_baseline_verify.plan.yaml
  - plans/alphaforge/01_data_manifest.plan.yaml
  - plans/alphaforge/02_label_adapter.plan.yaml
  - plans/alphaforge/03_feature_pipeline.plan.yaml
  - plans/alphaforge/04_dataset_assembler.plan.yaml
  - plans/alphaforge/05_non_ml_research_report.plan.yaml
