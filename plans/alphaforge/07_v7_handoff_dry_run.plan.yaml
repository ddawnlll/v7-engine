tasks:
- id: WS-07-INPUT-CONTRACT
  title: Define Dry Run Input Contract — ModeResearchReport and ValidationReport Field Mapping
  objective: Define Dry Run Input Contract — ModeResearchReport and ValidationReport Field Mapping
  implementation:
    instructions:
    - '[must] [action] Read alphaforge/docs/handoff_to_v7.md and contracts/mappings/alphaforge_to_v7.md to identify all mapping
      rules from AlphaForge reports to V7HandoffPackage fields.

      '
    - '[must] [action] Define INPUT_CONTRACT_MAP: a frozen dict mapping ModeResearchReport fields to V7HandoffPackage fields.
      Required ModeResearchReport fields: report_id, mode, mode_priority, report_type, data_scope (symbols, primary_timeframes,
      date_range_start, date_range_end), feature_set_refs, label_dataset_refs, alpha_theses (list of {alpha_thesis_id, status,
      evidence_quality}), validation_summary (validation_report_id, fold_count, verdict, overfit_risk), metrics (oos_expectancy_r,
      oos_sharpe, oos_trade_count, oos_win_rate, oos_profit_factor, oos_max_drawdown_r, per_fold_metrics), cost_stress (baseline_fee_pct,
      baseline_slippage_pct, combined_stress_edge_survives, fee_stress_levels, slippage_stress_levels, break_even_cost_total_pct),
      no_trade_comparison (active_beats_no_trade, summary, long_vs_no_trade, short_vs_no_trade), regime_breakdown (regimes
      array with {regime, sample_pct, oos_expectancy_r, edge_present}, edge_only_in_rare_regime, summary), verdict (REJECT/CONTINUE_RESEARCH/CANDIDATE_FOR_V7_GATES/BASELINE_VALID/
      BASELINE_WEAK), blocked_scopes, limitations, recommended_actions, v7_gate_readiness (gates_mapped, gates_not_ready,
      overall_readiness), multiple_hypothesis_control (tested_hypothesis_count, correction_method, data_snooping_risk_flag,
      deflated_sharpe_or_equivalent, pbo_or_backtest_overfit_risk, trial_count_disclosure, rejected_candidate_count, blocking_hold).

      '
    - '[must] [action] Define VALIDATION_REPORT_INPUT_MAP: a frozen dict mapping ValidationReport fields to V7HandoffPackage
      fields. Required ValidationReport fields: validation_report_id, mode, alpha_candidate_id, model_artifact_id, split_policy
      (train_pct, validation_pct, oos_pct, purge_window_bars, embargo_policy, chronological_split), walk_forward_folds (fold_count
      >= 6, fold_type anchored/rolling, folds array with {fold_number, train_start, train_end, test_start, test_end, train_sharpe,
      test_sharpe, test_expectancy_r, test_win_rate, test_trade_count}), oos_summary (oos_expectancy_r, oos_sharpe, oos_win_rate,
      oos_trade_count, oos_positive_expectancy, oos_max_drawdown_r, oos_profit_factor, fold_stability_score), symbol_stability
      (symbols_tested, symbol_count, max_single_symbol_concentration <= 0.40, max_cluster_concentration <= 0.60, single_symbol_limitation,
      cross_symbol_metric_variance), regime_breakdown (regimes array with {regime: TREND_UP/TREND_DOWN/RANGE/TRANSITION, sample_pct,
      oos_expectancy_r, oos_sharpe, edge_present}, edge_only_in_rare_regime, rare_regime_untradeable), cost_stress (baseline_fee_pct,
      baseline_slippage_pct, baseline_spread_pct, fee_stress_edge_survives, slippage_stress_edge_survives, spread_stress_edge_survives,
      combined_stress_edge_survives, break_even_cost_total_pct, cost_edge_destroyed, scalp_cost_adjusted_expectancy_r >= 0.10R
      for SCALP, funding_deferred_block {funding_deferred: bool, block_reason, affected_scopes}), no_trade_comparison (active_beats_no_trade,
      long_better_than_no_trade, short_better_than_no_trade, saved_loss_r, missed_opportunity_r, summary), overfit_risk_flags
      (overfit_risk_overall LOW/MEDIUM/HIGH/CRITICAL, train_oos_gap, fold_instability, feature_to_sample_ratio, top_feature_dominance,
      calibration_degradation, purge_violation_detected), multiple_hypothesis_control (tested_hypothesis_count >= 1, correction_method
      FDR/Bonferroni/Deflated_Sharpe/PBO/ NONE_APPLIED, corrected_significance, false_discovery_control, data_snooping_risk_flag,
      pbo_or_backtest_overfit_risk, trial_count_disclosure, rejected_candidate_count, blocking_hold), calibration_gate_alignment
      (calibration_candidate_id, ece, mce, confidence_bin_count, reliability_within_bounds, calibration_status CALIBRATED/UNCALIBRATED/UNRELIABLE),
      verdict (PASS/PASS_WITH_LIMITATIONS/FAIL_OVERFIT/ FAIL_COST/FAIL_REGIME/FAIL_OOS/FAIL_MHT/INCONCLUSIVE), limitations,
      created_at.

      '
    - '[must] [action] Define the DryRunInput namedtuple/dataclass: {mode (SCALP/AGGRESSIVE_SCALP/SWING), mode_research_report
      (dict matching mode_research_report.schema.json), validation_report (dict matching validation_report.schema.json), handoff_package_id
      (str | None), alpha_candidate_id (str | None), model_artifact_id (str | None), calibration_candidate_id (str | None)}.

      '
    - '[must] [action] Write the MODE_RESEARCH_REPORT_REQUIRED_FIELDS and VALIDATION_REPORT_REQUIRED_FIELDS constants as frozensets
      derived from their respective JSON schemas. Use these for structural validation before assembly.

      '
    - '[must] [action] Do NOT read or modify any files under alphaforge/src/** or alphaforge/tests/**. This workspace defines
      the contract only — it references allowed docs and schemas.

      '
    allowedFiles:
    - alphaforge/docs/handoff_to_v7.md
    - contracts/schemas/alphaforge/mode_research_report.schema.json
    - contracts/schemas/alphaforge/validation_report.schema.json
    - contracts/schemas/alphaforge/v7_handoff_package.schema.json
    - contracts/mappings/alphaforge_to_v7.md
    - alphaforge/src/alphaforge/handoff/__init__.py
    forbiddenFiles:
    - alphaforge/src/**
    - alphaforge/tests/**
    - integration/tests/**
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-07-IC-01
    description: 'INPUT_CONTRACT_MAP is a frozen dict with keys for every ModeResearchReport field consumed by V7HandoffPackage:
      report_id maps to mode_research_report_id, mode maps to mode, data_scope.symbols maps to lineage.data_refs, feature_set_refs
