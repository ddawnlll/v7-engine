      chronological folds per validation_contract.md, produces per-fold metrics,
      and generates a ValidationReport. The skeleton is structural: it defines
      the split policy, fold iteration, and report structure but does NOT train
      models inside folds. Folds are populated with placeholder metrics
      (NOT_EVALUATED) until model training is available.
