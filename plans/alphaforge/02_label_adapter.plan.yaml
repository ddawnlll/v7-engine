- id: WS-02-NO-TRADE-TESTS
  title: Test NO_TRADE Quality Classification and Best Action Labels
  objective: Test NO_TRADE Quality Classification and Best Action Labels
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/tests/test_label_adapter_no_trade.py. Write a test for each of the 4 NO_TRADE quality
      categories using crafted no_trade_outcome fixture dicts. CORRECT_NO_TRADE test: was_correct_skip=True, saved_loss_score
      low, missed_opportunity_score low. SAVED_LOSS test: saved_loss_score high, missed_opportunity_score low. MISSED_OPPORTUNITY
      test: saved_loss_score low, missed_opportunity_score high. AMBIGUOUS_NO_TRADE test: scores within ambiguity margin or
      conflicting signals. Verify classify_no_trade_quality() returns the exact expected string for each case.

      '
    - '[must] [action] Write tests for all 4 best_action_label values: LONG_NOW, SHORT_NOW, NO_TRADE, AMBIGUOUS_STATE. Use
      minimal but valid SimulationOutput fixture dicts with best_action set to each value. Verify adapt_simulation_output()
      sets best_action_label correctly in the output. Verify that best_action_after_cost is also populated when cost fields
      are present.

      '
    - '[must] [action] Write a deterministic output test: call adapt_simulation_output() twice with the identical SimulationOutput
      fixture dict and assert the two AlphaForgeLabel dicts are equal (deep equality). Run with multiple fixture variants
      (different modes, different symbols, edge-case values). This must pass with identical bit-for-bit output.

      '
    - '[must] [action] Write tests for label_validity filtering: create SimulationOutput fixture variants with resolution_status
      COMPLETE (expect valid), UNRESOLVED (expect invalid), INVALIDATED (expect invalid). Create a variant with is_ambiguous
      True (expect ambiguous_excluded). Verify adapt_simulation_output() still produces output for all cases but sets label_validity
      correctly.

      '
    - '[must] [action] Test NO_TRADE quality when no_trade_outcome has edge-case values: zero scores, negative scores (if
      allowed), missing optional fields. Verify classify_no_trade_quality() handles these gracefully without crashing and
      returns a valid enum value.

      '
