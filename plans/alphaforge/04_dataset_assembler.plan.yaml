commands:
  exactAllowedCommands:
  - id: CMD-04-discover-git-status
    kind: discovery
    command: git status --porcelain
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 30
    noTestsFoundIsFailure: false
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-04-test-assembler
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_dataset_assembler.py alphaforge/tests/test_dataset_lineage.py
      -q -v
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true
  - id: CMD-04-test-writer
    kind: targeted_test
    command: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/test_dataset_writer.py -q -v
    cwd: .
    evidenceRequired: true
    timeoutSeconds: 120
    noTestsFoundIsFailure: true
    watchModeForbidden: true
    expectedExitCode: 0
    networkAllowed: false
    shellAllowed: true

  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
  - id: DCMD-04-no-curl
    command: curl
    pattern: ^curl\s
    reason: No external network calls during deterministic dataset assembler implementation.
  - id: DCMD-04-no-wget
    command: wget
    pattern: ^wget\s
    reason: No external downloads.
  - id: DCMD-04-no-exchange
    command: exchange/live pattern
    pattern: binance|exchange|api_key|live_order|create_order|market_order
    reason: No exchange or live trading behavior.
  - id: DCMD-04-no-xgboost
    command: xgboost model training
    pattern: xgboost|XGBClassifier|XGBRegressor|fit\(|import xgboost
    reason: No model training in dataset assembler scope.
evidence:
  ledgerRequired: true
  requiredEvidenceTypes:
  - diff
  - source
  - wiring
  - command
  - test_output
  - schema_validation
  - report
  hashWhenAvailable: true
gates:
  sequence:
  - SchemaGate
  - LockGate
  - EvidenceGate
  - WiringGate
  - ExecGate
  - FinalGate
  verdicts:
  - PASS
  - HOLD
  - FAIL
  reasonCodes:
    SchemaGate:
    - PLAN_SCHEMA_INVALID
    - UNKNOWN_TOP_LEVEL_KEY
    - TASK_SCHEMA_INVALID
    LockGate:
    - PLAN_NOT_LOCKED
    - ACCEPTANCE_CRITERIA_HASH_MISSING
    - COMMAND_POLICY_HASH_MISSING
    EvidenceGate:
    - REQUIRED_EVIDENCE_MISSING
    - COMMAND_OUTPUT_MISSING
    - PHANTOM_EVIDENCE_DETECTED
    - PROFITABILITY_CLAIM_WITHOUT_EVIDENCE
    WiringGate:
    - ORPHAN_MODULE
    - EXPORT_SURFACE_MISSING
    - USAGE_PROOF_MISSING
    - FORBIDDEN_IMPORT_BOUNDARY
    ExecGate:
    - TEST_COMMAND_FAILED
    - NO_TESTS_FOUND
    - FORBIDDEN_COMMAND_USED
    - NETWORK_USED_WHEN_FORBIDDEN
    FinalGate:
    - FINAL_VALIDATION_FAILED
    - REMAINING_REQUIRED_CRITERIA
    - REPORT_MISSING
    - HOLD_REQUIRES_REPAIR_PACKET
repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 3
  reverifyCommand: PYTHONPATH=alphaforge/src:. python3 -m pytest alphaforge/tests/ integration/tests/test_alphaforge_*.py
    -q
  repairPacketFormat:
    json: true
    markdown: true
locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: plans/alphaforge/alphaforge-04-dataset-assembler.lock.json
  hashes:
  - planHash
  - acceptanceCriteriaHash
  - artifactPolicyHash
  - integrationContractHash
  - commandPolicyHash
  - allowedFilesHash
  - forbiddenFilesHash
reports:
  protocol: ACCP
  artifactDirectory: reports/accp
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
