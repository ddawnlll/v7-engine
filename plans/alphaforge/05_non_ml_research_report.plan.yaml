    - '[must] [action] Test analyze_label_distribution with a fixture of 100 mock labels (40 LONG, 30 SHORT, 20 NO_TRADE,
      10 AMBIGUOUS). Verify percentages: 40.0, 30.0, 20.0, 10.0. Verify best_action_counts has correct keys and counts. Verify
      label_validity_distribution maps each validity to correct count.'
