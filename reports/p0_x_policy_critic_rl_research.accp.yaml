overall_verdict:
  verdict: "LOCK_CANDIDATE"
  confidence: "high"
  rationale: >
    The research is grounded in real codebase files (V6 inference engine,
    AlphaForge XGBoost scorer, Simulation cost model, Contracts registry)
    and current literature (IQL, CQL, QR-DQN, conformal prediction, FQE,
    Deflated Sharpe, FinRL surveys). The IQL recommendation is structurally
    justified for small-data/OOD-prone trading: in-sample-only updates
    eliminate the dominant offline-RL failure mode (OOD overestimation) by
    construction. The advisory-only, hard-gate-never-override constraint
    aligns with V7's domain boundaries (simulation > realized > contract >
    runtime > model). However, ten open HOLDs remain (replay buffer,
    regret_r, funding_cost_r, per-direction expected_R, non-existent
    features, conformal exchangeability, contract registrations, greenfield
    deployment path, numeric hyperparameters) — all must be resolved before
    locking the design.
  unverified_claims:
    - "Conformal prediction coverage holds on held-out trading data"
    - "IQL expectile tau ~0.7-0.8 optimal for this data scale"
    - "XGBoost quantile regression scales to ~10^6 training transitions"
    - "Replay buffer build cost and timeline"
findings:
  - id: "F-001"
    category: "codebase_reality"
    severity: "critical"
    title: "v7/src/ is empty — V7 policy code is greenfield"
    detail: "The v7-engine repo's v7/src/ directory contains only .gitkeep. The live decision path runs through the V6 inference engine in /home/erfolg/src/trading-bot/v6/. Policy critic design must account for this interim state."
  - id: "F-002"
    category: "codebase_reality"
    severity: "critical"
    title: "Replay buffer does not exist"
    detail: "grep for replay_buffer|offline_rl|experience_buffer|policy_critic across all .py files returns zero source hits. The (state, action, realized_r_net, mae_r, next_state) tuple emitter must be built from scratch. Blocks v2/v3."
  - id: "F-003"
    category: "codebase_reality"
    severity: "high"
    title: "Fields in user spec that do not exist"
    detail: "no_trade_margin (is a config key, not a field), bad_trade_probability (must be synthesized), model_disagreement (closest: deterministic_disagreement_reason), recent_prediction_error (closed-loop only), recent_drawdown (use mae_r proxy), cost_bps/slippage_estimate (simulation-side only)"
  - id: "F-004"
    category: "codebase_reality"
    severity: "high"
    title: "Simulation-to-runtime cost model parity divergence"
    detail: "The runtime/services/historical_simulation_engine.py uses separate fee_bps/slippage_bps from the authoritative /simulation engine (engine.py). The critic MUST train on /simulation realized_r_net, not the runtime engine's, to avoid reward signal drift."
  - id: "F-005"
    category: "research"
    severity: "info"
    title: "IQL is the recommended primary method"
    detail: "IQL's in-sample-only expectile regression structurally prevents OOD overestimation — the dominant offline-RL failure mode in finance. CQL is runner-up for cross-check only. Decision Transformer is data-hungry. BCQ's CVAE is brittle on small samples."
