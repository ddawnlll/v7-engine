      evidence_ref, verdict maps to recommended_status decision input, blocked_scopes maps to blocked_scopes, limitations
      maps to limitations, overall_readiness maps to recommended_status decision input, multiple_hypothesis_control maps to
      G0_doc_ready evidence_ref.'
