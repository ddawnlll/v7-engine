- id: WS-07-DRY-RUN-BUILDER
  title: Implement run_handoff_dry_run() — Assemble V7HandoffPackage via P0.9A Builder
  objective: Implement run_handoff_dry_run() — Assemble V7HandoffPackage via P0.9A Builder
  implementation:
    instructions:
    - '[must] [action] Implement run_handoff_dry_run(dry_run_input: DryRunInput) -> dict. This is the main entry point. It
      consumes a DryRunInput containing ModeResearchReport and ValidationReport dicts, plus optional override IDs (handoff_package_id,
      alpha_candidate_id, model_artifact_id, calibration_candidate_id).

      '
    - '[must] [action] Internally call validate_input_reports() to verify structural completeness of both report skeletons.
      Raise InputContractError if validation fails before any assembly.

      '
    - '[must] [action] Build the gate mapping for all 10 canonical gates using _make_gate_entry() with status=''NOT_EVALUATED''.
      Evidence refs should be populated from the report skeletons: G0 maps to data_scope + authority docs reference, G1 maps
      to ModeResearchReport metrics, G2 maps to ValidationReport oos_summary + walk_forward_folds, G3 maps to ValidationReport
      cost_stress, G4 maps to ValidationReport regime_breakdown, G5 maps to ValidationReport symbol_stability, G6 maps to
      ValidationReport calibration_gate_alignment, G7/G8/G9/G10 map to infrastructure-not-yet-built messages.

      '
    - '[must] [action] Call validate_gate_mapping() on the assembled gate mapping BEFORE calling the P0.9A builder. If validation
      fails, raise GateMappingError and abort — do not produce a partial package.

      '
    - '[must] [action] Call builders.build_v7_handoff_package(mode=mode, handoff_package_id=pid, alpha_candidate_id=acid,
      mode_research_report_id=mrid, validation_report_id=vrid, model_artifact_id=maid, calibration_candidate_id=ccid, recommended_status=status)
      from alphaforge.handoff.builders. Do NOT duplicate assembly logic already in builders.py. Provide the assembled gate_mapping
      as an override if the builder supports it; otherwise, post-process the returned package to replace the gate_mapping
      with the one assembled from report evidence.

      '
    - '[must] [action] After assembly, validate the complete output payload against v7_handoff_package.schema.json using alphaforge.contracts.validator.
      Raise HandoffBuildError if validation fails with the list of errors.

      '
    - '[must] [action] Populate blocked_scopes from both report skeletons: copy ModeResearchReport.blocked_scopes and ValidationReport
      symbol_stability.single_symbol_limitation info. Add standard dry-run blocking scopes: hedging/shared/shadow-disabled.

      '
    allowedFiles:
    - alphaforge/src/alphaforge/handoff/**
    - alphaforge/src/alphaforge/constants.py
    - alphaforge/src/alphaforge/errors.py
    - contracts/schemas/alphaforge/v7_handoff_package.schema.json
    forbiddenFiles:
    - alphaforge/tests/**
    - integration/tests/**
    dependencies:
    - WS-07-GATE-MAPPING
  artifactPolicy:
    class: library_code
    wiringRequired: true
    reachabilityRequired: true
    executionRequired: true
    deterministicEvidenceRequired: true
  acceptanceCriteria:
  - id: AC-07-DRB-01
    description: 'run_handoff_dry_run(dry_run_input) returns a dict that validates against v7_handoff_package.schema.json
      with all 13 required root keys present: schema_version (str), handoff_package_id (str), mode (enum SCALP|AGGRESSIVE_SCALP|SWING),
      alpha_candidate_id (str), mode_research_report_id (str), validation_report_id (str), model_artifact_id (str), calibration_candidate_id
      (str), v7_gate_mapping (object with 11 required gate keys), recommended_status (enum REVIEW_REQUIRED|SHADOW_READY|PROMOTION_CANDIDATE),
      blocked_scopes (array of strings), limitations (array of strings), lineage (object with required keys data_refs, feature_set_id,
      label_dataset_id, simulation_profile_id, lineage_verified).'
    level: required
    humanApproved: true
    criteriaSource: imported_human
    verification:
      type: schema_validation
      deterministic: true
      canSatisfyFinalGate: false
      advisoryOnly: false
      evidenceRefs:
      - schema_validation
    requiredEvidence:
    - schema_validation
