  title: Negative tests — invalid joins, missing timestamps/symbols, label_validity filtering, data leakage, lineage integrity,
    checksum stability, roundtrip determinism
  objective: Negative tests — invalid joins, missing timestamps/symbols, label_validity filtering, data leakage, lineage integrity,
