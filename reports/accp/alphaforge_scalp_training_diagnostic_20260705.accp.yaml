accp_version: "2.0.0"
source_format: "ACCP-YAML"
result:
  status: "HOLD"
  summary: "AlphaForge SCALP training results are not trustworthy alpha evidence because the current training harness has feature/label alignment, chronological WFV, and active-trade metric defects."
scope_confirmation:
  task_type: "diagnostic_audit"
  subsystem: "AlphaForge"
  source_code_modified: false
  docs_modified: true
files_changed:
  - "v7/docs/roadmap.md"
  - "reports/accp/alphaforge_scalp_training_diagnostic_20260705.accp.yaml"
decisions_locked:
  - "Do not treat the inspected alphaforge.train SCALP output as evidence that no profitable alpha exists."
  - "Block SCALP profitability/threshold claims from this training harness until alignment, chronological WFV, and active-trade metrics are repaired."
remaining_holds:
  - hold: "Feature/label alignment across symbol boundaries"
    release_condition: "Trim or assemble features per symbol to the same label horizon before concatenation, or build timestamp-keyed rows with tests proving symbol-boundary alignment."
  - hold: "Chronological panel walk-forward validation"
    release_condition: "Use timestamp-major panel folds with purge/embargo by time and symbol-aware validation slices."
  - hold: "Model-selected active-trade economics"
    release_condition: "Compute OOS expectancy/Sharpe from predicted LONG/SHORT actions only; account for NO_TRADE separately."
  - hold: "Positive-control gate"
    release_condition: "A deterministic feature-derived label positive-control must beat baseline OOS before real alpha runs are accepted."
safe_next_step: "Repair the dataset assembly and WFV harness first, then rerun the same 3-symbol SCALP command plus positive-control before changing features or model complexity."
commands_run:
  - "Get-Content -Path ai_summary.md"
  - "Get-Content -Path alphaforge/docs/ai_summary__v7_alphaforge_xgb.md"
  - "Get-Content -Path alphaforge/docs/ai_summary.md"
  - "git status --short"
  - "Get-Content -Path alphaforge/src/alphaforge/train.py"
  - "Get-Content -Path alphaforge/src/alphaforge/features/pipeline.py"
  - "Get-Content -Path alphaforge/src/alphaforge/factors/evaluation.py"
  - "Get-Content -Path reports/alphaforge/factor_sprint/ALPHA_LEADERBOARD.csv"
  - "PYTHONPATH=alphaforge/src C:/Users/dresden/AppData/Local/Programs/Python/Python314/python.exe -m alphaforge.train --mode SCALP --symbols BTCUSDT,ETHUSDT,SOLUSDT --folds 3 --panel-cache cache/factor_sprint --threshold-sweep 0.3,0.45,0.55,0.7"
  - "Python diagnostic script loading panel data, labels, features, and symbol boundary counts"
  - "Python diagnostic script printing fold actual/predicted distributions and confusion matrices"
  - "PYTHONPATH=alphaforge/src C:/Users/dresden/AppData/Local/Programs/Python/Python314/python.exe -m alphaforge.train --mode SCALP --symbols BTCUSDT,ETHUSDT,SOLUSDT --folds 3 --panel-cache cache/factor_sprint --positive-control"
  - "Get-Content -Path v7/docs/ai_summary.md"
  - "Get-Content -Path v7/docs/roadmap.md"
