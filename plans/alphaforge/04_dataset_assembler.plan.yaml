- id: WS-04-JOIN
  title: Implement DatasetAssembler.assemble() — join manifest + labels + features on timestamp/symbol
  objective: Implement DatasetAssembler.assemble() — join manifest + labels + features on timestamp/symbol
  implementation:
    instructions:
    - '[must] [action] Create alphaforge/src/alphaforge/dataset/assembler.py with DatasetAssembler class satisfying the contracts.py
      protocol.'
    - '[must] [action] Implement assemble(feature_df, label_df, feature_spec, label_spec). feature_df columns: [symbol, timestamp,
      feature_set_id, <feature columns>]. label_df columns: [symbol, timestamp, label_dataset_id, label_checksum, best_action_label,
      label_validity, long_R_net, short_R_net, ...].'
    - '[must] [action] Join logic: (1) filter label_df to label_validity == ''VALID'', record dropped count. (2) inner join
      on (symbol, timestamp). (3) after join, enforce feature_timestamp < label_timestamp (strict); drop purge violations
      and count. (4) populate JoinAuditTrail fully. (5) construct LabeledDataset for each joined row.'
    - '[must] [action] Purge-window enforcement: feature timestamp MUST be strictly before label timestamp. If feature_timestamp
      >= label_timestamp, drop row and increment purge_violation_rows_dropped. Log a warning for each violation.'
    - '[must] [action] Populate JoinAuditTrail: total_feature_rows, total_label_rows, joined_rows, unmatched_feature_rows,
      unmatched_label_rows, invalid_label_rows_dropped, purge_violation_rows_dropped.'
    - '[must] [action] Construct LabeledDataset per joined row. Mode taken from feature_spec[''mode'']; must match label_spec[''mode'']
      — raise ValueError on mismatch naming both modes.'
    - '[must] [action] Return (list_of_labeled_datasets, audit_trail). Empty list is valid (no overlapping data) — not an
      error.'
    - '[must] [action] Do NOT import xgboost, sklearn, tensorflow, torch, or call fit().'
    allowedFiles:
    - alphaforge/src/alphaforge/dataset/__init__.py
    - alphaforge/src/alphaforge/dataset/contracts.py
    - alphaforge/src/alphaforge/dataset/assembler.py
    forbiddenFiles:
