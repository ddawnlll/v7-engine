model_vs_policy_authority:
  model_owns:
    - "Action probabilities: P(LONG_NOW), P(SHORT_NOW), P(NO_TRADE)"
    - "Expected R estimates per action"
    - "Expected adverse pressure / drawdown"
    - "Cost-adjusted expectancy"
    - "Classification margins"
    - "Regression surface quality (path quality, regret)"
    - "Calibrated confidence (via calibration stage)"
  policy_owns:
    - "Decision gates: probability/confidence, no-trade comparison, expected-R, cost-adjusted expectancy, adverse-pressure/drawdown, decision-margin"
    - "Regime consistency gate (block counter-trend in trend regimes, default NO_TRADE in transition)"
    - "Regime policy modifiers (confidence_mult, expected_r_mult, allow_long, allow_short, require_no_trade)"
    - "Policy score computation (combines classification + regression + regime)"
    - "Timing extension: entry_readiness, entry_valid_for_bars"
    - "Tie-break rules (NO_TRADE when ambiguous)"
    - "Final recommended_action"
  runtime_owns:
    - "Request assembly (with requested_trade_mode / model_scope)"
    - "Mode routing → load scope-compatible artifact bundle"
    - "Result validation"
    - "Event creation (DecisionEvent)"
    - "Execution eligibility (actionability vs operational gates)"
    - "Outcome lifecycle (TradeOutcome)"
    - "Simulation hosting (paper/replay/training adapters)"
    - "Risk hard gates (kill switch, exposure, cooldown, duplicate protection)"
    - "Portfolio interpretation (correlation-aware suppression)"
  interface_owns:
    - "Not defined in V7 docs scope — interface is operator UI"
  conflicts:
    - "Regime TRANSITION stop multiplier 99.0 referenced in v7_mode_centric_architecture.md as simulation parameter, but simulation/docs/profiles.md clarifies this is a policy-layer override, not a simulation semantic"
