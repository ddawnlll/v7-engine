      - "Regime-conditioned continuation (AS-007)."
    kill_risks:
      - "Overnight/weekend gap; funding accumulation over 30-bar holds (thesis:118)."
      - "Funding DEFERRED blocks perpetual/live SWING scope."
    missing_requirements:
      - "First walk-forward to recalibrate LOCKED_INITIAL_BASELINE thresholds (DEC-020)."
      - "Cross-sectional data layer for AS-004."
      - "Timeframe alignment: AlphaForge says SWING 1h/4h primary; simulation says 4h primary (1h is context/refinement)."
    readiness_score_10: 7.0
