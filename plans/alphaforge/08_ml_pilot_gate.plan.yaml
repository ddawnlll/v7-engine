- id: WS-08-PREREQUISITES
  title: Define 8 Prerequisite Check Conditions
  objective: Define 8 Prerequisite Check Conditions
  implementation:
    instructions:
    - '[must] [action] Define prerequisites 1-4 (data manifest, label adapter, feature pipeline, dataset). Each: bool-returning
      condition function verifying module presence, schema validation, and contract compliance. check_data_manifest_complete(),
      check_label_adapter_validated(), check_feature_pipeline_causal_validated(), check_dataset_assembled_and_checksummed().

      '
    - '[must] [action] Define prerequisites 5-8 (non-ML report, walk-forward skeleton, V7 handoff dry run, prior ACCP reports).
      Each: bool-returning condition function verifying artifact presence, structural validity, and required fields. check_non_ml_research_report_complete(),
      check_walk_forward_skeleton_validated(), check_v7_handoff_dry_run_complete(), check_all_prior_accp_reports_exist().

      '
    - '[must] [action] Prerequisite #1 (DATA_MANIFEST_COMPLETE): verify manifest file present, required fields populated,
      symbol list non-empty, timeframe stack matches locked profiles (SCALP 1h, AGGRESSIVE 15m, SWING 4h).

      '
    - '[must] [action] Prerequisite #4 (DATASET_ASSEMBLED_AND_CHECKSUMMED): verify dataset manifest present, checksum matches
      stored reference, feature-label alignment, no null/NaN in label column, mode-level splits confirmed.

      '
    - '[must] [action] Prerequisite #6 (WALK_FORWARD_SKELETON_VALIDATED): verify 6-fold minimum split structure, OOS periods
      per fold, MHT correction framework in place, cost stress parameters, regime categories (TREND_UP/DOWN/RANGE/TRANSITION)
      match contract.

      '
    - '[must] [action] Prerequisite #7 (V7_HANDOFF_DRY_RUN_COMPLETE): verify V7HandoffPackage schema validated, canonical
      gate IDs (G0_doc_ready through G10_live) all present, required fields populated, no boundary violations.

      '
    - '[must] [action] Prerequisite #8 (ALL_PRIOR_ACCP_REPORTS_EXIST): verify 7 ACCP reports present (subplans 01-07), each
      accp_version "2.0.0", result field populated, scope_confirmation present, no report has result: FAIL.

      '
    - '[must] [action] Wrap all 8 conditions in PrerequisiteRegistry dataclass: maps prereq IDs to (description, condition_function,
      critical_flag). DATA_MANIFEST_COMPLETE is critical=True; others critical=False.

      '
