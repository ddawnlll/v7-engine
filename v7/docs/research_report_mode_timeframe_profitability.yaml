profitability_thesis:
  summary: >
    V7's profitability is not stated as a single explicit thesis. It is distributed across the
    architecture as a series of interconnected design decisions: mode-centric pipelines with
    mode-specific timeframes, cost-honest labeling via unified simulation, XGBoost-first hybrid
    models per mode, regime-aware policy modification, correlation-aware portfolio control,
    and calibrated decision surfaces. The implicit thesis is that economic-quality-first design
    with regime awareness, realistic cost modeling, and no-trade discipline will produce
    positive expectancy R across modes. The alpha_thesis_validation_plan.md defines three
    specific alpha hypotheses (Altcoin Delay, Volatility Compression, Funding Divergence)
    but these are NOT integrated into the V7 mode architecture — they are separate research
    tracks that must pass independent validation before integration.

  edge_sources:
    - source: "Mode-specific timeframes capture different market structures (SWING: trend, SCALP: mean-reversion, AGGRESSIVE_SCALP: micro-structure)"
      mode_scope:
        - "ALL_MODES"
      evidence_refs:
        - "EVIDENCE-004"
        - "EVIDENCE-013"

    - source: "Cost-honest labels with fee/slippage ensure training reflects realistic economics"
      mode_scope:
        - "ALL_MODES"
      evidence_refs:
        - "EVIDENCE-003"
        - "EVIDENCE-014"

    - source: "Regime-aware policy modifiers block counter-trend trades in TREND_UP/TREND_DOWN and default to NO_TRADE in TRANSITION"
      mode_scope:
        - "ALL_MODES"
      evidence_refs:
        - "EVIDENCE-005"
        - "EVIDENCE-008"

    - source: "NO_TRADE as first-class action with quality measurement (saved_loss, missed_opportunity)"
      mode_scope:
        - "ALL_MODES"
      evidence_refs:
        - "EVIDENCE-003"
        - "EVIDENCE-016"

    - source: "Hybrid model outputs (classification + regression) enable dual gates: action probability AND economic quality"
      mode_scope:
        - "ALL_MODES"
      evidence_refs:
        - "EVIDENCE-004"
        - "EVIDENCE-007"

    - source: "Correlation-aware portfolio prevents overexposure to single cluster (e.g., BTC + 30 correlated alts)"
      mode_scope:
        - "ALL_MODES"
      evidence_refs:
        - "EVIDENCE-011"

  assumptions:
    - assumption: "XGBoost-first will provide sufficient predictive quality for all 3 modes"
      locked: true
      evidence_refs:
        - "EVIDENCE-007"
    - assumption: "Walk-forward OOS performance predicts live performance"
      locked: true
      evidence_refs:
        - "EVIDENCE-009"
    - assumption: "Rule-based regime detection is sufficient (Phase 1); ML-based detection deferred to Phase 3"
      locked: true
      evidence_refs:
        - "EVIDENCE-005"
    - assumption: "Taker fees for both entry and exit is conservative default"
      locked: true
      evidence_refs:
        - "EVIDENCE-014"
    - assumption: "Same-candle stop-before-target is conservative and safe"
      locked: true
      evidence_refs:
        - "EVIDENCE-015"
    - assumption: "Features shared across modes are sufficient (no mode-specific features needed)"
      locked: true
      evidence_refs:
        - "EVIDENCE-022"

  gaps:
    - gap: "No single cohesive 'profitability thesis' document exists. The thesis must be inferred from 15+ docs."
      severity: "critical"
      recommended_patch: "Create v7/docs/profitability_thesis.md that explicitly states the combined edge thesis, mode-specific alpha sources, and evidence requirements."
    - gap: "Alpha thesis validation (Altcoin Delay, Volatility Compression, Funding Divergence) is defined in a standalone plan but NOT linked to V7 mode definitions or model training pipeline"
      severity: "high"
      recommended_patch: "Add cross-reference section in v7_mode_centric_architecture.md showing which alpha hypotheses map to which modes."
    - gap: "No explicit PnL decomposition model: how much edge comes from trend vs regime vs cost-honesty vs no-trade quality vs calibration"
      severity: "high"
      recommended_patch: "Add edge attribution framework to pipeline/evaluation.md."
    - gap: "No minimum performance threshold for first release (e.g., SWING must achieve X expectancy before SCALP development begins)"
      severity: "medium"
      recommended_patch: "Add release gating criteria to roadmap.md or v7_mode_centric_architecture.md."

