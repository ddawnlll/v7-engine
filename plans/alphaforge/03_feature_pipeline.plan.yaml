metadata:
  planId: ALPHAFORGE-03-FEATURE-PIPELINE
  title: AlphaForge P0.9B — Feature Pipeline (TASK-03 of Master Execution Plan)
  description: 'Implement the deterministic fixture-only causal feature pipeline in alphaforge/src/alphaforge/features/pipeline.py.
    The pipeline computes features per the 7 feature groups defined in feature_contract.md (Returns, Volatility, ATR, Momentum,
    Volume, Breakout, Lead-Lag). Lead-Lag group is explicitly DEFERRED due to P0.9B cross-sectional data dependency. Every
    feature computation is deterministic, causal (no future-looking windows), and validated with leakage negative tests. All
    inputs are OHLCV fixture data from contracts/fixtures/. No network calls, no exchange APIs, no real market data, no xgboost
    training.

    Part of the master AlphaForge implementation pipeline. Predecessor task: TASK-02-SIMULATION-DERIVED-LABEL-ADAPTER. Successor
    task: TASK-04-DATASET-ASSEMBLER. The feature pipeline is the bridge between raw market data and the dataset assembler
    -- features are the input columns for downstream XGBoost training (TASK-08).

    '
  createdAt: '2026-06-23T00:00:00Z'
  humanId: AlphaForge
  status: draft
